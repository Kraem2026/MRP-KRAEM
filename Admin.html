<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Administración</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6f8;
  margin:0;
  padding:20px;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

h2{margin:0}

.back{
  background:#6c757d;
  color:white;
  border:none;
  padding:10px 15px;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap:25px;
}

.card{
  background:white;
  padding:30px 20px;
  border-radius:8px;
  text-align:center;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,.1);
  transition:.2s;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.card h3{
  margin:15px 0 10px;
}

.icon{
  font-size:48px;
}
</style>
</head>

<body>

<header>
  <button class="back" onclick="goBack()">⬅ Dashboard</button>
  <h2>⚙ Administración / Ficha Técnica</h2>
</header>

<div class="grid">

 <!-- ÁREAS -->
<div class="card" onclick="location.href='admin_areas.html'">
  <div class="icon">🏭</div>
  <h3>Áreas</h3>
  <p>Administrar áreas del almacén</p>
</div>

<!-- UBICACIONES -->
<div class="card" onclick="location.href='admin_ubicaciones.html'">
  <div class="icon">📍</div>
  <h3>Ubicaciones</h3>
  <p>Racks, posiciones y localizaciones</p>
</div>

<!-- NÚMEROS DE PARTE -->
<div class="card" onclick="location.href='admin_partes.html'">
  <div class="icon">📦</div>
  <h3>Números de Parte</h3>
  <p>Ficha técnica y obsoletos</p>
</div>


</div>

<script>
function goBack(){
  location.href='dashboard.html';
}
</script>

</body>
</html>
