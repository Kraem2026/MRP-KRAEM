<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin Partes - KRAEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="config.js"></script>

    <style>
        :root { 
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --text-secondary: #64748b;
            --border: #e2e8f0; --primary: #2563eb;
        }
        [data-theme="dark"] {
            --bg: #020617; --card: #1e293b; --text: #f1f5f9; --text-secondary: #94a3b8; --border: #334155;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; }
        .container { max-width: 1200px; margin: auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; align-items: center; }

        .btn { padding: 8px 15px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .btn-primary { background: var(--primary); color: white; border: none; }

        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        th { background: var(--bg); color: var(--text-secondary); text-align: left; padding: 12px; font-size: 12px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
        tr:hover { background: rgba(37, 99, 235, 0.05); }

        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .active { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        .obs { background: rgba(239, 68, 68, 0.1); color: #ef4444; }

        .lang-btn { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 1px solid var(--border); overflow: hidden; padding: 0; }
        .lang-btn img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2 id="txt_title">Administración de Partes</h2>
        <div class="controls">
            <button class="lang-btn" onclick="setLang('es')"><img src="https://flagcdn.com/w80/mx.png"></button>
            <button class="lang-btn" onclick="setLang('ko')"><img src="https://flagcdn.com/w80/kr.png"></button>
            <button class="btn" onclick="toggleTheme()"><i id="themeIcon" class="fas fa-moon"></i></button>
            <a href="ingenieria_nuevo_np.html" class="btn btn-primary"><i class="fas fa-plus"></i> <span id="txt_new">Nuevo</span></a>
        </div>
    </header>

    <table>
        <thead>
            <tr>
                <th id="th_np">N° Parte</th>
                <th id="th_desc">Descripción / Nombre</th>
                <th id="th_proj">Proyecto</th>
                <th id="th_type">Tipo Producto</th>
                <th id="th_inv">Inventario</th>
                <th id="th_stat">Status</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script>
    let currentLang = localStorage.getItem('lang') || 'es';
    const translations = {
        es: { title: "Administración de Partes", new: "Nuevo", thNp: "N° Parte", thDesc: "Descripción", thProj: "Proyecto", thType: "Tipo Producto", thInv: "Inventario", thStat: "Status", edit: "Editar", act: "ACTIVO", obs: "OBSOLETO" },
        ko: { title: "부품 관리", new: "신규 등록", thNp: "부품 번호", thDesc: "품명 / 설명", thProj: "프로젝트", thType: "제품 유형", thInv: "재고", thStat: "상태", edit: "수정", act: "활성", obs: "단종" }
    };

    async function loadTable() {
        applyTheme();
        setLang(currentLang);
        
        // Jalar partes y su inventario actual
        const { data: parts, error } = await client.from('parts').select('*').order('part_number', { ascending: true });
        const { data: inv } = await client.from('inventory_part_summary').select('*');

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        parts.forEach(p => {
            const stock = inv?.find(i => i.part_id === p.id)?.current_inventory || 0;
            const isObs = p.obsolete;
            const statusLabel = isObs ? translations[currentLang].obs : translations[currentLang].act;

            tbody.innerHTML += `
                <tr>
                    <td><b>${p.part_number}</b></td>
                    <td>${p.part_name || p.description || '-'}</td>
                    <td>${p.project || '-'}</td>
                    <td>${p.product_type || 'Inyección'}</td>
                    <td>${stock.toLocaleString()}</td>
                    <td><span class="status-badge ${isObs ? 'obs' : 'active'}">${statusLabel}</span></td>
                    <td>
                        <a href="ingenieria_nuevo_np.html?id=${p.id}" class="btn" style="padding:4px 8px; font-size:12px;">
                            <i class="fas fa-edit"></i>
                        </a>
                    </td>
                </tr>
            `;
        });
    }

    function setLang(lang) {
        currentLang = lang;
        localStorage.setItem('lang', lang);
        const l = translations[lang];
        document.getElementById('txt_title').innerText = l.title;
        document.getElementById('txt_new').innerText = l.new;
        document.getElementById('th_np').innerText = l.thNp;
        document.getElementById('th_desc').innerText = l.thDesc;
        document.getElementById('th_proj').innerText = l.thProj;
        document.getElementById('th_type').innerText = l.thType;
        document.getElementById('th_inv').innerText = l.thInv;
        document.getElementById('th_stat').innerText = l.thStat;
        // Recargar badges si es necesario sin refrescar toda la tabla
    }

    function toggleTheme() {
        const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        document.getElementById('themeIcon').className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
    }

    function applyTheme() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('themeIcon').className = savedTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
    }

    loadTable();
</script>
</body>
</html>
