<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editor de Ingeniería - KRAEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="config.js"></script>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --border: #e2e8f0; --primary: #2563eb; }
        [data-theme="dark"] { --bg: #020617; --card: #1e293b; --text: #f1f5f9; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; transition: 0.3s; }
        .container { max-width: 800px; margin: auto; }
        header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; color: var(--primary); }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); box-sizing: border-box; }
        .btn-save { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .image-preview { width: 100%; height: 150px; background: rgba(0,0,0,0.1); border-radius: 8px; margin-top: 10px; object-fit: contain; }
        .lang-btn { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border); cursor: pointer; overflow: hidden; padding: 0; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <button onclick="history.back()" style="border:none; background:none; color:var(--text); cursor:pointer;"><i class="fas fa-arrow-left fa-lg"></i></button>
        <h2 id="txt_main_title">Nuevo / Editar Parte</h2>
        <div style="display:flex; gap:8px; align-items:center;">
            <button class="lang-btn" onclick="setLang('es')"><img src="https://flagcdn.com/w80/mx.png" width="100%"></button>
            <button class="lang-btn" onclick="setLang('ko')"><img src="https://flagcdn.com/w80/kr.png" width="100%"></button>
            <button onclick="toggleTheme()" style="border:none; background:none; color:var(--text); cursor:pointer;"><i id="themeIcon" class="fas fa-moon"></i></button>
        </div>
    </header>

    <form id="partForm">
        <div class="card">
            <label id="lbl_num">Número de Parte</label>
            <input type="text" id="part_number" required>
            <br><br>
            <label id="lbl_des">Descripción</label>
            <textarea id="description"></textarea>
        </div>

        <div class="card form-grid">
            <div><label id="lbl_cli">Cliente</label><input type="text" id="client"></div>
            <div><label id="lbl_proj">Proyecto</label><input type="text" id="project"></div>
            <div><label id="lbl_res">Resina</label><input type="text" id="resin_type"></div>
            <div><label id="lbl_col">Color</label><input type="text" id="color"></div>
            <div><label id="lbl_cav">Cavidades</label><input type="number" id="cavities"></div>
            <div><label id="lbl_wei">Peso Pieza (g)</label><input type="number" step="0.01" id="part_weight_gr"></div>
            <div><label id="lbl_run">Peso Vena (g)</label><input type="number" step="0.01" id="runner_weight_gr"></div>
            <div>
                <label id="lbl_sta">Estatus</label>
                <select id="obsolete">
                    <option value="false">ACTIVO</option>
                    <option value="true">OBSOLETO</option>
                </select>
            </div>
        </div>

        <div class="card">
            <label id="lbl_img">Imagen del Producto</label>
            <input type="file" id="fileInput" accept="image/*" onchange="preview(this)">
            <img id="img_prev" class="image-preview" src="" style="display:none;">
        </div>

        <button type="submit" class="btn-save" id="btn_save">GUARDAR CAMBIOS / SAVE</button>
    </form>
</div>

<script>
const editId = new URLSearchParams(window.location.search).get('id');
const translations = {
    es: { title: "Editor de Ingeniería", num: "Número de Parte", des: "Descripción", cli: "Cliente", proj: "Proyecto", res: "Resina", col: "Color", cav: "Cavidades", wei: "Peso Pieza (g)", run: "Vena Prop. (g)", sta: "Estatus", img: "Imagen", save: "GUARDAR CAMBIOS" },
    ko: { title: "엔지니어링 편집기", num: "부품 번호", des: "설명", cli: "고객", proj: "프로젝트", res: "레진", col: "색상", cav: "캐비티", wei: "부품 무게", run: "런너 무게", sta: "상태", img: "이미지", save: "변경 사항 저장" }
};

async function loadData() {
    if(!editId) return;
    const { data: p } = await client.from('parts').select('*').eq('id', editId).single();
    if(p) {
        document.getElementById('part_number').value = p.part_number;
        document.getElementById('description').value = p.description || '';
        document.getElementById('client').value = p.client || '';
        document.getElementById('project').value = p.project || '';
        document.getElementById('resin_type').value = p.resin_type || '';
        document.getElementById('color').value = p.color || '';
        document.getElementById('cavities').value = p.cavities || 0;
        document.getElementById('part_weight_gr').value = p.part_weight_gr || 0;
        document.getElementById('runner_weight_gr').value = p.runner_weight_gr || 0;
        document.getElementById('obsolete').value = p.obsolete.toString();
        if(p.image_url) {
            const img = document.getElementById('img_prev');
            img.src = p.image_url;
            img.style.display = 'block';
        }
    }
}

function preview(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => { 
            const img = document.getElementById('img_prev');
            img.src = e.target.result;
            img.style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
    }
}

document.getElementById('partForm').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn_save');
    btn.disabled = true; btn.innerText = "...";

    let imageUrl = document.getElementById('img_prev').src;
    const file = document.getElementById('fileInput').files[0];

    if(file) {
        const path = `part_images/${Date.now()}_${file.name}`;
        await client.storage.from('inventario').upload(path, file);
        imageUrl = client.storage.from('inventario').getPublicUrl(path).data.publicUrl;
    }

    const payload = {
        part_number: document.getElementById('part_number').value,
        description: document.getElementById('description').value,
        client: document.getElementById('client').value,
        project: document.getElementById('project').value,
        resin_type: document.getElementById('resin_type').value,
        color: document.getElementById('color').value,
        cavities: parseInt(document.getElementById('cavities').value),
        part_weight_gr: parseFloat(document.getElementById('part_weight_gr').value),
        runner_weight_gr: parseFloat(document.getElementById('runner_weight_gr').value),
        obsolete: document.getElementById('obsolete').value === 'true',
        image_url: imageUrl
    };

    const { error } = editId 
        ? await client.from('parts').update(payload).eq('id', editId)
        : await client.from('parts').insert([payload]);

    if(error) alert("Error: " + error.message);
    else location.href = 'admin_partes.html';
};

function setLang(lang) {
    const l = translations[lang];
    document.getElementById('txt_main_title').innerText = l.title;
    document.getElementById('lbl_num').innerText = l.num;
    document.getElementById('lbl_des').innerText = l.des;
    document.getElementById('lbl_cli').innerText = l.cli;
    document.getElementById('lbl_proj').innerText = l.proj;
    document.getElementById('lbl_res').innerText = l.res;
    document.getElementById('lbl_col').innerText = l.col;
    document.getElementById('lbl_cav').innerText = l.cav;
    document.getElementById('lbl_wei').innerText = l.wei;
    document.getElementById('lbl_run').innerText = l.run;
    document.getElementById('lbl_sta').innerText = l.sta;
    document.getElementById('lbl_img').innerText = l.img;
    document.getElementById('btn_save').innerText = l.save;
}

loadData();
</script>
</body>
</html>
