<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editor de Ingeniería - KRAEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="config.js"></script>

    <style>
        :root { 
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --text-secondary: #64748b;
            --border: #e2e8f0; --primary: #2563eb; --success: #22c55e;
        }
        [data-theme="dark"] {
            --bg: #020617; --card: #1e293b; --text: #f1f5f9; --text-secondary: #94a3b8; --border: #334155;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: var(--card); padding: 30px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: span 2; }
        label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; color: var(--text-secondary); }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); box-sizing: border-box; font-size: 14px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .btn { padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; border: none; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--card); border: 1px solid var(--border); color: var(--text); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 id="txt_form_title">Nuevo Número de Parte</h2>
        <button class="btn btn-secondary" onclick="history.back()">Cancelar</button>
    </div>

    <form id="partForm" class="form-grid">
        <div class="full-width">
            <label id="lbl_name">Nombre de la Pieza / Descripción</label>
            <input type="text" id="part_name" placeholder="Ej. Soporte Frontal Izquierdo" required>
        </div>

        <div>
            <label id="lbl_number">Número de Parte</label>
            <input type="text" id="part_number" placeholder="KRM-XXXX" required>
        </div>

        <div>
            <label id="lbl_project">Proyecto</label>
            <input type="text" id="project" placeholder="Nombre del proyecto">
        </div>

        <div>
            <label id="lbl_resin">Tipo de Resina</label>
            <input type="text" id="resin_type" placeholder="PP, ABS, Nylon...">
        </div>

        <div>
            <label id="lbl_cav">Cavidades</label>
            <input type="number" id="cavities" value="1">
        </div>

        <div>
            <label id="lbl_cycle">Ciclo (Segundos)</label>
            <input type="number" id="cycle_time_seg" value="0">
        </div>

        <div>
            <label id="lbl_weight">Peso Pieza (gramos)</label>
            <input type="number" step="0.01" id="part_weight_gr" value="0">
        </div>

        <div class="full-width">
            <label id="lbl_img">URL de Imagen</label>
            <input type="text" id="image_url" placeholder="https://enlace-a-tu-imagen.com/foto.jpg">
        </div>

        <div class="full-width" style="margin-top: 20px;">
            <button type="submit" class="btn btn-primary" style="width: 100%;">
                <i class="fas fa-save"></i> <span id="txt_save">Guardar Cambios</span>
            </button>
        </div>
    </form>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const partId = urlParams.get('id'); // Jalar ID de la URL
    let currentLang = localStorage.getItem('lang') || 'es';

    async function init() {
        applyTheme();
        if (partId) {
            document.getElementById('txt_form_title').innerText = "Editando Número de Parte";
            await loadPartData();
        }
    }

    // CARGAR DATOS EXISTENTES
    async function loadPartData() {
        const { data: p, error } = await client
            .from('parts')
            .select('*')
            .eq('id', partId)
            .single();

        if (error) {
            alert("Error al cargar la pieza");
            return;
        }

        // PRELLENAR CAMPOS
        document.getElementById('part_name').value = p.part_name || p.description || '';
        document.getElementById('part_number').value = p.part_number || '';
        document.getElementById('project').value = p.project || '';
        document.getElementById('resin_type').value = p.resin_type || '';
        document.getElementById('cavities').value = p.cavities || 0;
        document.getElementById('cycle_time_seg').value = p.cycle_time_seg || 0;
        document.getElementById('part_weight_gr').value = p.part_weight_gr || 0;
        document.getElementById('image_url').value = p.image_url || '';
    }

    // GUARDAR O ACTUALIZAR
    document.getElementById('partForm').onsubmit = async (e) => {
        e.preventDefault();
        
        const payload = {
            part_name: document.getElementById('part_name').value,
            part_number: document.getElementById('part_number').value,
            project: document.getElementById('project').value,
            resin_type: document.getElementById('resin_type').value,
            cavities: parseInt(document.getElementById('cavities').value),
            cycle_time_seg: parseFloat(document.getElementById('cycle_time_seg').value),
            part_weight_gr: parseFloat(document.getElementById('part_weight_gr').value),
            image_url: document.getElementById('image_url').value
        };

        let response;
        if (partId) {
            // ACTUALIZAR
            response = await client.from('parts').update(payload).eq('id', partId);
        } else {
            // CREAR NUEVO
            response = await client.from('parts').insert([payload]);
        }

        if (response.error) {
            alert("Error al guardar: " + response.error.message);
        } else {
            alert("¡Guardado correctamente!");
            location.href = 'admin_partes.html';
        }
    };

    function applyTheme() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    }

    init();
</script>
</body>
</html>
