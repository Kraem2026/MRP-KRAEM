<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Número de Parte - KRAEM Ingeniería</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="config.js"></script>

    <style>
        :root { 
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --text-secondary: #64748b;
            --border: #e2e8f0; --primary: #2563eb; --input-bg: #ffffff;
        }
        [data-theme="dark"] {
            --bg: #020617; --card: #1e293b; --text: #f1f5f9; --text-secondary: #94a3b8; --border: #334155; --input-bg: #0f172a;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; }
        
        .container { max-width: 900px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .btn { padding: 10px 18px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; text-decoration: none; font-size: 14px; }
        .btn-primary { background: var(--primary); color: white; border: none; width: 100%; justify-content: center; padding: 15px; font-size: 16px;}
        .btn-primary:hover { background: #1d4ed8; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 700px) { .form-grid { grid-template-columns: 1fr; } }

        .card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .card-title { font-size: 0.85rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px;}

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; text-transform: uppercase;}
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--input-bg); color: var(--text); box-sizing: border-box; font-size: 14px;}
        textarea { resize: vertical; height: 80px; }

        /* Estilo para subida de imagen */
        .image-uploader { text-align: center; border: 2px dashed var(--border); padding: 20px; border-radius: 12px; cursor: pointer; position: relative; background: var(--input-bg);}
        .image-uploader:hover { border-color: var(--primary); color: var(--primary); }
        .image-preview { max-width: 100%; max-height: 200px; margin-top: 10px; border-radius: 8px; display: none; }
        #fileInput { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

        .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); color: white; z-index: 1000; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(5px);}
    </style>
</head>
<body>

<div class="loading-overlay" id="loading">
    <i class="fas fa-spinner fa-3x fa-spin"></i>
    <h3 style="margin-top:15px">Guardando Ficha Técnica...</h3>
</div>

<div class="container">
    <header>
        <div style="display: flex; align-items: center; gap: 15px;">
            <a href="admin_partes.html" class="btn"><i class="fas fa-arrow-left"></i> Volver</a>
            <h2 style="margin:0;">🆕 Registro de Nuevo Número de Parte</h2>
        </div>
        <button class="btn" onclick="toggleTheme()"><i id="themeIcon" class="fas fa-moon"></i></button>
    </header>

    <form id="npForm" onsubmit="saveNewPart(event)">
        <div class="form-grid">
            <div class="card">
                <div class="card-title">1. Identificación Básica</div>
                <div class="form-group">
                    <label>Número de Parte *</label>
                    <input type="text" id="part_number" required placeholder="Ej: 85860-GG000">
                </div>
                <div class="form-group">
                    <label>Descripción / Nombre *</label>
                    <textarea id="description" required placeholder="Ej: SOPORTE LATERAL LH T33"></textarea>
                </div>
                <div class="form-grid" style="gap:10px;">
                    <div class="form-group">
                        <label>Cliente</label>
                        <input type="text" id="client" placeholder="Ej: NISSAN">
                    </div>
                    <div class="form-group">
                        <label>Proyecto</label>
                        <input type="text" id="project" placeholder="Ej: T33">
                    </div>
                </div>
                <div class="form-grid" style="gap:10px;">
                    <div class="form-group">
                        <label>Tipo de Producto</label>
                        <select id="part_type">
                            <option value="PT">Producto Terminado (PT)</option>
                            <option value="MP">Materia Prima (MP)</option>
                            <option value="RESINA">Resina</option>
                            <option value="COMP">Componente</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Unidad de Medida</label>
                        <select id="uom">
                            <option value="PZA">Pieza (PZA)</option>
                            <option value="KG">Kilogramos (KG)</option>
                            <option value="LTS">Litros (LTS)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">2. Fotografía del Producto</div>
                <div class="image-uploader">
                    <i class="fas fa-cloud-upload-alt fa-3x"></i>
                    <p style="margin: 10px 0;">Click o arrastra para subir foto</p>
                    <input type="file" id="fileInput" accept="image/*" onchange="previewImage(this)">
                    <img id="imgPreview" class="image-preview" alt="Vista previa">
                </div>
                <p class="text-secondary" style="font-size:11px; margin-top:10px; text-align:center;">Formatos: JPG, PNG. Máx 2MB recomendado.</p>
            </div>

            <div class="card">
                <div class="card-title">3. Especificaciones de Inyección</div>
                <div class="form-grid" style="gap:10px;">
                    <div class="form-group">
                        <label>Tipo Resina</label>
                        <input type="text" id="resin_type" placeholder="Ej: PP">
                    </div>
                    <div class="form-group">
                        <label>Grado Resina</label>
                        <input type="text" id="resin_grade" placeholder="Ej: Sabic 575P">
                    </div>
                </div>
                <div class="form-group">
                    <label>Color / Masterbatch</label>
                    <input type="text" id="color" placeholder="Ej: Negro / K-99">
                </div>
                <div class="form-grid" style="gap:10px;">
                    <div class="form-group">
                        <label>Cavidades Molde</label>
                        <input type="number" id="cavities" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label>Tiempo Ciclo (s)</label>
                        <input type="number" id="cycle_time_seg" placeholder="0">
                    </div>
                </div>
                <div class="form-grid" style="gap:10px;">
                    <div class="form-group">
                        <label>Peso Pieza (g)</label>
                        <input type="number" id="part_weight_gr" step="0.01" placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>Peso Vena Prop. (g)</label>
                        <input type="number" id="runner_weight_gr" step="0.01" placeholder="0.00">
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">4. Logística y Configuración</div>
                <div class="form-group">
                    <label>Standard Pack (Pzas/Caja)</label>
                    <input type="number" id="std_pack" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Estatus de Ingeniería</label>
                    <select id="obsolete">
                        <option value="false">ACTIVO</option>
                        <option value="true">OBSOLETO</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Clasificación ABC (Manual)</label>
                    <select id="abc_manual">
                        <option value="">N/D</option>
                        <option value="A">Clase A</option>
                        <option value="B">Clase B</option>
                        <option value="C">Clase C</option>
                    </select>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i> GUARDAR FICHA TÉCNICA MAESTRA
        </button>
    </form>
</div>

<script>
    // 'client' viene de config.js

    // 1. Vista previa de la imagen
    function previewImage(input) {
        const preview = document.getElementById('imgPreview');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
                document.querySelector('.image-uploader i').style.display = 'none';
                document.querySelector('.image-uploader p').style.display = 'none';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    // 2. Guardar todo el formulario
    async function saveNewPart(event) {
        event.preventDefault();
        const np = document.getElementById('part_number').value.trim();
        if(!np) return alert("El Número de Parte es obligatorio.");

        document.getElementById('loading').style.display = 'flex';

        // A. Subir imagen si existe
        let imageUrl = null;
        const fileInput = document.getElementById('fileInput');
        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            const fileExt = file.name.split('.').pop();
            // Creamos una ruta única: part_images/NUMERO_DE_PARTE/photo.jpg
            const filePath = `part_images/${np}/photo_${Date.now()}.${fileExt}`;

            const { data: uploadData, error: uploadError } = await client.storage
                .from('inventario') // Asegúrate de tener un bucket llamado 'inventario' público
                .upload(filePath, file);

            if (uploadError) {
                document.getElementById('loading').style.display = 'none';
                return alert("Error al subir imagen: " + uploadError.message);
            }

            // Obtener URL pública
            const { data: urlData } = client.storage.from('inventario').getPublicUrl(filePath);
            imageUrl = urlData.publicUrl;
        }

        // B. Preparar datos para la tabla 'parts'
        const payload = {
            part_number: np,
            description: document.getElementById('description').value,
            part_name: document.getElementById('description').value.substring(0, 50), // Nombre corto
            client: document.getElementById('client').value,
            project: document.getElementById('project').value,
            part_type: document.getElementById('part_type').value,
            uom: document.getElementById('uom').value,
            resin_type: document.getElementById('resin_type').value,
            resin_grade: document.getElementById('resin_grade').value,
            color: document.getElementById('color').value,
            cavities: parseInt(document.getElementById('cavities').value) || 0,
            cycle_time_seg: parseInt(document.getElementById('cycle_time_seg').value) || 0,
            part_weight_gr: parseFloat(document.getElementById('part_weight_gr').value) || 0,
            runner_weight_gr: parseFloat(document.getElementById('runner_weight_gr').value) || 0,
            std_pack: parseInt(document.getElementById('std_pack').value) || 0,
            obsolete: document.getElementById('obsolete').value === 'true',
            abc_manual: document.getElementById('abc_manual').value || null,
            image_url: imageUrl // Link de la foto subida
        };

        // C. Insertar en Supabase
        const { error: insertError } = await client
            .from('parts')
            .insert([payload]);

        document.getElementById('loading').style.display = 'none';

        if (insertError) {
            alert("Error al guardar en base de datos: " + insertError.message);
        } else {
            alert("¡Ficha Técnica guardada con éxito!");
            window.location.href = 'admin_partes.html';
        }
    }
</script>

</body>
</html>
