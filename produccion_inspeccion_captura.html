<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico KRAEM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --border: #e2e8f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 10px; }
        .form-container { max-width: 500px; margin: auto; background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 800; margin-bottom: 5px; color: #64748b; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .debug-msg { font-size: 10px; color: #ef4444; margin-top: 5px; }
    </style>
</head>
<body>

<div class="form-container">
    <h3 style="text-align:center;">Captura (Modo Diagnóstico)</h3>
    
    <div class="form-group">
        <label>Área</label>
        <select id="area"><option value="">Esperando datos...</option></select>
        <div id="debug_area" class="debug-msg"></div>
    </div>

    <div class="form-group">
        <label>Tipo de Defecto</label>
        <select id="tipo_defecto"><option value="">Esperando datos...</option></select>
        <div id="debug_defect" class="debug-msg"></div>
    </div>

    <div class="form-group">
        <label>Número de Parte</label>
        <input type="text" id="partSearch" placeholder="Escribe N/P para probar...">
        <div id="debug_parts" class="debug-msg"></div>
    </div>

    <p style="font-size: 12px; color: #64748b;">Si las listas siguen vacías, revisa la consola (F12).</p>
</div>

<script>
    async function init() {
        console.log("Iniciando conexión con Supabase...");

        // --- PRUEBA ÁREAS ---
        try {
            const { data, error } = await client.from('areas').select('*');
            const select = document.getElementById('area');
            if (error) {
                document.getElementById('debug_area').innerText = "Error: " + error.message;
            } else if (data.length === 0) {
                document.getElementById('debug_area').innerText = "Tabla 'areas' está vacía.";
            } else {
                select.innerHTML = '<option value="">Seleccione Área...</option>';
                data.forEach(a => {
                    let opt = document.createElement('option');
                    opt.value = a.area_name; opt.textContent = a.area_name;
                    select.appendChild(opt);
                });
                console.log("Áreas cargadas:", data);
            }
        } catch (e) { console.error(e); }

        // --- PRUEBA DEFECTOS ---
        try {
            // Intentamos con 'defect' (singular) como dijiste antes
            const { data, error } = await client.from('defect').select('*');
            const select = document.getElementById('tipo_defecto');
            if (error) {
                document.getElementById('debug_defect').innerText = "Error: " + error.message + " (¿La tabla se llama 'defect' o 'defects'?)";
            } else if (data.length === 0) {
                document.getElementById('debug_defect').innerText = "Tabla 'defect' vacía.";
            } else {
                select.innerHTML = '<option value="NINGUNO">NINGUNO (OK)</option>';
                data.forEach(d => {
                    let opt = document.createElement('option');
                    opt.value = d.Defect_name; opt.textContent = d.Defect_name;
                    select.appendChild(opt);
                });
                console.log("Defectos cargados:", data);
            }
        } catch (e) { console.error(e); }

        // --- PRUEBA PARTES ---
        try {
            const { data, error } = await client.from('parts').select('part_number');
            if (error) document.getElementById('debug_parts').innerText = "Error en partes: " + error.message;
            if (data) console.log("Partes listas:", data.length);
        } catch (e) { console.error(e); }
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
