<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRAEM | INSPECCION DE PRODUCCION </title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --border: #e2e8f0; --danger: #ef4444; --success: #22c55e; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .form-card { max-width: 650px; margin: 10px auto; background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--bg); padding-bottom: 15px; }
        .btn-back { text-decoration: none; color: #64748b; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .group { margin-bottom: 12px; position: relative; }
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 4px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--accent); ring: 2px rgba(37, 99, 235, 0.1); }
        .readonly { background: #f1f5f9; font-weight: 600; color: var(--accent); }
        .autobox { position: absolute; width: 100%; background: white; border: 1px solid var(--border); z-index: 100; max-height: 150px; overflow-y: auto; display: none; border-radius: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .autobox div { padding: 10px; cursor: pointer; border-bottom: 1px solid #f8fafc; font-size: 13px; }
        .autobox div:hover { background: #eff6ff; }
        .btn-save { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-save:hover { background: #1d4ed8; }
        .tag { font-size: 10px; font-weight: 900; color: var(--accent); margin: 15px 0 8px 0; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

<div class="form-card">
    <div class="header">
        <a href="dashboard.html" class="btn-back"><i class="fas fa-arrow-left"></i> DASHBOARD</a>
        <b style="color:var(--accent); font-size: 14px;">KRAEM INSPECCION DE PRODUCCION</b>
    </div>

    <div class="tag">PERSONAL Y ÁREA</div>
    <div class="grid">
        <div class="group"><label>Área</label><select id="area_select"></select></div>
        <div class="group"><label>Turno</label><select id="turno"><option value="1">Turno 1</option><option value="2">Turno 2</option></select></div>
    </div>

    <div class="grid">
        <div class="group">
            <label>Inspector</label>
            <input type="text" id="ins_input" placeholder="Buscar..." autocomplete="off">
            <div id="ins_box" class="autobox"></div>
        </div>
        <div class="group">
            <label>Operador</label>
            <input type="text" id="ope_input" placeholder="Buscar..." autocomplete="off">
            <div id="ope_box" class="autobox"></div>
        </div>
    </div>

    <div class="tag">PRODUCTO</div>
    <div class="group">
        <label>Número de Parte / Nombre</label>
        <input type="text" id="part_input" placeholder="Escriba para filtrar..." autocomplete="off">
        <div id="part_box" class="autobox"></div>
    </div>
    <div class="group"><label>Descripción</label><input type="text" id="desc_display" class="readonly" readonly></div>

    <div class="grid">
        <div class="group"><label>Cantidad Inspeccionada</label><input type="number" id="c_total" value="0" oninput="calcular()"></div>
        <div class="group"><label style="color:var(--danger)">Cantidad Defectuosa</label><input type="number" id="c_def" value="0" oninput="calcular()"></div>
    </div>

    <div class="tag">RESULTADO</div>
    <div class="grid">
        <div class="group">
            <label>Defecto Detectado (Lista)</label>
            <select id="defect_select"></select>
        </div>
        <div class="group">
            <label>Disposición Final</label>
            <select id="destino">
                <option value="LIBERADO">✅ LIBERADO</option>
                <option value="RETRABAJO">🔄 RETRABAJO</option>
                <option value="SCRAP">🗑️ SCRAP</option>
            </select>
        </div>
    </div>

    <div class="group"><label>Notas</label><textarea id="notas" rows="2"></textarea></div>

    <div class="grid" style="background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 10px;">
        <div style="text-align: center;"><label>PIEZAS OK</label><div id="p_ok" style="font-size: 18px; font-weight: 800; color: var(--success);">0</div></div>
        <div style="text-align: center;"><label>% RECHAZO</label><div id="p_por" style="font-size: 18px; font-weight: 800; color: var(--danger);">0%</div></div>
    </div>

    <button class="btn-save" onclick="guardar()"><i class="fas fa-check-circle"></i> FINALIZAR REPORTE</button>
</div>

<script>
    let db_parts = [], db_personal = [];

    async function init() {
        // Cargar Áreas
        const { data: areas } = await client.from('rh_areas').select('nombre').order('nombre');
        const sArea = document.getElementById('area_select');
        sArea.innerHTML = '<option value="">-- Selección --</option>';
        areas?.forEach(a => sArea.innerHTML += `<option value="${a.nombre}">${a.nombre}</option>`);

        // Cargar Personal (Inspectores/Operadores)
        const { data: pers } = await client.from('rh_empleados').select('nombre_completo').eq('estatus', 'ACTIVO').order('nombre_completo');
        db_personal = pers || [];

        // Cargar Defectos en LISTA
        const { data: defs } = await client.from('defects').select('*').order('Defect_name');
        const sDef = document.getElementById('defect_select');
        sDef.innerHTML = '<option value="NINGUNO">NINGUNO (OK)</option>';
        defs?.forEach(d => {
            let n = d.Defect_name || d.defect_name;
            sDef.innerHTML += `<option value="${n}">${n}</option>`;
        });

        // Cargar Partes
        const { data: parts } = await client.from('parts').select('part_number, part_name');
        db_parts = parts || [];
    }

    function setupSearch(inputId, boxId, data, key, callback) {
        const input = document.getElementById(inputId);
        const box = document.getElementById(boxId);
        input.oninput = () => {
            const val = input.value.toUpperCase();
            box.innerHTML = '';
            if(!val) { box.style.display = 'none'; return; }
            const fil = data.filter(i => (i[key] || "").toUpperCase().includes(val) || (i['part_name'] && i['part_name'].toUpperCase().includes(val))).slice(0,8);
            fil.forEach(i => {
                const div = document.createElement('div');
                div.innerHTML = i[key] + (i['part_name'] ? ` - ${i['part_name']}` : '');
                div.onclick = () => { input.value = i[key]; box.style.display = 'none'; if(callback) callback(i); };
                box.appendChild(div);
            });
            box.style.display = fil.length ? 'block' : 'none';
        };
    }

    function calcular() {
        const t = parseFloat(document.getElementById('c_total').value) || 0;
        const d = parseFloat(document.getElementById('c_def').value) || 0;
        document.getElementById('p_ok').innerText = Math.max(0, t - d);
        document.getElementById('p_por').innerText = t > 0 ? ((d / t) * 100).toFixed(1) + "%" : "0%";
    }

    async function guardar() {
        const d = {
            fecha: new Date().toISOString().split('T')[0],
            turno: document.getElementById('turno').value,
            area: document.getElementById('area_select').value,
            inspector: document.getElementById('ins_input').value,
            operador: document.getElementById('ope_input').value,
            num_parte: document.getElementById('part_input').value,
            nombre_pieza: document.getElementById('desc_display').value,
            cant_inspeccionada: parseFloat(document.getElementById('c_total').value) || 0,
            cant_defectuosa: parseFloat(document.getElementById('c_def').value) || 0,
            tipo_defecto: document.getElementById('defect_select').value,
            destino: document.getElementById('destino').value,
            comentarios: document.getElementById('notas').value
        };

        if(!d.area || !d.num_parte || !d.inspector || !d.operador) return alert("⚠️ Llena los campos obligatorios.");
        
        const { error } = await client.from('inspeccion_produccion').insert([d]);
        if(error) alert(error.message); else { alert("✅ Guardado"); location.reload(); }
    }

    document.addEventListener('DOMContentLoaded', async () => {
        await init();
        setupSearch('part_input', 'part_box', db_parts, 'part_number', (p) => { document.getElementById('desc_display').value = p.part_name; });
        setupSearch('ins_input', 'ins_box', db_personal, 'nombre_completo');
        setupSearch('ope_input', 'ope_box', db_personal, 'nombre_completo');
    });

    document.onclick = (e) => { if(!e.target.closest('.group')) document.querySelectorAll('.autobox').forEach(b => b.style.display='none'); };
</script>
</body>
</html>
