<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRAEM | Calidad Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --border: #e2e8f0; --danger: #ef4444; --success: #22c55e; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .form-card { max-width: 650px; margin: 20px auto; background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-back { text-decoration: none; color: #64748b; font-size: 13px; font-weight: bold; display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: white; }
        .btn-back:hover { background: #f8fafc; color: var(--accent); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .group { margin-bottom: 15px; position: relative; }
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 0.5px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; box-sizing: border-box; background: #fff; }
        .readonly { background: #f8fafc; font-weight: bold; color: var(--accent); }
        .autobox { position: absolute; width: 100%; background: white; border: 1px solid var(--border); z-index: 100; max-height: 180px; overflow-y: auto; display: none; box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-radius: 8px; margin-top: 2px; }
        .autobox div { padding: 10px; cursor: pointer; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        .autobox div:hover { background: #eff6ff; color: var(--accent); }
        .btn-save { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .section-tag { font-size: 11px; font-weight: 900; color: var(--accent); margin: 20px 0 10px 0; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

<div class="form-card">
    <div class="header-nav">
        <a href="dashboard.html" class="btn-back"><i class="fas fa-arrow-left"></i> DASHBOARD</a>
        <span style="font-size: 12px; color: #94a3b8; font-weight: bold;">REGISTRO DE CALIDAD</span>
    </div>

    <div class="section-tag"><i class="fas fa-map-marker-alt"></i> UBICACIÓN Y TURNO</div>
    <div class="grid">
        <div class="group"><label>Área</label><select id="area_select"></select></div>
        <div class="group"><label>Turno</label><select id="turno"><option value="1">Turno 1</option><option value="2">Turno 2</option></select></div>
    </div>

    <div class="section-tag"><i class="fas fa-users"></i> PERSONAL RESPONSABLE</div>
    <div class="grid">
        <div class="group">
            <label>Inspector (Calidad)</label>
            <input type="text" id="inspector_input" placeholder="Escriba nombre..." autocomplete="off">
            <div id="inspector_box" class="autobox"></div>
        </div>
        <div class="group">
            <label>Operador (Producción)</label>
            <input type="text" id="operador_input" placeholder="Escriba nombre..." autocomplete="off">
            <div id="operador_box" class="autobox"></div>
        </div>
    </div>

    <div class="section-tag"><i class="fas fa-barcode"></i> PRODUCTO</div>
    <div class="group">
        <label>Buscar Pieza (N/P o Nombre)</label>
        <input type="text" id="part_input" placeholder="Escriba N/P o Nombre..." autocomplete="off">
        <div id="part_box" class="autobox"></div>
    </div>
    <div class="group">
        <label>Descripción Confirmada</label>
        <input type="text" id="desc_display" class="readonly" readonly>
    </div>

    <div class="grid">
        <div class="group"><label>Inspeccionado</label><input type="number" id="cant_total" value="0" oninput="calcular()"></div>
        <div class="group"><label style="color:var(--danger)">Defectuoso</label><input type="number" id="cant_def" value="0" oninput="calcular()"></div>
    </div>

    <div class="section-tag"><i class="fas fa-clipboard-list"></i> RESULTADO</div>
    <div class="grid">
        <div class="group">
            <label>Tipo de Defecto (Lista)</label>
            <select id="defect_select"></select>
        </div>
        <div class="group">
            <label>Disposición</label>
            <select id="destino">
                <option value="LIBERADO">✅ LIBERADO</option>
                <option value="RETRABAJO">🔄 RETRABAJO</option>
                <option value="SCRAP">🗑️ SCRAP</option>
            </select>
        </div>
    </div>

    <div class="group"><label>Comentarios</label><textarea id="notas" rows="2"></textarea></div>

    <div class="grid" style="background: #f8fafc; padding: 15px; border-radius: 12px; text-align: center;">
        <div><label>Piezas OK</label><span id="preview_ok" style="font-size: 20px; font-weight: 800; color: var(--success);">0</span></div>
        <div><label>% Rechazo</label><span id="porcentaje_def" style="font-size: 20px; font-weight: 800; color: var(--danger);">0%</span></div>
    </div>

    <button class="btn-save" onclick="guardar()"><i class="fas fa-save"></i> GUARDAR INSPECCIÓN</button>
</div>

<script>
    let db_parts = [], db_personal = [];

    async function init() {
        // Carga de Áreas
        const { data: areas } = await client.from('rh_areas').select('nombre').order('nombre');
        const sArea = document.getElementById('area_select');
        sArea.innerHTML = '<option value="">-- Seleccionar --</option>';
        areas?.forEach(a => sArea.innerHTML += `<option value="${a.nombre}">${a.nombre}</option>`);

        // Carga de Personal para buscador
        const { data: pers } = await client.from('rh_empleados').select('nombre_completo').eq('estatus', 'ACTIVO').order('nombre_completo');
        db_personal = pers || [];

        // Carga de Defectos (En LISTA como pediste)
        const { data: defs } = await client.from('defects').select('Defect_name').order('Defect_name');
        const sDef = document.getElementById('defect_select');
        sDef.innerHTML = '<option value="NINGUNO">NINGUNO (OK)</option>';
        defs?.forEach(d => sDef.innerHTML += `<option value="${d.Defect_name}">${d.Defect_name}</option>`);

        // Carga de Partes
        const { data: parts } = await client.from('parts').select('part_number, part_name');
        db_parts = parts || [];
    }

    // --- BUSCADOR GENÉRICO ---
    function configurarBuscador(inputId, boxId, dataset, field, callback) {
        const input = document.getElementById(inputId);
        const box = document.getElementById(boxId);
        input.oninput = () => {
            const val = input.value.toUpperCase();
            box.innerHTML = '';
            if(!val) { box.style.display = 'none'; return; }
            const fil = dataset.filter(item => {
                // Si es piezas, busca en part_number y part_name. Si es personal, en nombre_completo.
                const searchField = item[field] || "";
                const secondField = item['part_name'] || "";
                return searchField.toUpperCase().includes(val) || secondField.toUpperCase().includes(val);
            }).slice(0, 10);
            fil.forEach(item => {
                const div = document.createElement('div');
                div.innerHTML = item[field] + (item['part_name'] ? ` - ${item['part_name']}` : '');
                div.onclick = () => { 
                    input.value = item[field]; 
                    box.style.display = 'none'; 
                    if(callback) callback(item);
                };
                box.appendChild(div);
            });
            box.style.display = fil.length ? 'block' : 'none';
        };
    }

    // Iniciar buscadores
    document.addEventListener('DOMContentLoaded', async () => {
        await init();
        configurarBuscador('part_input', 'part_box', db_parts, 'part_number', (p) => {
            document.getElementById('desc_display').value = p.part_name;
        });
        configurarBuscador('inspector_input', 'inspector_box', db_personal, 'nombre_completo');
        configurarBuscador('operador_input', 'operador_box', db_personal, 'nombre_completo');
    });

    function calcular() {
        const total = parseFloat(document.getElementById('cant_total').value) || 0;
        const def = parseFloat(document.getElementById('cant_def').value) || 0;
        document.getElementById('preview_ok').innerText = Math.max(0, total - def);
        document.getElementById('porcentaje_def').innerText = total > 0 ? ((def / total) * 100).toFixed(1) + "%" : "0%";
    }

    async function guardar() {
        const btn = document.querySelector('.btn-save');
        const data = {
            fecha: new Date().toISOString().split('T')[0],
            hora: new Date().toLocaleTimeString('en-GB'),
            turno: document.getElementById('turno').value,
            area: document.getElementById('area_select').value,
            inspector: document.getElementById('inspector_input').value,
            operador: document.getElementById('operador_input').value,
            num_parte: document.getElementById('part_input').value,
            nombre_pieza: document.getElementById('desc_display').value,
            cant_inspeccionada: parseFloat(document.getElementById('cant_total').value) || 0,
            cant_defectuosa: parseFloat(document.getElementById('cant_def').value) || 0,
            tipo_defecto: document.getElementById('defect_select').value,
            destino: document.getElementById('destino').value,
            comentarios: document.getElementById('notas').value
        };

        if(!data.area || !data.num_parte || !data.operador || !data.inspector) return alert("Faltan datos obligatorios");
        
        btn.disabled = true;
        const { error } = await client.from('inspeccion_produccion').insert([data]);
        if(error) { alert("Error: " + error.message); btn.disabled = false; }
        else { alert("¡Registro guardado con éxito!"); location.reload(); }
    }

    // Cerrar cuadros al hacer click fuera
    document.addEventListener('click', (e) => {
        ['part_box', 'inspector_box', 'operador_box'].forEach(id => {
            if(!e.target.closest('.group')) document.getElementById(id).style.display = 'none';
        });
    });
</script>
</body>
</html>
