<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura de Inspección Interna - KRAEM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --border: #e2e8f0; }
        /* Estilos de Dark Mode basados en tu config.js */
        [data-theme='dark'] { --bg: #1e293b; --card: #0f172a; --text: #f8fafc; --border: #334155; }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; transition: 0.3s; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .form-container { max-width: 600px; margin: auto; background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; opacity: 0.8; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; box-sizing: border-box; background: var(--card); color: var(--text); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-save { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .readonly-box { background: rgba(0,0,0,0.05); font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="header">
    <button onclick="location.href='dashboard.html'" style="border:none; background:none; color:var(--primary); cursor:pointer;">
        <i class="fas fa-arrow-left"></i> Volver
    </button>
    <h2 style="margin:0">Nueva Inspección</h2>
    <button onclick="toggleTheme()" style="border:none; background:none; color:var(--text); cursor:pointer;">
        <i id="themeIcon" class="fas fa-moon"></i>
    </button>
</div>

<div class="form-container">
    <div class="grid-2">
        <div class="form-group">
            <label>Turno</label>
            <select id="turno">
                <option value="1">Turno 1</option>
                <option value="2">Turno 2</option>
            </select>
        </div>
        <div class="form-group">
            <label>Área</label>
            <select id="area">
                <option value="NISSEI">NISSEI</option>
                <option value="LS">LS</option>
                <option value="HDL">HDL</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label>Máquina</label>
        <input type="text" id="maquina" placeholder="Ej. #13">
    </div>

    <div class="form-group">
        <label>Número de Parte</label>
        <input type="text" id="num_parte" placeholder="Ingrese N/P..." onchange="buscarParte(this.value)">
    </div>

    <div class="form-group">
        <label>Nombre de Pieza</label>
        <input type="text" id="nombre_pieza" class="readonly-box" readonly placeholder="Buscando...">
    </div>

    <div class="grid-2">
        <div class="form-group">
            <label>Cant. Inspeccionada</label>
            <input type="number" id="cant_insp" oninput="calcularOk()">
        </div>
        <div class="form-group">
            <label>Cant. Defectuosa</label>
            <input type="number" id="cant_def" oninput="calcularOk()">
        </div>
    </div>

    <div class="grid-2">
        <div class="form-group">
            <label>Cantidad OK</label>
            <input type="number" id="cant_ok" class="readonly-box" readonly>
        </div>
        <div class="form-group">
            <label>% Defecto</label>
            <input type="text" id="porcentaje" class="readonly-box" readonly>
        </div>
    </div>

    <div class="form-group">
        <label>Tipo de Defecto</label>
        <select id="tipo_defecto">
            <option value="">Cargando lista...</option>
        </select>
    </div>

    <div class="form-group">
        <label>Comentarios</label>
        <textarea id="comentarios" rows="2" placeholder="Notas adicionales..."></textarea>
    </div>

    <div class="form-group">
        <label>Destino</label>
        <select id="destino">
            <option value="LIBERADO">Liberado</option>
            <option value="RETRABAJO">Retrabajo</option>
            <option value="SCRAP">Scrap</option>
        </select>
    </div>

    <button class="btn-save" id="btn_guardar" onclick="guardarInspeccion()">
        <i class="fas fa-save"></i> GUARDAR REGISTRO
    </button>
</div>

<script>
    // NOTA: No declaramos _client, usamos 'client' que ya viene de config.js

    async function cargarDefectos() {
        try {
            // Usamos 'client' que es como se llama en tu config.js
            const { data, error } = await client.from('defects').select('Defect_name').order('Defect_name');
            const select = document.getElementById('tipo_defecto');
            if (data) {
                select.innerHTML = '<option value="NINGUNO">Ninguno / OK</option>';
                data.forEach(d => {
                    select.innerHTML += `<option value="${d.Defect_name}">${d.Defect_name}</option>`;
                });
            }
        } catch (e) { console.error("Error:", e); }
    }

    async function buscarParte(np) {
        if(!np) return;
        const { data, error } = await client
            .from('parts')
            .select('part_name')
            .eq('part_number', np.trim())
            .single();

        document.getElementById('nombre_pieza').value = data ? data.part_name : "No encontrado";
    }

    function calcularOk() {
        const insp = parseInt(document.getElementById('cant_insp').value) || 0;
        const def = parseInt(document.getElementById('cant_def').value) || 0;
        document.getElementById('cant_ok').value = insp - def;
        document.getElementById('porcentaje').value = insp > 0 ? ((def / insp) * 100).toFixed(2) + "%" : "0%";
    }

    async function guardarInspeccion() {
        const btn = document.getElementById('btn_guardar');
        const datos = {
            turno: document.getElementById('turno').value,
            area: document.getElementById('area').value,
            maquina: document.getElementById('maquina').value,
            part_number: document.getElementById('num_parte').value,
            qty_inspected: parseInt(document.getElementById('cant_insp').value),
            qty_defective: parseInt(document.getElementById('cant_def').value),
            defect_type: document.getElementById('tipo_defecto').value,
            comments: document.getElementById('comentarios').value,
            disposition: document.getElementById('destino').value,
            created_at: new Date().toISOString()
        };

        if(!datos.part_number || isNaN(datos.qty_inspected)) return alert("Falta N/P o Cantidad");

        btn.disabled = true;
        btn.innerText = "Guardando...";

        const { error } = await client.from('inspecciones_calidad').insert([datos]);

        if (error) {
            alert("Error: " + error.message);
            btn.disabled = false;
            btn.innerText = "GUARDAR REGISTRO";
        } else {
            alert("✅ Guardado con éxito");
            location.reload();
        }
    }

    // Iniciar
    document.addEventListener('DOMContentLoaded', cargarDefectos);
</script>
</body>
</html>
