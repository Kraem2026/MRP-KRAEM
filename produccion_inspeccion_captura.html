<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura de Inspección Interna - KRAEM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #0f172a;
            --border: #e2e8f0; --success: #22c55e;
        }
        [data-theme="dark"] { 
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --border: #334155; 
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; transition: 0.3s; }
        
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; background: var(--card); padding: 12px; border-radius: 12px; border: 1px solid var(--border); }
        .btn-back { border: none; background: none; font-size: 1.2rem; cursor: pointer; color: var(--primary); }

        .form-container { max-width: 450px; margin: auto; background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; position: relative; }
        label { display: block; font-size: 11px; font-weight: 800; margin-bottom: 5px; color: #64748b; text-transform: uppercase; }
        
        input, select, textarea {
            width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px;
            font-size: 15px; box-sizing: border-box; outline: none; background: var(--bg); color: var(--text);
        }

        .autobox { 
            background: var(--card); border: 1px solid var(--border); position: absolute; 
            width: 100%; z-index: 1000; max-height: 200px; overflow-y: auto; display: none; 
            border-radius: 0 0 8px 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
        }
        .autobox div { padding: 12px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 14px; }
        .autobox div:hover { background: var(--bg); color: var(--primary); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-save {
            width: 100%; padding: 15px; background: var(--primary); color: white;
            border: none; border-radius: 12px; font-weight: bold; font-size: 16px;
            cursor: pointer; margin-top: 10px; transition: 0.3s;
        }
        .btn-save:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .readonly-box { background: rgba(0,0,0,0.05); font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<header class="header">
    <button class="btn-back" onclick="location.href='dashboard.html'"><i class="fas fa-arrow-left"></i> Volver</button>
    <button class="btn-back" onclick="toggleTheme()"><i id="themeIcon" class="fas fa-moon"></i></button>
</header>

<div class="form-container">
    <div class="grid-2">
        <div class="form-group">
            <label>Turno</label>
            <select id="turno">
                <option value="1">Turno 1</option>
                <option value="2">Turno 2</option>
            </select>
        </div>
        <div class="form-group">
            <label>Máquina</label>
            <input type="text" id="maquina" placeholder="Ej. #13">
        </div>
    </div>

    <div class="form-group">
        <label>Inspector Interno</label>
        <input type="text" id="inspector_interno" placeholder="Nombre del inspector">
    </div>

    <div class="form-group">
        <label>Operador</label>
        <input type="text" id="operador" placeholder="Nombre del operador">
    </div>

    <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">

    <div class="form-group" style="position:relative;">
        <label>Número de Parte</label>
        <input type="text" id="partSearch" placeholder="Escriba N/P..." autocomplete="off">
        <div id="partResults" class="autobox"></div>
    </div>

    <div class="form-group">
        <label>Nombre de Pieza</label>
        <input type="text" id="nombre_pieza" class="readonly-box" readonly placeholder="...">
    </div>

    <div class="grid-2">
        <div class="form-group">
            <label>Cant. Inspeccionada</label>
            <input type="number" id="cant_insp" oninput="calcularOk()">
        </div>
        <div class="form-group">
            <label>Cant. Defectuosa</label>
            <input type="number" id="cant_def" oninput="calcularOk()">
        </div>
    </div>

    <div class="grid-2">
        <div class="form-group">
            <label>Cantidad OK</label>
            <input type="number" id="cant_ok" class="readonly-box" readonly>
        </div>
        <div class="form-group">
            <label>Tipo de Defecto</label>
            <select id="tipo_defecto">
                <option value="">Cargando defectos...</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label>Comentarios</label>
        <textarea id="comentarios" rows="2" placeholder="Opcional..."></textarea>
    </div>

    <div class="form-group">
        <label>Destino</label>
        <select id="destino">
            <option value="LIBERADO">Liberado</option>
            <option value="RETRABAJO">Retrabajo</option>
            <option value="SCRAP">Scrap</option>
        </select>
    </div>

    <button class="btn-save" id="btn_guardar" onclick="guardarInspeccion()">
        <i class="fas fa-save"></i> GUARDAR INSPECCIÓN
    </button>
</div>

<script>
    let listaPartes = [];

    // Función para obtener el número de semana
    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }

    async function init() {
        // 1. Cargar Defectos desde la tabla 'defects'
        try {
            const { data: defs, error: errDef } = await client
                .from('defects')
                .select('Defect_name')
                .order('Defect_name', { ascending: true });

            const selectDef = document.getElementById('tipo_defecto');
            if (defs) {
                selectDef.innerHTML = '<option value="NINGUNO">N/A - OK</option>';
                defs.forEach(d => {
                    let opt = document.createElement('option');
                    opt.value = d.Defect_name;
                    opt.textContent = d.Defect_name;
                    selectDef.appendChild(opt);
                });
            }
        } catch (e) { console.error(e); }

        // 2. Cargar Partes para Autocomplete
        try {
            const { data: pts } = await client.from('parts').select('part_number, part_name');
            if (pts) listaPartes = pts;
        } catch (e) { console.error(e); }
    }

    // Lógica de Autocomplete
    const partSearch = document.getElementById('partSearch');
    const partResults = document.getElementById('partResults');
    const nombrePiezaInput = document.getElementById('nombre_pieza');

    partSearch.oninput = () => {
        const v = partSearch.value.toUpperCase();
        partResults.innerHTML = '';
        if (!v) { partResults.style.display = 'none'; return; }
        const filtered = listaPartes.filter(p => p.part_number.includes(v)).slice(0, 10);
        filtered.forEach(p => {
            const d = document.createElement('div');
            d.textContent = p.part_number;
            d.onclick = () => {
                partSearch.value = p.part_number;
                nombrePiezaInput.value = p.part_name;
                partResults.style.display = 'none';
            };
            partResults.appendChild(d);
        });
        partResults.style.display = filtered.length ? 'block' : 'none';
    };

    function calcularOk() {
        const insp = parseInt(document.getElementById('cant_insp').value) || 0;
        const def = parseInt(document.getElementById('cant_def').value) || 0;
        document.getElementById('cant_ok').value = Math.max(0, insp - def);
    }

    // --- GUARDAR EN inspeccion_produccion ---
    async function guardarInspeccion() {
        const btn = document.getElementById('btn_guardar');
        const ahora = new Date();

        const datos = {
            fecha: ahora.toISOString().split('T')[0], // YYYY-MM-DD
            semana: getWeekNumber(ahora),
            turno: parseInt(document.getElementById('turno').value),
            inspector_interno: document.getElementById('inspector_interno').value,
            maquina: document.getElementById('maquina').value,
            hora: ahora.toTimeString().split(' ')[0], // HH:MM:SS
            operador: document.getElementById('operador').value,
            num_parte: partSearch.value,
            nombre_pieza: nombrePiezaInput.value,
            cant_inspeccionada: parseInt(document.getElementById('cant_insp').value) || 0,
            cant_defectuosa: parseInt(document.getElementById('cant_def').value) || 0,
            cant_ok: parseInt(document.getElementById('cant_ok').value) || 0,
            tipo_defecto: document.getElementById('tipo_defecto').value,
            destino: document.getElementById('destino').value,
            comentarios: document.getElementById('comentarios').value
        };

        // Validación simple
        if (!datos.num_parte || !datos.inspector_interno) {
            return alert("Por favor llena el Número de Parte y el nombre del Inspector.");
        }

        btn.disabled = true;
        btn.innerText = "Guardando...";

        const { error } = await client.from('inspeccion_produccion').insert([datos]);

        if (error) {
            alert("Error al guardar: " + error.message);
            btn.disabled = false;
            btn.innerText = "GUARDAR INSPECCIÓN";
        } else {
            alert("✅ Registro guardado en Producción");
            location.reload();
        }
    }

    function toggleTheme() {
        document.body.toggleAttribute('data-theme');
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
