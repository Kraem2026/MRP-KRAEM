<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRAEM | Captura de Producción</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #0f172a; --border: #e2e8f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 15px; }
        .card { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .group { margin-bottom: 15px; position: relative; }
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        .autobox { position: absolute; width: 100%; background: white; border: 1px solid var(--border); z-index: 10; max-height: 150px; overflow-y: auto; display: none; border-radius: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .autobox div { padding: 8px; cursor: pointer; border-bottom: 1px solid #f1f5f9; }
        .autobox div:hover { background: var(--primary); color: white; }
        .btn-main { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h3 style="margin-top:0;">Registro de Inspección</h3>
    
    <div class="group">
        <label>Área</label>
        <select id="area_select"></select>
    </div>

    <div class="group">
        <label>Número de Parte</label>
        <input type="text" id="part_input" placeholder="Buscar..." autocomplete="off">
        <div id="part_box" class="autobox"></div>
    </div>

    <div class="group">
        <label>Descripción</label>
        <input type="text" id="desc_display" readonly style="background:#f1f5f9;">
    </div>

    <div class="group">
        <label>Tipo de Defecto</label>
        <select id="defect_select"></select>
    </div>

    <div class="group">
        <label>Cantidad Defectuosa</label>
        <input type="number" id="cant_def" value="0">
    </div>

    <button class="btn-main" onclick="guardar()">GUARDAR REGISTRO</button>
</div>

<script>
    let db_parts = [];

    async function init() {
        // 1. Cargar Áreas
        const { data: areas } = await client.from('areas').select('area_name').eq('active', true);
        const sArea = document.getElementById('area_select');
        areas?.forEach(a => sArea.innerHTML += `<option value="${a.area_name}">${a.area_name}</option>`);

        // 2. Cargar Defectos (Ya confirmamos que funciona con 'defects')
        const { data: defs } = await client.from('defects').select('Defect_name');
        const sDef = document.getElementById('defect_select');
        sDef.innerHTML = '<option value="NINGUNO">NINGUNO (OK)</option>';
        defs?.forEach(d => sDef.innerHTML += `<option value="${d.Defect_name}">${d.Defect_name}</option>`);

        // 3. Cargar Partes para Autocompletado
        const { data: parts } = await client.from('parts').select('part_number, part_name');
        db_parts = parts || [];
    }

    // Lógica Autocompletado (Optimizado para N/P)
    const pInput = document.getElementById('part_input');
    const pBox = document.getElementById('part_box');
    const pDesc = document.getElementById('desc_display');

    pInput.oninput = () => {
        const val = pInput.value.toUpperCase();
        pBox.innerHTML = '';
        if (!val) { pBox.style.display = 'none'; return; }
        
        const filtered = db_parts.filter(p => p.part_number.includes(val)).slice(0, 8);
        filtered.forEach(p => {
            const div = document.createElement('div');
            div.textContent = p.part_number;
            div.onclick = () => {
                pInput.value = p.part_number;
                pDesc.value = p.part_name;
                pBox.style.display = 'none';
            };
            pBox.appendChild(div);
        });
        pBox.style.display = filtered.length ? 'block' : 'none';
    };

    async function guardar() {
        const payload = {
            area: document.getElementById('area_select').value,
            num_parte: pInput.value,
            nombre_pieza: pDesc.value,
            tipo_defecto: document.getElementById('defect_select').value,
            cant_defectuosa: parseInt(document.getElementById('cant_def').value) || 0,
            fecha: new Date().toISOString().split('T')[0]
        };

        const { error } = await client.from('inspeccion_produccion').insert([payload]);
        if (error) alert("Error: " + error.message);
        else { alert("Guardado!"); location.reload(); }
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
