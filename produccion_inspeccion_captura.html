<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRAEM | Calidad 360</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #0f172a; --accent: #2563eb; --bg: #f1f5f9; 
            --card: #ffffff; --text: #1e293b; --border: #e2e8f0; 
            --danger: #ef4444; --success: #22c55e;
        }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        .form-card { 
            max-width: 650px; margin: 20px auto; background: var(--card); 
            padding: 25px; border-radius: 16px; border: 1px solid var(--border); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }

        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-back { 
            text-decoration: none; color: #64748b; font-size: 13px; font-weight: bold; 
            display: flex; align-items: center; gap: 8px; padding: 8px 12px;
            border-radius: 8px; border: 1px solid var(--border); background: white;
        }
        .btn-back:hover { background: #f8fafc; color: var(--accent); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .group { margin-bottom: 15px; position: relative; }
        
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 0.5px; }
        
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1px solid var(--border); 
            border-radius: 8px; font-size: 14px; box-sizing: border-box; 
            background: #fff;
        }
        
        .readonly { background: #f8fafc; font-weight: bold; color: var(--accent); border: 1px solid #e2e8f0; }
        
        /* Buscadores dinámicos */
        .autobox { 
            position: absolute; width: 100%; background: white; border: 1px solid var(--border); 
            z-index: 100; max-height: 180px; overflow-y: auto; display: none; 
            box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-radius: 8px; margin-top: 2px;
        }
        .autobox div { padding: 10px; cursor: pointer; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        .autobox div:hover { background: #eff6ff; color: var(--accent); }

        .btn-save { 
            width: 100%; padding: 16px; background: var(--accent); color: white; 
            border: none; border-radius: 10px; font-weight: bold; font-size: 16px; 
            cursor: pointer; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-save:hover { opacity: 0.9; transform: translateY(-1px); }

        .section-tag { 
            font-size: 11px; font-weight: 900; color: var(--accent); 
            margin: 20px 0 10px 0; display: flex; align-items: center; gap: 8px;
        }
    </style>
</head>
<body>

<div class="form-card">
    <div class="header-nav">
        <a href="dashboard.html" class="btn-back"><i class="fas fa-th-large"></i> DASHBOARD</a>
        <span style="font-size: 12px; color: #94a3b8; font-weight: bold;">MÓDULO DE INSPECCIÓN</span>
    </div>

    <h2 style="margin: 0; color: var(--primary);">Captura de Calidad</h2>
    <p style="margin: 5px 0 20px 0; font-size: 13px; color: #64748b;">Complete los datos para el reporte de rendimiento.</p>

    <div class="section-tag"><i class="fas fa-user-shield"></i> PERSONAL Y UBICACIÓN</div>
    <div class="grid">
        <div class="group">
            <label>Área</label>
            <select id="area_select"></select>
        </div>
        <div class="group">
            <label>Turno</label>
            <select id="turno"><option value="1">Turno 1</option><option value="2">Turno 2</option></select>
        </div>
    </div>

    <div class="grid">
        <div class="group">
            <label>Inspector (Calidad)</label>
            <select id="inspector_select"></select>
        </div>
        <div class="group">
            <label>Operador (Producción)</label>
            <select id="operador_select"></select>
        </div>
    </div>

    <div class="section-tag"><i class="fas fa-box"></i> INFORMACIÓN DEL PRODUCTO</div>
    <div class="group">
        <label>Buscar Pieza (N/P o Nombre)</label>
        <input type="text" id="part_input" placeholder="Ej: CV-100 o 'Cover'..." autocomplete="off">
        <div id="part_box" class="autobox"></div>
    </div>

    <div class="group">
        <label>Descripción del Producto</label>
        <input type="text" id="desc_display" class="readonly" readonly placeholder="Seleccione una pieza...">
    </div>

    <div class="grid">
        <div class="group">
            <label>Inspeccionado (Pzs)</label>
            <input type="number" id="cant_total" value="0" oninput="calcular()">
        </div>
        <div class="group">
            <label style="color: var(--danger);">Defectuoso (Pzs)</label>
            <input type="number" id="cant_def" value="0" oninput="calcular()">
        </div>
    </div>

    <div class="section-tag"><i class="fas fa-microscope"></i> DETALLE DE DEFECTO</div>
    <div class="grid">
        <div class="group">
            <label>Tipo de Defecto (Escriba para buscar)</label>
            <input type="text" id="defect_input" placeholder="Ej: Rayon, Rebabas..." autocomplete="off">
            <div id="defect_box" class="autobox"></div>
            <input type="hidden" id="defect_val_final" value="NINGUNO">
        </div>
        <div class="group">
            <label>Disposición</label>
            <select id="destino">
                <option value="LIBERADO">✅ LIBERADO</option>
                <option value="RETRABAJO">🔄 RETRABAJO</option>
                <option value="SCRAP">🗑️ SCRAP</option>
            </select>
        </div>
    </div>

    <div class="group">
        <label>Comentarios adicionales</label>
        <textarea id="notas" rows="2" placeholder="Opcional..."></textarea>
    </div>

    <div class="grid" style="background: #f8fafc; padding: 15px; border-radius: 12px; margin-top: 10px;">
        <div style="text-align: center; border-right: 1px solid #e2e8f0;">
            <label>Piezas OK</label>
            <span id="preview_ok" style="font-size: 20px; font-weight: 800; color: var(--success);">0</span>
        </div>
        <div style="text-align: center;">
            <label>% de Rechazo</label>
            <span id="porcentaje_def" style="font-size: 20px; font-weight: 800; color: var(--danger);">0%</span>
        </div>
    </div>

    <button class="btn-save" onclick="guardar()">
        <i class="fas fa-save"></i> GUARDAR INSPECCIÓN
    </button>
</div>

<script>
    let db_parts = [];
    let db_defects = [];

    // Carga inicial
    async function init() {
        // 1. Áreas
        const { data: areas } = await client.from('rh_areas').select('nombre').order('nombre');
        const sArea = document.getElementById('area_select');
        sArea.innerHTML = '<option value="">-- Seleccionar --</option>';
        areas?.forEach(a => sArea.innerHTML += `<option value="${a.nombre}">${a.nombre}</option>`);

        // 2. Personal (Inspectores y Operadores)
        const { data: personal } = await client.from('rh_empleados').select('nombre_completo').eq('estatus', 'ACTIVO').order('nombre_completo');
        const personalHtml = '<option value="">-- Seleccionar --</option>' + personal?.map(p => `<option value="${p.nombre_completo}">${p.nombre_completo}</option>`).join('');
        document.getElementById('inspector_select').innerHTML = personalHtml;
        document.getElementById('operador_select').innerHTML = personalHtml;

        // 3. Partes (Para buscador 1)
        const { data: parts } = await client.from('parts').select('part_number, part_name');
        db_parts = parts || [];

        // 4. Defectos (Para buscador 2 - Tabla 'defects' columna 'Defect_name')
        const { data: defs } = await client.from('defects').select('Defect_name').order('Defect_name');
        db_defects = defs || [];
    }

    // --- LÓGICA BUSCADOR PIEZAS ---
    const pInput = document.getElementById('part_input');
    const pBox = document.getElementById('part_box');
    pInput.oninput = () => {
        const val = pInput.value.toUpperCase();
        pBox.innerHTML = '';
        if(!val) { pBox.style.display = 'none'; return; }
        const fil = db_parts.filter(p => p.part_number.toUpperCase().includes(val) || (p.part_name && p.part_name.toUpperCase().includes(val))).slice(0,10);
        fil.forEach(p => {
            const d = document.createElement('div');
            d.innerHTML = `<b>${p.part_number}</b> - ${p.part_name || ''}`;
            d.onclick = () => { pInput.value = p.part_number; document.getElementById('desc_display').value = p.part_name; pBox.style.display='none'; };
            pBox.appendChild(d);
        });
        pBox.style.display = fil.length ? 'block' : 'none';
    };

    // --- LÓGICA BUSCADOR DEFECTOS ---
    const dInput = document.getElementById('defect_input');
    const dBox = document.getElementById('defect_box');
    dInput.oninput = () => {
        const val = dInput.value.toUpperCase();
        dBox.innerHTML = '';
        if(!val) { dBox.style.display = 'none'; return; }
        const fil = db_defects.filter(d => d.Defect_name.toUpperCase().includes(val)).slice(0,10);
        fil.forEach(d => {
            const div = document.createElement('div');
            div.innerHTML = d.Defect_name;
            div.onclick = () => { 
                dInput.value = d.Defect_name; 
                document.getElementById('defect_val_final').value = d.Defect_name;
                dBox.style.display = 'none'; 
            };
            dBox.appendChild(div);
        });
        dBox.style.display = fil.length ? 'block' : 'none';
    };

    function calcular() {
        const total = parseFloat(document.getElementById('cant_total').value) || 0;
        const def = parseFloat(document.getElementById('cant_def').value) || 0;
        document.getElementById('preview_ok').innerText = Math.max(0, total - def);
        document.getElementById('porcentaje_def').innerText = total > 0 ? ((def / total) * 100).toFixed(1) + "%" : "0%";
    }

    async function guardar() {
        const btn = document.querySelector('.btn-save');
        const data = {
            fecha: new Date().toISOString().split('T')[0],
            hora: new Date().toLocaleTimeString('en-GB'),
            turno: document.getElementById('turno').value,
            area: document.getElementById('area_select').value,
            inspector: document.getElementById('inspector_select').value,
            operador: document.getElementById('operador_select').value,
            num_parte: pInput.value,
            nombre_pieza: document.getElementById('desc_display').value,
            cant_inspeccionada: parseFloat(document.getElementById('cant_total').value) || 0,
            cant_defectuosa: parseFloat(document.getElementById('cant_def').value) || 0,
            tipo_defecto: document.getElementById('defect_val_final').value,
            destino: document.getElementById('destino').value,
            comentarios: document.getElementById('notas').value
        };

        if(!data.area || !data.num_parte || !data.operador) return alert("Faltan datos obligatorios");

        btn.disabled = true;
        const { error } = await client.from('inspeccion_produccion').insert([data]);
        if(error) { alert("Error: " + error.message); btn.disabled = false; }
        else { alert("¡Guardado!"); location.reload(); }
    }

    document.addEventListener('DOMContentLoaded', init);
    document.addEventListener('click', (e) => { 
        if(e.target !== pInput) pBox.style.display = 'none'; 
        if(e.target !== dInput) dBox.style.display = 'none';
    });
</script>
</body>
</html>
