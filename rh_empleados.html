<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRAEM | Gestión 360</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f8fafc; --text: #1e293b; --border: #e2e8f0; --success: #22c55e; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; }
        .container { max-width: 1400px; margin: auto; }
        
        /* Header Responsivo */
        .nav-header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 20px; }
        .btn-nav { padding: 10px 15px; border-radius: 8px; border: 1px solid var(--border); background: white; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; font-size: 14px; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; }

        /* Dashboard 360 - Layout adaptable */
        .dashboard-360 { display: grid; grid-template-columns: 320px 1fr 280px; gap: 15px; margin-bottom: 20px; display: none; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        
        .metric-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .metric-card { text-align: center; padding: 12px; border: 1px solid #f1f5f9; border-radius: 10px; background: #fff; }
        .metric-val { font-size: 22px; font-weight: 800; color: var(--accent); }
        .metric-lab { font-size: 9px; color: #64748b; text-transform: uppercase; font-weight: bold; }

        /* Modales */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); }
        .modal-content { background: white; width: 95%; max-width: 900px; margin: 2vh auto; padding: 20px; border-radius: 15px; max-height: 90vh; overflow-y: auto; }
        
        .inputs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .group { display: flex; flex-direction: column; }
        .group.full-width { grid-column: 1 / -1; }
        label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 4px; }
        input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; width: 100%; box-sizing: border-box; }

        /* Estilos Tabla */
        .table-card { background: white; border-radius: 12px; border: 1px solid var(--border); overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: #f8fafc; padding: 12px; text-align: left; font-size: 10px; color: #64748b; border-bottom: 2px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }

        /* RESPONSIVO PARA CELULAR */
        @media (max-width: 768px) {
            .dashboard-360 { grid-template-columns: 1fr; } /* Todo en una columna */
            .nav-header h2 { font-size: 18px; width: 100%; }
            .metric-grid { grid-template-columns: 1fr 1fr; } /* Métricas de 2 en 2 */
            .modal-content { width: 100%; height: 100%; margin: 0; border-radius: 0; }
            .form-flex { flex-direction: column; }
            .foto-perfil { margin: auto; }
        }

        .status-badge { padding: 4px 8px; border-radius: 6px; font-weight: bold; font-size: 10px; }
        .status-activo { background: #dcfce7; color: #166534; }
        .section-title { grid-column: 1/-1; border-bottom: 1px solid #eee; padding: 10px 0 5px 0; color: var(--accent); font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-header">
        <div style="display:flex; gap:10px; align-items:center;">
            <a href="dashboard.html" class="btn-nav"><i class="fas fa-home"></i></a>
            <h2 style="margin:0;">Personal KRAEM</h2>
        </div>
        <div style="display:flex; gap:8px;">
            <button class="btn-add" onclick="abrirModal()"><i class="fas fa-user-plus"></i> NUEVO</button>
        </div>
    </div>

    <div id="dash_analisis" class="dashboard-360">
        <div class="card" style="text-align: center;">
            <img id="view_foto" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:90px; height:90px; border-radius:50%; object-fit:cover; border:3px solid var(--accent);">
            <h3 id="view_nombre" style="margin:10px 0 2px 0; font-size:16px;">--</h3>
            <p id="view_puesto" style="font-size:11px; color:#64748b; margin-bottom:15px;">--</p>
            <div style="text-align:left; font-size:12px; background:#f8fafc; padding:10px; border-radius:10px;">
                <p style="margin:5px 0;"><strong>Antigüedad:</strong> <span id="view_anti">--</span></p>
                <p style="margin:5px 0;"><strong>Sangre:</strong> <span id="view_sangre">--</span></p>
                <p style="margin:5px 0;"><strong>Talla:</strong> <span id="view_talla">--</span></p>
            </div>
            <button class="btn-nav" style="width:100%; margin-top:10px; justify-content:center; border-color:var(--accent); color:var(--accent);" onclick="editarActual()">EDITAR PERFIL</button>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <label style="color:var(--accent); font-weight:bold;">DESEMPEÑO 360</label>
                <span id="rango_label" style="font-size:10px; color:#64748b;">Mes Actual</span>
            </div>
            <canvas id="chartRadar" style="max-height: 280px;"></canvas>
        </div>

        <div class="card metric-grid">
            <div class="metric-card"><div class="metric-lab">Calidad</div><div id="val_yield" class="metric-val">0%</div></div>
            <div class="metric-card"><div class="metric-lab">Asistencia</div><div id="val_asistencia" class="metric-val">0%</div></div>
            <div class="metric-card"><div class="metric-lab">Puntualidad</div><div id="val_puntualidad" class="metric-val">0%</div></div>
            <div class="metric-card"><div class="metric-lab">5'S Promedio</div><div id="val_5s" class="metric-val">0</div></div>
            <div class="metric-card" style="grid-column: 1/-1; background:#eff6ff;"><div class="metric-lab">Versatilidad</div><div id="val_versatilidad" class="metric-val">0%</div></div>
        </div>
    </div>

    <div class="card" style="margin-bottom:15px;">
        <div class="inputs-grid">
            <div class="group"><label>Nombre</label><input type="text" id="f_nombre" placeholder="Buscar..." oninput="aplicarFiltros()"></div>
            <div class="group"><label>Desde</label><input type="date" id="f_desde" onchange="actualizarTodo()"></div>
            <div class="group"><label>Hasta</label><input type="date" id="f_hasta" onchange="actualizarTodo()"></div>
            <div class="group"><label>Área</label><select id="f_area" onchange="aplicarFiltros()"></select></div>
        </div>
    </div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>Empleado</th>
                    <th>Área / Puesto</th>
                    <th>Antigüedad</th>
                    <th>Turno</th>
                    <th>Estatus</th>
                </tr>
            </thead>
            <tbody id="lista_empleados"></tbody>
        </table>
    </div>
</div>

<div id="modalRegistro" class="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h3 id="modal_titulo" style="margin:0;">Ficha de Personal</h3>
            <button onclick="cerrarModal()" style="border:none; background:none; font-size:22px; cursor:pointer;">&times;</button>
        </div>

        <div style="display:flex; flex-direction:column; gap:20px;">
            <input type="hidden" id="edit_id">
            
            <div class="inputs-grid">
                <div class="section-title">DATOS BÁSICOS</div>
                <div class="group full-width"><label>Nombre Completo</label><input type="text" id="nombre"></div>
                <div class="group"><label>Área</label><select id="sel_area"></select></div>
                <div class="group"><label>Puesto</label><select id="sel_puesto"></select></div>
                <div class="group"><label>Turno</label><select id="sel_turno"><option value="1">1</option><option value="2">2</option></select></div>
                <div class="group"><label>Estatus</label><select id="sel_estatus"><option value="ACTIVO">ACTIVO</option><option value="BAJA">BAJA</option></select></div>
                
                <div class="section-title">SEGURIDAD Y CONTACTO</div>
                <div class="group"><label>Sangre</label><input type="text" id="tipo_sangre"></div>
                <div class="group"><label>Talla</label><select id="sel_talla"><option value="S">S</option><option value="M">M</option><option value="L">L</option><option value="XL">XL</option></select></div>
                <div class="group"><label>Teléfono</label><input type="tel" id="telefono"></div>
                <div class="group"><label>Contacto Emergencia</label><input type="text" id="emergencia_nombre"></div>
                <div class="group"><label>Tel. Emergencia</label><input type="tel" id="emergencia_tel"></div>
                <div class="group full-width"><label>Alergias / Notas</label><input type="text" id="alergias"></div>
            </div>

            <button class="btn-add" style="width:100%; justify-content:center; padding:15px;" onclick="guardarEmpleado()">GUARDAR CAMBIOS</button>
        </div>
    </div>
</div>

<script>
    let db_empleados = [];
    let chartRadar;
    let currentEmpId = null;

    async function init() {
        const { data: areas } = await client.from('rh_areas').select('*').order('nombre');
        const { data: puestos } = await client.from('rh_puestos').select('*').order('nombre');
        
        const fill = (id, data) => {
            const s = document.getElementById(id);
            if(s) {
                s.innerHTML = '<option value="">Seleccione...</option>';
                data.forEach(d => s.innerHTML += `<option value="${d.id}">${d.nombre}</option>`);
            }
        };

        fill('sel_area', areas); fill('f_area', areas);
        fill('sel_puesto', puestos);
        await listarEmpleados();
    }

    async function listarEmpleados() {
        const { data } = await client.from('rh_empleados').select('*, rh_areas(nombre), rh_puestos(nombre)').order('nombre_completo');
        db_empleados = data.map(e => ({
            ...e,
            area_txt: e.rh_areas?.nombre || '--',
            puesto_txt: e.rh_puestos?.nombre || '--',
            anti: calcularAntiguedad(e.fecha_ingreso)
        }));
        aplicarFiltros();
    }

    function aplicarFiltros() {
        const n = document.getElementById('f_nombre').value.toLowerCase();
        const a = document.getElementById('f_area').value;
        const filtrados = db_empleados.filter(e => (!n || e.nombre_completo.toLowerCase().includes(n)) && (!a || e.area_id == a));
        
        document.getElementById('lista_empleados').innerHTML = filtrados.map(e => `
            <tr onclick="cargarAnalisis('${e.id}')">
                <td><b>${e.nombre_completo}</b></td>
                <td>${e.area_txt}<br><small>${e.puesto_txt}</small></td>
                <td>${e.anti}</td>
                <td>T${e.turno_id}</td>
                <td><span class="status-badge status-activo">${e.estatus}</span></td>
            </tr>`).join('');
    }

    function actualizarTodo() {
        if(currentEmpId) cargarAnalisis(currentEmpId);
    }

    async function cargarAnalisis(id) {
        const emp = db_empleados.find(e => e.id == id);
        currentEmpId = id;
        document.getElementById('dash_analisis').style.display = 'grid';

        // Lógica de fechas
        let desde = document.getElementById('f_desde').value;
        let hasta = document.getElementById('f_hasta').value;
        if(!desde) {
            const d = new Date();
            desde = new Date(d.getFullYear(), d.getMonth(), 1).toISOString().split('T')[0];
            hasta = new Date(d.getFullYear(), d.getMonth() + 1, 0).toISOString().split('T')[0];
        }
        document.getElementById('rango_label').innerText = `${desde} / ${hasta}`;

        // Cargar Datos Visuales
        document.getElementById('view_nombre').innerText = emp.nombre_completo;
        document.getElementById('view_puesto').innerText = emp.puesto_txt;
        document.getElementById('view_anti').innerText = emp.anti;
        document.getElementById('view_sangre').innerText = emp.tipo_sangre || 'N/A';
        document.getElementById('view_talla').innerText = emp.talla_playera || '--';

        // Cálculos Reales
        // 1. Asistencia y Puntualidad
        const { data: asist } = await client.from('rh_asistencia').select('estado').eq('empleado_id', id).gte('fecha', desde).lte('fecha', hasta);
        const tot = asist?.length || 0;
        const asistPct = tot > 0 ? ((asist.filter(a => a.estado !== 'FALTA').length / tot) * 100).toFixed(1) : 0;
        const puntPct = tot > 0 ? ((asist.filter(a => a.estado === 'ASISTENCIA').length / tot) * 100).toFixed(1) : 0;

        // 2. Yield
        const { data: prod } = await client.from('inspeccion_produccion').select('cant_inspeccionada, cant_defectuosa').eq('operador', emp.nombre_completo).gte('fecha', desde).lte('fecha', hasta);
        let ins = 0, def = 0; prod?.forEach(p => { ins += p.cant_inspeccionada; def += p.cant_defectuosa; });
        const yieldVal = ins > 0 ? ((1 - (def/ins)) * 100).toFixed(1) : 100;

        // 3. 5S
        const { data: fives } = await client.from('rh_evaluaciones_5s').select('puntuacion').eq('empleado_id', id).gte('fecha', desde).lte('fecha', hasta);
        const score5s = fives?.length > 0 ? (fives.reduce((a,b) => a + b.puntuacion, 0)/fives.length).toFixed(1) : 0;

        // UI
        document.getElementById('val_asistencia').innerText = asistPct + '%';
        document.getElementById('val_puntualidad').innerText = puntPct + '%';
        document.getElementById('val_yield').innerText = yieldVal + '%';
        document.getElementById('val_5s').innerText = score5s;

        renderRadar(yieldVal, asistPct, (score5s*20), 70, puntPct);
    }

    function renderRadar(y, a, s, v, p) {
        const ctx = document.getElementById('chartRadar').getContext('2d');
        if(chartRadar) chartRadar.destroy();
        chartRadar = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['Calidad', 'Asistencia', '5\'S', 'Versatilidad', 'Puntualidad'],
                datasets: [{
                    data: [y, a, s, v, p],
                    backgroundColor: 'rgba(37, 99, 235, 0.2)', borderColor: '#2563eb', pointBackgroundColor: '#2563eb'
                }]
            },
            options: { plugins: { legend: { display: false } }, scales: { r: { min: 0, max: 100 } } }
        });
    }

    function editarActual() {
        if(currentEmpId) {
            const emp = db_empleados.find(e => e.id == currentEmpId);
            document.getElementById('edit_id').value = emp.id;
            document.getElementById('nombre').value = emp.nombre_completo;
            document.getElementById('sel_area').value = emp.area_id || "";
            document.getElementById('sel_puesto').value = emp.puesto_id || "";
            document.getElementById('tipo_sangre').value = emp.tipo_sangre || "";
            document.getElementById('alergias').value = emp.alergias || "";
            document.getElementById('emergencia_nombre').value = emp.emergencia_nombre || "";
            document.getElementById('emergencia_tel').value = emp.emergencia_tel || "";
            document.getElementById('modalRegistro').style.display = 'block';
        }
    }

    function abrirModal() {
        document.getElementById('edit_id').value = "";
        document.querySelectorAll('#modalRegistro input, #modalRegistro select').forEach(i => i.value = "");
        document.getElementById('modalRegistro').style.display = 'block';
    }

    function cerrarModal() { document.getElementById('modalRegistro').style.display = 'none'; }

    async function guardarEmpleado() {
        const id = document.getElementById('edit_id').value;
        const obj = {
            nombre_completo: document.getElementById('nombre').value,
            area_id: document.getElementById('sel_area').value,
            puesto_id: document.getElementById('sel_puesto').value,
            tipo_sangre: document.getElementById('tipo_sangre').value,
            alergias: document.getElementById('alergias').value,
            emergencia_nombre: document.getElementById('emergencia_nombre').value,
            emergencia_tel: document.getElementById('emergencia_tel').value,
            estatus: document.getElementById('sel_estatus').value
        };

        const { error } = id ? await client.from('rh_empleados').update(obj).eq('id', id) : await client.from('rh_empleados').insert([obj]);
        if(!error) { alert("¡Guardado!"); cerrarModal(); listarEmpleados(); }
    }

    function calcularAntiguedad(f) {
        if(!f) return "--";
        const ini = new Date(f), hoy = new Date();
        let a = hoy.getFullYear() - ini.getFullYear();
        if (hoy.getMonth() < ini.getMonth()) a--;
        return a + " años";
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
