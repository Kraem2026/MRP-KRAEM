<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRAEM | Personal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f1f5f9; --text: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        .container { max-width: 1400px; margin: auto; }
        
        /* CABECERA */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* ANALISIS 360 */
        .dashboard-360 { display: grid; grid-template-columns: 300px 1fr 300px; gap: 20px; margin-bottom: 25px; display: none; }
        .card { background: white; padding: 20px; border-radius: 10px; shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* TABLA PRINCIPAL - ESTILO LIMPIO */
        .table-container { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        thead { background: #f8fafc; border-bottom: 2px solid #e2e8f0; }
        th { padding: 15px; font-size: 12px; text-transform: uppercase; color: #64748b; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        tr:hover { background: #f8fafc; cursor: pointer; }

        /* MODAL Y PESTAÑAS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { background: white; width: 90%; max-width: 800px; margin: 50px auto; border-radius: 12px; overflow: hidden; }
        .modal-header { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        
        .tabs { display: flex; background: #f8fafc; border-bottom: 1px solid #eee; }
        .tab-link { padding: 12px 20px; cursor: pointer; border: none; background: none; font-weight: bold; color: #64748b; }
        .tab-link.active { color: var(--accent); border-bottom: 3px solid var(--accent); }
        
        .tab-body { padding: 20px; max-height: 60vh; overflow-y: auto; }
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: 1 / -1; }
        
        label { display: block; font-size: 11px; font-weight: bold; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; }

        .status { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .status-activo { background: #dcfce7; color: #15803d; }
        .status-baja { background: #fee2e2; color: #b91c1c; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2><i class="fas fa-users"></i> Gestión de Personal</h2>
        <button class="btn-add" onclick="abrirModal()"><i class="fas fa-plus"></i> Nuevo Empleado</button>
    </div>

    <div id="dash_analisis" class="dashboard-360">
        <div class="card" style="text-align: center;">
            <img id="view_foto" src="" style="width:100px; height:100px; border-radius:50%; object-fit:cover; border:3px solid #2563eb;">
            <h3 id="view_nombre" style="margin:10px 0 5px 0;">-</h3>
            <p id="view_puesto" style="color:#64748b; font-size:13px;">-</p>
            <button class="btn-add" style="width:100%; margin-top:10px;" onclick="editarActual()">Editar Perfil</button>
        </div>
        <div class="card"><canvas id="chartRadar"></canvas></div>
        <div class="card">
            <label>Info Rápida</label>
            <div id="info_resumen" style="font-size:13px; line-height:2;"></div>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Nombre del Empleado</th>
                    <th>Área</th>
                    <th>Puesto</th>
                    <th>Ingreso</th>
                    <th>Antigüedad</th>
                    <th>Estatus</th>
                </tr>
            </thead>
            <tbody id="lista_empleados"></tbody>
        </table>
    </div>
</div>

<div id="modalRegistro" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="titulo_modal">Ficha de Empleado</h3>
            <span style="cursor:pointer; font-size:20px;" onclick="cerrarModal()">&times;</span>
        </div>
        
        <div class="tabs">
            <button class="tab-link active" onclick="cambiarTab(event, 'tab-datos')">Datos Laborales</button>
            <button class="tab-link" onclick="cambiarTab(event, 'tab-personal')">Médico / Personal</button>
            <button class="tab-link" onclick="cambiarTab(event, 'tab-vacaciones')">Vacaciones</button>
        </div>

        <div id="tab-datos" class="tab-body" style="display:block;">
            <div class="grid-form">
                <div class="full"><label>URL Foto</label><input type="text" id="foto_url"></div>
                <div class="full"><label>Nombre Completo</label><input type="text" id="nombre"></div>
                <div><label>NSS</label><input type="text" id="nss"></div>
                <div><label>Fecha Ingreso</label><input type="date" id="fecha_ingreso" onchange="calcVacas()"></div>
                <div><label>Área</label><select id="sel_area"></select></div>
                <div><label>Puesto</label><select id="sel_puesto"></select></div>
                <div><label>Turno</label><select id="sel_turno"><option value="1">Turno 1</option><option value="2">Turno 2</option></select></div>
                <div><label>Estatus</label><select id="sel_estatus"><option value="ACTIVO">ACTIVO</option><option value="BAJA">BAJA</option></select></div>
            </div>
        </div>

        <div id="tab-personal" class="tab-body" style="display:none;">
            <div class="grid-form">
                <div><label>Tipo de Sangre</label><input type="text" id="sangre"></div>
                <div><label>Talla Playera</label><input type="text" id="talla"></div>
                <div class="full"><label>Dirección</label><input type="text" id="direccion"></div>
                <div><label>Emergencia (Nombre)</label><input type="text" id="e_nombre"></div>
                <div><label>Emergencia (Tel)</label><input type="text" id="e_tel"></div>
            </div>
        </div>

        <div id="tab-vacaciones" class="tab-body" style="display:none;">
            <div style="display:flex; justify-content: space-around; background: #f1f5f9; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                <div style="text-align:center;"><label>Por Ley</label><b id="v_ley">0</b></div>
                <div style="text-align:center;"><label>Gozadas</label><b id="v_gozadas">0</b></div>
                <div style="text-align:center;"><label>Disponibles</label><b id="v_disp" style="color:green;">0</b></div>
            </div>
            <div class="grid-form">
                <div><label>Ajuste Manual (+/-)</label><input type="number" id="v_ajuste" value="0" oninput="calcVacas()"></div>
                <div><label>Días Tomados</label><input type="number" id="v_tomados" value="0" oninput="calcVacas()"></div>
            </div>
        </div>

        <div style="padding: 15px 20px; border-top: 1px solid #eee; text-align: right;">
            <button class="btn-add" onclick="guardar()">Guardar Cambios</button>
        </div>
    </div>
</div>

<script>
    let empleados = [];
    let actualId = null;

    async function cargar() {
        const { data } = await client.from('rh_empleados').select('*, rh_areas(nombre), rh_puestos(nombre)').order('nombre_completo');
        empleados = data;
        renderTabla();
    }

    function renderTabla() {
        const html = empleados.map(e => `
            <tr onclick="ver360('${e.id}')">
                <td><b>${e.nombre_completo}</b></td>
                <td>${e.rh_areas?.nombre || '-'}</td>
                <td>${e.rh_puestos?.nombre || '-'}</td>
                <td>${e.fecha_ingreso || '-'}</td>
                <td>${calcularAntiguedad(e.fecha_ingreso)}</td>
                <td><span class="status status-${e.estatus.toLowerCase()}">${e.estatus}</span></td>
            </tr>
        `).join('');
        document.getElementById('lista_empleados').innerHTML = html;
    }

    function ver360(id) {
        const e = empleados.find(x => x.id == id);
        actualId = id;
        document.getElementById('dash_analisis').style.display = 'grid';
        document.getElementById('view_foto').src = e.foto_url || 'https://via.placeholder.com/100';
        document.getElementById('view_nombre').innerText = e.nombre_completo;
        document.getElementById('view_puesto').innerText = e.rh_puestos?.nombre;
        document.getElementById('info_resumen').innerHTML = `
            <b>NSS:</b> ${e.nss || '-'}<br>
            <b>Dirección:</b> ${e.direccion || '-'}<br>
            <b>Sangre:</b> ${e.tipo_sangre || '-'}<br>
            <b>Vacaciones Disp:</b> ${((calcularDiasLey(e.fecha_ingreso) + (e.vacaciones_ajuste || 0)) - (e.vacaciones_gozadas || 0))} días
        `;
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function cambiarTab(evt, tabId) {
        document.querySelectorAll('.tab-body').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
        document.getElementById(tabId).style.display = 'block';
        evt.currentTarget.classList.add('active');
    }

    function calcVacas() {
        const f = document.getElementById('fecha_ingreso').value;
        const ley = calcularDiasLey(f);
        const ajuste = parseInt(document.getElementById('v_ajuste').value) || 0;
        const tomados = parseInt(document.getElementById('v_tomados').value) || 0;
        
        document.getElementById('v_ley').innerText = ley;
        document.getElementById('v_gozadas').innerText = tomados;
        document.getElementById('v_disp').innerText = (ley + ajuste) - tomados;
    }

    function calcularDiasLey(fecha) {
        if(!fecha) return 0;
        const anos = new Date().getFullYear() - new Date(fecha).getFullYear();
        if(anos < 1) return 0;
        if(anos == 1) return 12;
        if(anos == 2) return 14;
        if(anos == 3) return 16;
        if(anos == 4) return 18;
        if(anos == 5) return 20;
        if(anos >= 6 && anos <= 10) return 22;
        return 24;
    }

    function calcularAntiguedad(f) {
        if(!f) return '-';
        const dif = new Date() - new Date(f);
        const anos = Math.floor(dif / (1000 * 60 * 60 * 24 * 365));
        const meses = Math.floor((dif % (1000 * 60 * 60 * 24 * 365)) / (1000 * 60 * 60 * 24 * 30));
        return `${anos}a, ${meses}m`;
    }

    function abrirModal() {
        actualId = null;
        document.getElementById('modalRegistro').style.display = 'block';
        // Resetear campos aquí...
    }

    function cerrarModal() { document.getElementById('modalRegistro').style.display = 'none'; }

    async function guardar() {
        // Lógica de guardado...
        alert("Guardado correctamente");
        cerrarModal();
        cargar();
    }

    window.onload = cargar;
</script>
</body>
</html>
