<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRAEM | Gestión 360 y Transporte</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f8fafc; --text: #1e293b; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 15px; color: var(--text); margin: 0; }
        .container { max-width: 1600px; margin: auto; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btns { display: flex; gap: 10px; }
        .btn { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .btn-excel { background: #166534; color: white; }
        .btn-add { background: var(--accent); color: white; }

        /* Filtros en una fila */
        .filters-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .filters-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        label { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 5px; display: block; }
        select, input { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; }

        /* Tabla Estilo Columnas Independientes */
        .table-card { background: white; border-radius: 12px; border: 1px solid var(--border); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { background: #f8fafc; padding: 15px; text-align: left; font-size: 11px; color: #64748b; border-bottom: 2px solid var(--border); text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 13px; white-space: nowrap; }
        tr:hover { background: #f8fafc; cursor: pointer; }

        .status { padding: 4px 8px; border-radius: 5px; font-weight: bold; font-size: 10px; }
        .ACTIVO { background: #dcfce7; color: #166534; }
        .BAJA { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Gestión de Personal Kraem</h2>
        <div class="btns">
            <button class="btn btn-excel" onclick="exportarExcel()"><i class="fas fa-file-excel"></i> Exportar Excel</button>
            <button class="btn btn-add" onclick="abrirModal()"><i class="fas fa-plus"></i> Nuevo Empleado</button>
        </div>
    </div>

    <div class="filters-card">
        <div class="filters-grid">
            <div><label>Nombre</label><input type="text" id="f_nombre" oninput="aplicarFiltros()"></div>
            <div><label>Área</label><select id="f_area" onchange="aplicarFiltros()"></select></div>
            <div><label>Ruta</label><select id="f_ruta" onchange="aplicarFiltros()"></select></div>
            <div><label>Turno</label><select id="f_turno" onchange="aplicarFiltros()">
                <option value="">Todos</option><option value="1">1</option><option value="2">2</option>
            </select></div>
            <div><label>Estatus</label><select id="f_estatus" onchange="aplicarFiltros()">
                <option value="">Todos</option><option value="ACTIVO">ACTIVO</option><option value="BAJA">BAJA</option>
            </select></div>
        </div>
    </div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Área</th>
                    <th>Puesto</th>
                    <th>Ruta</th>
                    <th>Turno</th>
                    <th>Antigüedad</th>
                    <th>Estatus</th>
                </tr>
            </thead>
            <tbody id="lista_empleados"></tbody>
        </table>
    </div>
</div>

<script>
    let db_empleados = [];
    let filtrados_global = [];

    async function init() {
        // Cargar Áreas y Rutas para los selects
        const { data: a } = await client.from('rh_areas').select('*').order('nombre');
        const { data: r } = await client.from('rh_rutas').select('*').order('nombre');

        const fill = (id, data) => {
            const s = document.getElementById(id);
            s.innerHTML = '<option value="">Todos</option>';
            data?.forEach(d => s.innerHTML += `<option value="${d.id}">${d.nombre}</option>`);
        };

        fill('f_area', a);
        fill('f_ruta', r);

        await listarEmpleados();
    }

    async function listarEmpleados() {
        // Consultamos incluyendo las relaciones de nombres
        const { data, error } = await client.from('rh_empleados').select(`
            *,
            rh_areas(nombre),
            rh_puestos(nombre),
            rh_rutas(nombre)
        `).order('nombre_completo');

        if (error) {
            console.error("Error RLS o Relación:", error);
            // Si falla la relación por RLS, traemos los datos planos para no bloquear la app
            const { data: dataPlana } = await client.from('rh_empleados').select('*');
            db_empleados = dataPlana.map(e => procesarEmpleado(e));
        } else {
            db_empleados = data.map(e => procesarEmpleado(e));
        }
        
        aplicarFiltros();
    }

    function procesarEmpleado(e) {
        return {
            ...e,
            area_n: e.rh_areas?.nombre || 'N/A',
            puesto_n: e.rh_puestos?.nombre || 'N/A',
            ruta_n: e.rh_rutas?.nombre || 'N/A',
            anti_n: calcularAntiguedad(e.fecha_ingreso)
        };
    }

    function aplicarFiltros() {
        const n = document.getElementById('f_nombre').value.toLowerCase();
        const a = document.getElementById('f_area').value;
        const r = document.getElementById('f_ruta').value;
        const t = document.getElementById('f_turno').value;
        const s = document.getElementById('f_estatus').value;

        filtrados_global = db_empleados.filter(e => 
            (!n || e.nombre_completo.toLowerCase().includes(n)) &&
            (!a || e.area_id == a) &&
            (!r || e.ruta_id == r) &&
            (!t || e.turno_id == t) &&
            (!s || e.estatus == s)
        );

        const tbody = document.getElementById('lista_empleados');
        tbody.innerHTML = filtrados_global.map(e => `
            <tr>
                <td><b>${e.nombre_completo}</b></td>
                <td>${e.area_n}</td>
                <td>${e.puesto_n}</td>
                <td>${e.ruta_n}</td>
                <td>Turno ${e.turno_id}</td>
                <td>${e.anti_n}</td>
                <td><span class="status ${e.estatus}">${e.estatus}</span></td>
            </tr>
        `).join('');
    }

    function calcularAntiguedad(f) {
        if(!f) return "-";
        const ini = new Date(f), hoy = new Date();
        let a = hoy.getFullYear() - ini.getFullYear();
        let m = hoy.getMonth() - ini.getMonth();
        if (m < 0) { a--; m += 12; }
        return a > 0 ? `${a} años, ${m} m` : `${m} meses`;
    }

    function exportarExcel() {
        const dataReporte = filtrados_global.map(e => ({
            Empleado: e.nombre_completo,
            Area: e.area_n,
            Puesto: e.puesto_n,
            Ruta: e.ruta_n,
            Turno: e.turno_id,
            Antigüedad: e.anti_n,
            Estatus: e.estatus,
            Ingreso: e.fecha_ingreso
        }));

        const ws = XLSX.utils.json_to_sheet(dataReporte);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Personal");
        XLSX.writeFile(wb, "Reporte_Personal_Kraem.xlsx");
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
