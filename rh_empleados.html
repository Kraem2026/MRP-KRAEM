<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRAEM | Gestión de Personal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        
        .main-container { display: grid; grid-template-columns: 1fr 400px; gap: 20px; max-width: 1400px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        /* Tabla */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px; background: #f8fafc; font-size: 12px; color: #64748b; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
        tr:hover { background: #eff6ff; }

        /* Ficha de Perfil */
        .perfil-header { text-align: center; margin-bottom: 20px; }
        .avatar { width: 80px; height: 80px; background: #e2e8f0; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #94a3b8; }
        
        .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .kpi-box { padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; text-align: center; }
        .kpi-value { font-size: 18px; font-weight: bold; color: var(--primary); }
        .kpi-label { font-size: 10px; color: #64748b; text-transform: uppercase; }

        .btn-nav { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h2><i class="fas fa-users"></i> Directorio de Personal KRAEM</h2>
    <button class="btn-nav" onclick="location.href='dashboard.html'"><i class="fas fa-home"></i> Inicio</button>
</div>

<div class="main-container">
    <div class="card">
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <input type="text" id="buscador" placeholder="Buscar empleado..." style="padding: 10px; flex: 1; border-radius: 6px; border: 1px solid #ddd;">
        </div>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre Completo</th>
                    <th>Área</th>
                    <th>Estatus</th>
                </tr>
            </thead>
            <tbody id="tabla_empleados"></tbody>
        </table>
    </div>

    <div class="card" id="ficha_evaluacion" style="display: none;">
        <div class="perfil-header">
            <div class="avatar"><i class="fas fa-user"></i></div>
            <h3 id="p_nombre" style="margin:0;">Nombre Apellido</h3>
            <span id="p_puesto" style="font-size: 12px; color: #64748b;">Operador</span>
        </div>

        <div style="height: 250px;">
            <canvas id="graficaRadar"></canvas>
        </div>

        <div class="metric-grid">
            <div class="kpi-box">
                <div class="kpi-label">Yield (Calidad)</div>
                <div class="kpi-value" id="kpi_yield">0%</div>
            </div>
            <div class="kpi-box">
                <div class="kpi-label">Asistencia</div>
                <div class="kpi-value" id="kpi_asist">0%</div>
            </div>
        </div>

        <h4 style="margin-top: 20px; font-size: 13px; border-bottom: 1px solid #eee; padding-bottom: 5px;">Habilidades</h4>
        <div id="p_skills" style="display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px;">
            </div>
    </div>
</div>

<script>
    let chartRadar;

    async function cargarEmpleados() {
        const { data: emps } = await client.from('rh_empleados').select('*').eq('estatus', 'ACTIVO');
        const lista = document.getElementById('tabla_empleados');
        lista.innerHTML = '';

        emps.forEach(e => {
            lista.innerHTML += `
                <tr onclick="verDetalle('${e.nombre_completo}', '${e.id}')">
                    <td>${e.id}</td>
                    <td><b>${e.nombre_completo}</b></td>
                    <td>${e.area || 'N/A'}</td>
                    <td><span style="color: green;">● Activo</span></td>
                </tr>
            `;
        });
    }

    async function verDetalle(nombre, id) {
        document.getElementById('ficha_evaluacion').style.display = 'block';
        document.getElementById('p_nombre').innerText = nombre;

        // 1. Obtener Yield desde 'inspeccion_produccion'
        const { data: prod } = await client.from('inspeccion_produccion').select('cant_inspeccionada, cant_defectuosa').eq('operador', nombre);
        let total = 0, def = 0;
        prod?.forEach(r => { total += r.cant_inspeccionada; def += r.cant_defectuosa; });
        const yieldVal = total > 0 ? ((1 - (def/total)) * 100).toFixed(1) : 100;

        // 2. Obtener Asistencia (Simulado para este ejemplo, conecta a tu tabla)
        const asistVal = 95; // Aquí harías el query a rh_asistencia_diaria

        // 3. Obtener 5s (Última evaluación)
        const { data: fives } = await client.from('rh_evaluaciones_5s').select('puntuacion').eq('empleado_id', id).order('fecha', {ascending: false}).limit(1);
        const score5s = fives?.[0]?.puntuacion || 0;

        // Actualizar UI
        document.getElementById('kpi_yield').innerText = yieldVal + '%';
        document.getElementById('kpi_asist').innerText = asistVal + '%';
        
        renderRadar(yieldVal, asistVal, score5s);
    }

    function renderRadar(yield, asist, s5s) {
        const ctx = document.getElementById('graficaRadar').getContext('2d');
        if(chartRadar) chartRadar.destroy();

        chartRadar = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['Calidad', 'Asistencia', '5\'s', 'Versatilidad', 'Puntualidad'],
                datasets: [{
                    label: 'Puntaje',
                    data: [yield, asist, s5s, 70, 90], // Datos reales + demos
                    backgroundColor: 'rgba(37, 99, 235, 0.2)',
                    borderColor: '#2563eb',
                    borderWidth: 2
                }]
            },
            options: { scales: { r: { suggestedMin: 0, suggestedMax: 100 } } }
        });
    }

    window.onload = cargarEmpleados;
</script>
</body>
</html>
