<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Conteos Cíclicos Pro - KRAEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --text-secondary: #64748b;
            --border: #e2e8f0; --primary: #2563eb; --success: #22c55e; --danger: #ef4444;
        }
        [data-theme="dark"] {
            --bg: #020617; --card: #1e293b; --text: #f1f5f9; --text-secondary: #94a3b8;
            --border: #334155;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        header { max-width: 1400px; margin: 0 auto 20px; display: flex; justify-content: space-between; align-items: center; }
        .controls { display: flex; gap: 10px; }
        .btn { padding: 10px 18px; border-radius: 10px; border: 1px solid var(--border); cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-excel { background: #10b981; color: white; border: none; }
        .btn-pdf { background: #e74c3c; color: white; border: none; }
        
        .filter-panel { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); max-width: 1400px; margin: 0 auto 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; }
        input, select { padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); }

        .table-container { background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow-x: auto; max-width: 1400px; margin: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--bg); padding: 15px; text-align: left; font-size: 12px; border-bottom: 1px solid var(--border); color: var(--text-secondary); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        .abc-badge { padding: 4px 8px; border-radius: 5px; font-weight: 800; font-size: 12px; background: #f1f5f9; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--card); width: 90%; max-width: 850px; border-radius: 20px; padding: 25px; max-height: 85vh; overflow-y: auto; }
        .conteo-row { display: grid; grid-template-columns: 1.2fr 1.2fr 0.5fr 0.8fr 0.5fr; gap: 10px; margin-bottom: 10px; align-items: center; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

<header>
    <div>
        <h2 style="margin:0;">🔍 Conteos Cíclicos</h2>
        <span id="date-now" style="font-size: 12px; color: var(--text-secondary);"></span>
    </div>
    <div class="controls">
        <button class="btn btn-excel" onclick="exportCSV()"><i class="fas fa-file-excel"></i> Excel</button>
        <button class="btn btn-pdf" onclick="exportPDF()"><i class="fas fa-file-pdf"></i> PDF</button>
    </div>
</header>

<div class="filter-panel">
    <div class="filter-group"><label>Parte</label><input type="text" id="fParte" oninput="filterData()"></div>
    <div class="filter-group"><label>Proyecto</label><input type="text" id="fProy" oninput="filterData()"></div>
    <div class="filter-group"><label>ABC</label>
        <select id="fABC" onchange="filterData()"><option value="">TODOS</option><option value="A">A (30d)</option><option value="B">B (90d)</option><option value="C">C (180d)</option></select>
    </div>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th style="width: 30px;"><input type="checkbox" id="chkAll" onclick="toggleSelectAll(this)"></th>
                <th>N° Parte</th>
                <th>Proyecto</th>
                <th style="text-align:right">Stock Sistema</th>
                <th>Último Conteo</th>
                <th>Próximo Conteo</th>
                <th>ABC</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="mainBody"></tbody>
    </table>
</div>

<div id="modalConteo" class="modal">
    <div class="modal-content">
        <h3 id="mParte" style="margin-top:0; color:var(--primary)"></h3>
        <div id="conteoLines"></div>
        <button class="btn" onclick="addNewLine()" style="width:100%; border: 1px dashed var(--primary); color: var(--primary); margin-bottom: 15px;">+ AGREGAR UBICACIÓN EXTRA</button>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-primary" style="flex:1" onclick="saveMultiAdjust()">GUARDAR CONTEO</button>
            <button class="btn" onclick="cerrarModal()">CANCELAR</button>
        </div>
    </div>
</div>

<script>
const _client = supabase.createClient('https://telntsrrschcdxczlape.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlbG50c3Jyc2NoY2R4Y3psYXBlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ4NjI4MTcsImV4cCI6MjA4MDQzODgxN30.DC2teZ_4gk3wA7UmZJHyeZHjw5aOOEmmKvd3a8jRUyw');

let fullInventory = []; 
let locationsList = [];
let areasList = [];
let currentPart = null;

async function init() {
    document.getElementById('date-now').innerText = "Hoy: " + new Date().toLocaleDateString();
    
    // Cargamos tablas relacionadas
    const [invRes, locRes, partRes, areaRes] = await Promise.all([
        _client.from('v_inventory_by_location').select('*'),
        _client.from('locations').select('*'),
        _client.from('parts').select('part_number, project, abc, last_counted'),
        _client.from('areas').select('*') // Suponiendo tabla areas por area_id
    ]);

    locationsList = locRes.data || [];
    areasList = areaRes.data || [];

    const partDataMap = {};
    partRes.data?.forEach(p => partDataMap[p.part_number] = p);

    const grouped = {};
    invRes.data?.forEach(item => {
        if (!grouped[item.part_number]) {
            const extra = partDataMap[item.part_number] || {};
            const abc = extra.abc || 'C';
            const last = extra.last_counted;
            
            // Lógica de fechas (Hoy si no hay previo)
            const baseDate = last ? new Date(last) : new Date();
            const days = abc === 'A' ? 30 : (abc === 'B' ? 90 : 180);
            const next = new Date(baseDate);
            next.setDate(baseDate.getDate() + days);

            grouped[item.part_number] = { 
                part_number: item.part_number,
                project: extra.project || '-',
                abc: abc,
                last_counted: last || 'Sin registros',
                next_count: next.toISOString().split('T')[0],
                stock_total: 0,
                details: [],
                part_id: item.part_id
            };
        }
        grouped[item.part_number].stock_total += (item.quantity || 0);
        grouped[item.part_number].details.push(item);
    });

    fullInventory = Object.values(grouped);
    renderTable(fullInventory);
}

function renderTable(data) {
    const body = document.getElementById('mainBody');
    body.innerHTML = data.map(r => `
        <tr>
            <td><input type="checkbox" class="row-sel" data-id="${r.part_number}"></td>
            <td><b>${r.part_number}</b></td>
            <td>${r.project}</td>
            <td style="text-align:right; font-weight:700;">${r.stock_total.toLocaleString()}</td>
            <td>${r.last_counted}</td>
            <td style="color:${new Date(r.next_count) < new Date() ? 'red' : 'inherit'}">${r.next_count}</td>
            <td><span class="abc-badge">${r.abc}</span></td>
            <td><button class="btn btn-primary" onclick='abrirConteo(${JSON.stringify(r)})'>CONTAR</button></td>
        </tr>
    `).join('');
}

function abrirConteo(part) {
    currentPart = part;
    document.getElementById('mParte').innerText = part.part_number + " [" + part.project + "]";
    const container = document.getElementById('conteoLines');
    
    container.innerHTML = part.details.map(det => `
        <div class="conteo-row">
            <div style="font-size:11px;"><b>${det.area || 'N/A'}</b></div>
            <div style="font-size:11px;">${det.location || det.location_code}</div>
            <div style="color:gray; font-size:10px;">Sis: ${det.quantity}</div>
            <input type="number" class="val-fis" placeholder="Físico" oninput="calcDiff(this)">
            <div class="diff-result" style="font-weight:bold; text-align:right">0</div>
            <input type="hidden" class="loc-id" value="${det.location_id}">
            <input type="hidden" class="val-sis" value="${det.quantity}">
        </div>
    `).join('');
    document.getElementById('modalConteo').style.display = 'flex';
}

function addNewLine() {
    const container = document.getElementById('conteoLines');
    const div = document.createElement('div');
    div.className = 'conteo-row';
    const areaOpts = areasList.map(a => `<option value="${a.id}">${a.name || a.area_name}</option>`).join('');
    
    div.innerHTML = `
        <select class="area-sel" onchange="updateLocs(this)" style="font-size:10px;">
            <option value="">-- Área --</option>${areaOpts}
        </select>
        <select class="loc-id-new" style="font-size:10px;" disabled><option value="">-- Ubicación --</option></select>
        <div style="color:gray; font-size:10px;">Sis: 0</div>
        <input type="number" class="val-fis" placeholder="Hallazgo" oninput="calcDiff(this)">
        <div class="diff-result" style="font-weight:bold; text-align:right">0</div>
        <input type="hidden" class="val-sis" value="0">
    `;
    container.appendChild(div);
}

function updateLocs(sel) {
    const row = sel.closest('.conteo-row');
    const locSel = row.querySelector('.loc-id-new');
    const filtered = locationsList.filter(l => l.area_id == sel.value);
    locSel.innerHTML = '<option value="">-- Ubicación --</option>' + 
                       filtered.map(l => `<option value="${l.id}">${l.location_name || l.location_code}</option>`).join('');
    locSel.disabled = false;
}

function calcDiff(input) {
    const row = input.closest('.conteo-row');
    const sis = parseInt(row.querySelector('.val-sis').value) || 0;
    const fis = parseInt(input.value) || 0;
    const res = row.querySelector('.diff-result');
    const diff = fis - sis;
    res.innerText = (diff > 0 ? '+' : '') + diff;
    res.style.color = diff < 0 ? 'var(--danger)' : (diff > 0 ? 'var(--success)' : 'inherit');
}

async function saveMultiAdjust() {
    const rows = document.querySelectorAll('.conteo-row');
    const today = new Date().toISOString().split('T')[0];

    for (const row of rows) {
        const fisVal = row.querySelector('.val-fis').value;
        const locId = row.querySelector('.loc-id')?.value || row.querySelector('.loc-id-new')?.value;
        if (fisVal === "" || !locId) continue;

        const sis = parseInt(row.querySelector('.val-sis').value) || 0;
        const fis = parseInt(fisVal);
        const diff = fis - sis;

        if (diff !== 0) {
            const mov = {
                part_id: currentPart.part_id,
                quantity: Math.abs(diff),
                movement_type: 'AJUSTE',
                comment: `Cíclico Automático (Sis:${sis} Fis:${fis})`
            };
            if(diff < 0) mov.from_location_id = locId; else mov.to_location_id = locId;
            await _client.from('inventory_movements').insert([mov]);
        }
    }
    await _client.from('parts').update({ last_counted: today }).eq('part_number', currentPart.part_number);
    cerrarModal(); init();
}

function filterData() {
    const p = fParte.value.toLowerCase(), pr = fProy.value.toLowerCase(), abc = fABC.value;
    const filtered = fullInventory.filter(r => 
        r.part_number.toLowerCase().includes(p) && 
        r.project.toLowerCase().includes(pr) &&
        (abc === "" || r.abc === abc)
    );
    renderTable(filtered);
}

function exportCSV() {
    const checked = Array.from(document.querySelectorAll('.row-sel:checked')).map(cb => cb.getAttribute('data-id'));
    if(checked.length === 0) return alert("Selecciona filas");
    let csv = "\uFEFFParte,Proyecto,Stock,Ultimo,Proximo,ABC\n";
    fullInventory.filter(r => checked.includes(r.part_number)).forEach(r => {
        csv += `${r.part_number},${r.project},${r.stock_total},${r.last_counted},${r.next_count},${r.abc}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'Inventario_Ciclicos.csv'; a.click();
}

function exportPDF() {
    const { jsPDF } = window.jspdf; const doc = new jsPDF();
    const checked = Array.from(document.querySelectorAll('.row-sel:checked')).map(cb => {
        const r = cb.closest('tr');
        return [r.cells[1].innerText, r.cells[2].innerText, r.cells[3].innerText, r.cells[5].innerText, "_______"];
    });
    if(checked.length === 0) return alert("Selecciona filas");
    doc.text("KRAEM - AUDITORÍA CÍCLICA", 14, 20);
    doc.autoTable({ startY: 25, head: [['Parte', 'Proyecto', 'Stock', 'Vence', 'Físico']], body: checked });
    doc.save("Auditoria.pdf");
}

function toggleSelectAll(src) { document.querySelectorAll('.row-sel').forEach(cb => cb.checked = src.checked); }
function cerrarModal() { document.getElementById('modalConteo').style.display = 'none'; }
init();
</script>
</body>
</html>
