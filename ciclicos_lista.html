<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Conteos Cíclicos - KRAEM MRP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --text-secondary: #64748b;
            --border: #e2e8f0; --primary: #2563eb; --success: #22c55e; --danger: #ef4444;
            --dark-header: #1e293b;
        }
        [data-theme="dark"] {
            --bg: #020617; --card: #1e293b; --text: #f1f5f9; --text-secondary: #94a3b8;
            --border: #334155; --dark-header: #0f172a;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; max-width: 1400px; margin-inline: auto; }
        .btn-ui { padding: 10px 18px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .filter-panel { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; margin-bottom: 25px; max-width: 1400px; margin-inline: auto; }
        .filter-group { display: flex; flex-direction: column; gap: 6px; }
        .filter-group label { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; }
        input, select { padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 13px; outline: none; }
        .table-container { background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; max-width: 1400px; margin: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--dark-header); color: white; padding: 15px; font-size: 12px; text-transform: uppercase; }
        td { padding: 14px 15px; border-bottom: 1px solid var(--border); font-size: 13px; }
        .abc-badge { padding: 4px 10px; border-radius: 6px; font-weight: 800; font-size: 11px; background: #f1f5f9; color: #475569; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); width: 95%; max-width: 850px; border-radius: 20px; padding: 30px; max-height: 85vh; overflow-y: auto; }
        .conteo-header { display: grid; grid-template-columns: 1.5fr 1.5fr 1fr 1fr 1fr; gap: 10px; padding: 10px; background: var(--bg); border-radius: 8px; font-weight: bold; font-size: 11px; }
        .conteo-row { display: grid; grid-template-columns: 1.5fr 1.5fr 1fr 1fr 1fr; gap: 10px; align-items: center; padding: 12px 10px; border-bottom: 1px solid var(--border); }
        .save-btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .diff-result { font-weight: 800; text-align: center; }
        .neg { color: var(--danger); }
        .pos { color: var(--success); }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <button class="btn-ui" onclick="location.href='dashboard.html'"><i class="fas fa-arrow-left"></i> Menú</button>
        <h2>🔍 Auditoría de Conteos Cíclicos</h2>
    </div>
    <div style="display:flex; gap:12px;">
        <button class="btn-ui" onclick="exportCSV()" style="background:#10b981; color:white; border:none;"><i class="fas fa-file-excel"></i> Excel</button>
        <button class="btn-ui" onclick="toggleTheme()"><i id="themeIcon" class="fas fa-moon"></i></button>
    </div>
</header>

<div class="filter-panel">
    <div class="filter-group"><label>N° Parte</label><input type="text" id="fParte" oninput="filterData()"></div>
    <div class="filter-group"><label>Proyecto</label><input type="text" id="fProy" oninput="filterData()"></div>
    <div class="filter-group">
        <label>ABC</label>
        <select id="fABC" onchange="filterData()">
            <option value="">TODOS</option>
            <option value="A">A (30 días)</option>
            <option value="B">B (90 días)</option>
            <option value="C">C (180 días)</option>
        </select>
    </div>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>N° Parte</th>
                <th>Descripción</th>
                <th>Proyecto</th>
                <th>Stock</th>
                <th>Último</th>
                <th>Próximo</th>
                <th>ABC</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="mainBody"></tbody>
    </table>
</div>

<div id="modalConteo" class="modal">
    <div class="modal-content">
        <h3 id="mParte" style="color:var(--primary); margin:0;"></h3>
        <p id="mDesc" style="color:var(--text-secondary); margin-bottom:20px;"></p>

        <div class="conteo-header">
            <div>ÁREA</div><div>UBICACIÓN</div><div>SISTEMA</div><div>FÍSICO</div><div>DIF.</div>
        </div>
        <div id="conteoLines"></div>
        <button class="save-btn" onclick="saveMultiAdjust()">FINALIZAR AUDITORÍA Y ACTUALIZAR STOCK</button>
        <button onclick="cerrarModal()" style="width:100%; background:none; border:none; color:var(--text-secondary); margin-top:10px; cursor:pointer;">Cancelar</button>
    </div>
</div>

<script>
const _client = supabase.createClient('https://telntsrrschcdxczlape.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlbG50c3Jyc2NoY2R4Y3psYXBlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ4NjI4MTcsImV4cCI6MjA4MDQzODgxN30.DC2teZ_4gk3wA7UmZJHyeZHjw5aOOEmmKvd3a8jRUyw');

let fullInventory = []; 
let currentMasterPart = null;

async function init() {
    const { data, error } = await _client.from('v_inventory_general').select('*');
    if (error) return console.error(error);

    fullInventory = data.map(item => ({
        ...item,
        // Sincronización con nombres de columnas de Supabase
        display_last: item.last_count ? item.last_count.split('T')[0] : '---',
        display_next: item.next_count ? item.next_count.split('T')[0] : '---'
    }));
    filterData();
}

function renderTable(data) {
    document.getElementById('mainBody').innerHTML = data.map(r => `
        <tr>
            <td><b>${r.part_number}</b></td>
            <td style="font-size:11px;">${r.description || ''}</td>
            <td>${r.project || ''}</td>
            <td style="text-align:right;">${(r.total_quantity || 0)}</td>
            <td>${r.display_last}</td>
            <td style="color:${new Date(r.next_count) < new Date() ? 'red' : 'inherit'}">${r.display_next}</td>
            <td><span class="abc-badge">${r.abc || 'C'}</span></td>
            <td><button class="btn-ui" onclick='abrirAuditoria(${JSON.stringify(r)})'>Contar</button></td>
        </tr>
    `).join('');
}

async function abrirAuditoria(masterItem) {
    currentMasterPart = masterItem;
    document.getElementById('mParte').innerText = masterItem.part_number;
    document.getElementById('mDesc').innerText = masterItem.description;
    
    // Obtener stock por ubicación
    const { data: details } = await _client.from('v_inventory_by_location').select('*').eq('part_id', masterItem.part_id);
    
    const container = document.getElementById('conteoLines');
    if(!details || details.length === 0) {
        container.innerHTML = "<p style='text-align:center; padding:20px;'>Sin ubicaciones registradas.</p>";
    } else {
        container.innerHTML = details.map(det => `
            <div class="conteo-row">
                <div style="font-size:10px;">${det.area}</div>
                <div style="font-size:11px; font-weight:bold;">${det.location}</div>
                <input type="number" class="val-sis" value="${det.quantity}" readonly style="width:50px; border:none; text-align:center;">
                <input type="number" class="val-fis" placeholder="Cant" oninput="calcDiff(this)" style="width:100%; border:1px solid #2563eb; padding:5px; border-radius:5px;">
                <div class="diff-result">0</div>
                <input type="hidden" class="loc-id" value="${det.location_id}">
                <input type="hidden" class="area-name" value="${det.area}">
            </div>
        `).join('');
    }
    document.getElementById('modalConteo').style.display = 'flex';
}

function calcDiff(input) {
    const row = input.closest('.conteo-row');
    const sis = parseInt(row.querySelector('.val-sis').value) || 0;
    const fis = parseInt(input.value) || 0;
    const diff = fis - sis;
    const res = row.querySelector('.diff-result');
    res.innerText = (diff > 0 ? '+' : '') + diff;
    res.className = 'diff-result ' + (diff < 0 ? 'neg' : (diff > 0 ? 'pos' : ''));
}

async function saveMultiAdjust() {
    const rows = document.querySelectorAll('.conteo-row');
    const { data: { session } } = await _client.auth.getSession();
    
    if (!confirm("¿Guardar resultados y actualizar fechas de conteo?")) return;

    let totalMoves = 0;
    const hoy = new Date();

    for (const row of rows) {
        const fisVal = row.querySelector('.val-fis').value;
        if (fisVal === "") continue; // Ignorar si no se puso nada

        const sis = parseInt(row.querySelector('.val-sis').value) || 0;
        const fis = parseInt(fisVal);
        const diff = fis - sis;

        if (diff !== 0) {
            const locId = row.querySelector('.loc-id').value;
            const area = row.querySelector('.area-name').value;

            const mov = {
                part_id: currentMasterPart.part_id,
                quantity: Math.abs(diff),
                movement_type: 'AJUSTE',
                area: area,
                comment: `Ciclo: Sis ${sis} / Fis ${fis}`,
                user_id: session?.user?.id
            };

            if (diff > 0) mov.to_location_id = parseInt(locId);
            else mov.from_location_id = parseInt(locId);

            const { error } = await _client.from('inventory_movements').insert([mov]);
            if (!error) totalMoves++;
        }
    }

    // --- ACTUALIZACIÓN DE FECHAS (CORREGIDO) ---
    const diasABC = { 'A': 30, 'B': 90, 'C': 180 };
    const suma = diasABC[currentMasterPart.abc] || 180;
    
    const prox = new Date();
    prox.setDate(hoy.getDate() + suma);

    // IMPORTANTE: Aquí usamos 'last_count' y 'next_count' que son tus columnas reales
    const { error: updError } = await _client.from('parts').update({ 
        last_count: hoy.toISOString(),
        next_count: prox.toISOString()
    }).eq('id', currentMasterPart.part_id);

    if (updError) {
        console.error("Error al actualizar fechas:", updError);
    }

    alert(`Auditoría finalizada.\n- Ajustes realizados: ${totalMoves}\n- Próximo conteo: ${prox.toISOString().split('T')[0]}`);
    cerrarModal();
    init();
}

function filterData() {
    const p = document.getElementById('fParte').value.toLowerCase();
    const pr = document.getElementById('fProy').value.toLowerCase();
    const abc = document.getElementById('fABC').value;

    const filtered = fullInventory.filter(r => {
        return r.part_number.toLowerCase().includes(p) && 
               (r.project || "").toLowerCase().includes(pr) &&
               (!abc || r.abc === abc);
    });
    renderTable(filtered);
}

function cerrarModal() { document.getElementById('modalConteo').style.display = 'none'; }
function toggleTheme() {
    const isDark = document.body.getAttribute('data-theme') === 'dark';
    document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
}

init();
</script>
</body>
</html>
