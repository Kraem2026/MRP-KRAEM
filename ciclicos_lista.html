<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Conteos Cíclicos - KRAEM ERP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --text-secondary: #64748b;
            --border: #e2e8f0; --primary: #2563eb; --success: #22c55e; --danger: #ef4444;
        }
        [data-theme="dark"] {
            --bg: #020617; --card: #1e293b; --text: #f1f5f9; --text-secondary: #94a3b8;
            --border: #334155;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; }
        header { max-width: 1400px; margin: 0 auto 20px; display: flex; justify-content: space-between; align-items: center; }
        
        .btn-ui { padding: 10px 15px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        
        .filter-panel { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); max-width: 1400px; margin: 0 auto 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; }
        input, select { padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 13px; }

        .table-container { background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; max-width: 1400px; margin: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1e293b; color: white; padding: 15px; text-align: left; font-size: 12px; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 13px; }
        
        .abc-badge { padding: 3px 8px; border-radius: 4px; font-weight: 800; font-size: 10px; background: #f1f5f9; color: #475569; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: var(--card); width: 95%; max-width: 900px; border-radius: 20px; padding: 25px; max-height: 90vh; overflow-y: auto; }
        .conteo-row { display: grid; grid-template-columns: 1.2fr 1.2fr 0.8fr 0.8fr 0.5fr; gap: 10px; margin-bottom: 10px; align-items: center; padding: 10px; border-bottom: 1px solid var(--border); }
        
        .add-btn { width: 100%; padding: 12px; border: 1px dashed var(--primary); color: var(--primary); background: transparent; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 15px 0; }
        .save-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body data-theme="light">

<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <button class="btn-ui" onclick="location.href='dashboard.html'"><i class="fas fa-arrow-left"></i> <span id="txt-back">Menú</span></button>
        <h2 id="txt-title" style="margin:0;">🔍 Conteos Cíclicos</h2>
    </div>
    <div style="display:flex; gap:10px;">
        <button class="btn-ui" onclick="exportCSV()" style="background:#10b981; color:white; border:none;"><i class="fas fa-file-excel"></i> Excel</button>
        <button class="btn-ui" onclick="exportPDF()" style="background:#ef4444; color:white; border:none;"><i class="fas fa-file-pdf"></i> PDF</button>
        <button class="btn-ui" onclick="toggleLanguage()" id="langBtn">🇰🇷 KO</button>
        <button class="btn-ui" onclick="toggleTheme()"><i id="themeIcon" class="fas fa-moon"></i></button>
    </div>
</header>

<div class="filter-panel">
    <div class="filter-group"><label id="l-parte">Parte</label><input type="text" id="fParte" oninput="filterData()"></div>
    <div class="filter-group"><label id="l-proy">Proyecto</label><input type="text" id="fProy" oninput="filterData()"></div>
    <div class="filter-group"><label id="l-abc">ABC</label>
        <select id="fABC" onchange="filterData()">
            <option value="">TODOS</option>
            <option value="A">A (30 días)</option>
            <option value="B">B (90 días)</option>
            <option value="C">C (180 días)</option>
        </select>
    </div>
    <div class="filter-group"><label id="l-desde">Último Desde</label><input type="date" id="fDesde" onchange="filterData()"></div>
    <div class="filter-group"><label id="l-hasta">Próximo Hasta</label><input type="date" id="fHasta" onchange="filterData()"></div>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th style="width: 30px;"><input type="checkbox" onclick="toggleSelectAll(this)"></th>
                <th id="th-np">N° Parte</th>
                <th id="th-desc">Descripción</th>
                <th id="th-proy">Proyecto</th>
                <th id="th-stk">Stock</th>
                <th id="th-ult">Último</th>
                <th id="th-prox">Próximo</th>
                <th id="th-abc">ABC</th>
                <th id="th-acc">Acción</th>
            </tr>
        </thead>
        <tbody id="mainBody"></tbody>
    </table>
</div>

<div id="modalConteo" class="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 id="mParte" style="margin:0; color:var(--primary)"></h3>
            <button onclick="cerrarModal()" style="background:none; border:none; font-size:24px; cursor:pointer;">&times;</button>
        </div>
        <p id="mDesc" style="font-size:12px; color:var(--text-secondary); margin-bottom:20px;"></p>
        
        <div id="conteoLines"></div>
        
        <button class="add-btn" onclick="addNewLine()">+ AGREGAR UBICACIÓN / HALLAZGO</button>
        <button class="save-btn" onclick="saveMultiAdjust()" id="btn-save">GUARDAR AJUSTE DE INVENTARIO</button>
    </div>
</div>

<script>
const _client = supabase.createClient('https://telntsrrschcdxczlape.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlbG50c3Jyc2NoY2R4Y3psYXBlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ4NjI4MTcsImV4cCI6MjA4MDQzODgxN30.DC2teZ_4gk3wA7UmZJHyeZHjw5aOOEmmKvd3a8jRUyw');

let fullInventory = []; 
let areas = [];
let locations = [];
let currentLang = 'es';
let currentMasterPart = null;

const i18n = {
    es: { title: "🔍 Conteos Cíclicos", back: "Menú", np: "N° Parte", desc: "Descripción", proy: "Proyecto", stk: "Stock", ult: "Último", prox: "Próximo", abc: "ABC", acc: "Contar", save: "GUARDAR AJUSTE", lang: "🇰🇷 KO", l_parte: "Parte", l_proy: "Proyecto", l_abc: "ABC", l_desde: "Último Desde", l_hasta: "Próximo Hasta" },
    ko: { title: "🔍 재고 실사 관리", back: "메뉴", np: "부품 번호", desc: "품명", proy: "프로젝트", stk: "재고", ult: "최근 실사", prox: "차기 실사", abc: "등급", acc: "실사", save: "재고 조정 저장", lang: "🇲🇽 ES", l_parte: "부품", l_proy: "프로젝트", l_abc: "등급", l_desde: "최근일자부터", l_hasta: "차기일자까지" }
};

async function init() {
    const [resAreas, resLocs, resInv] = await Promise.all([
        _client.from('areas').select('*').eq('active', true),
        _client.from('locations').select('*').eq('active', true),
        _client.from('v_inventory_general').select('*')
    ]);

    areas = resAreas.data || [];
    locations = resLocs.data || [];
    
    fullInventory = (resInv.data || []).map(item => ({
        ...item,
        // Limpieza de fechas: solo YYYY-MM-DD
        last_counted: item.last_count ? item.last_count.split(' ')[0] : '-',
        next_count: item.next_count ? item.next_count.split(' ')[0] : '-'
    }));

    filterData();
}

function renderTable(data) {
    const body = document.getElementById('mainBody');
    body.innerHTML = data.map(r => `
        <tr>
            <td><input type="checkbox" class="row-sel" data-id="${r.part_number}"></td>
            <td><b>${r.part_number}</b></td>
            <td style="font-size:11px;">${r.description || 'N/A'}</td>
            <td style="color:var(--primary); font-weight:bold;">${r.project || '-'}</td>
            <td style="text-align:right;"><b>${(r.total_quantity || 0).toLocaleString()}</b></td>
            <td>${r.last_counted}</td>
            <td style="color:${new Date(r.next_count) < new Date() ? 'var(--danger)' : 'inherit'}">${r.next_count}</td>
            <td><span class="abc-badge">${r.abc || 'C'}</span></td>
            <td><button class="btn-ui" style="padding:5px 10px; font-size:11px;" onclick='abrirAuditoria(${JSON.stringify(r)})'>${i18n[currentLang].acc}</button></td>
        </tr>
    `).join('');
}

async function abrirAuditoria(masterItem) {
    currentMasterPart = masterItem;
    document.getElementById('mParte').innerText = masterItem.part_number;
    document.getElementById('mDesc').innerText = `${masterItem.description} | Proyecto: ${masterItem.project}`;
    
    const { data: details } = await _client.from('v_inventory_by_location').select('*').eq('part_id', masterItem.part_id);
    
    const container = document.getElementById('conteoLines');
    container.innerHTML = (details || []).map(det => `
        <div class="conteo-row">
            <div style="font-size:11px;"><b>${det.area}</b></div>
            <div style="font-size:11px;">${det.location}</div>
            <div style="text-align:center; color:var(--text-secondary);">Sis: ${det.quantity}</div>
            <input type="number" class="val-fis" placeholder="Físico" oninput="calcDiff(this)" style="width:100%">
            <div class="diff-result" style="font-weight:bold; text-align:right;">0</div>
            <input type="hidden" class="loc-id" value="${det.location_id}">
            <input type="hidden" class="val-sis" value="${det.quantity}">
            <input type="hidden" class="area-name" value="${det.area}">
        </div>
    `).join('');
    
    document.getElementById('modalConteo').style.display = 'flex';
}

function addNewLine() {
    const div = document.createElement('div');
    div.className = 'conteo-row';
    const id = Date.now();
    div.innerHTML = `
        <select onchange="fillLocs(this.value, 'loc_${id}')" style="font-size:10px;"><option value="">Área...</option>${areas.map(a=>`<option value="${a.id}">${a.area_name}</option>`).join('')}</select>
        <select id="loc_${id}" class="loc-id-new" style="font-size:10px;"><option value="">Ubicación...</option></select>
        <div style="text-align:center; color:var(--text-secondary);">Sis: 0</div>
        <input type="number" class="val-fis" placeholder="Físico" oninput="calcDiff(this)" style="width:100%">
        <div class="diff-result" style="font-weight:bold; text-align:right;">0</div>
        <input type="hidden" class="val-sis" value="0">
    `;
    document.getElementById('conteoLines').appendChild(div);
}

function fillLocs(areaId, targetId) {
    const sel = document.getElementById(targetId);
    const filtered = locations.filter(l => l.area_id == areaId);
    sel.innerHTML = '<option value="">...</option>' + filtered.map(l=>`<option value="${l.id}">${l.location_code}</option>`).join('');
}

function calcDiff(input) {
    const row = input.closest('.conteo-row');
    const sis = parseInt(row.querySelector('.val-sis').value) || 0;
    const fis = parseInt(input.value) || 0;
    const diff = fis - sis;
    const res = row.querySelector('.diff-result');
    res.innerText = (diff > 0 ? '+' : '') + diff;
    res.style.color = diff < 0 ? 'var(--danger)' : (diff > 0 ? 'var(--success)' : 'inherit');
}

async function saveMultiAdjust() {
    const rows = document.querySelectorAll('.conteo-row');
    const { data: { session } } = await _client.auth.getSession();
    if (!confirm("¿Aplicar ajustes a la base de datos?")) return;

    let changes = 0;
    for (const row of rows) {
        const fisVal = row.querySelector('.val-fis').value;
        if (fisVal === "") continue;

        const sis = parseInt(row.querySelector('.val-sis').value) || 0;
        const fis = parseInt(fisVal);
        const diff = fis - sis;

        if (diff !== 0) {
            const locId = row.querySelector('.loc-id')?.value || row.querySelector('.loc-id-new')?.value;
            const areaName = row.querySelector('.area-name')?.value || areas.find(a=>a.id == row.querySelector('select')?.value)?.area_name;

            const mov = {
                part_id: currentMasterPart.part_id,
                quantity: Math.abs(diff),
                movement_type: 'AJUSTE',
                area: areaName,
                comment: `Ciclo: Sis ${sis} / Fis ${fis}`,
                user_id: session?.user?.id
            };

            if (diff > 0) mov.to_location_id = parseInt(locId);
            else mov.from_location_id =
