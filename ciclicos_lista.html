<script>
    // Buscamos la función destInput.oninput y la reemplazamos con esta lógica:
    destInput.oninput = () => {
        const v = destInput.value.toUpperCase();
        // Detectamos el área actual (si es transferencia usa el destino, si no el origen)
        const aId = (mode === 'TRANSFERENCIA') ? areaDestSelect.value : areaSelect.value;
        
        destBox.innerHTML = '';
        if(!v) { destBox.style.display = 'none'; return; }

        // FILTRO ESTRICTO: Coincidencia de texto Y pertenencia al área seleccionada
        const m = locations.filter(l => 
            l.area_id == aId && 
            l.location_code.toUpperCase().includes(v)
        ).slice(0, 10);

        if(m.length > 0) {
            m.forEach(l => { 
                const d = document.createElement('div'); 
                d.textContent = l.location_code; 
                d.style.padding = '10px';
                d.style.cursor = 'pointer';
                d.style.borderBottom = '1px solid var(--border)';
                
                d.onclick = () => {
                    destInput.value = l.location_code; 
                    selDestId = l.id; 
                    destBox.style.display = 'none';
                }; 
                destBox.appendChild(d); 
            });
            destBox.style.display = 'block';
        } else {
            destBox.style.display = 'none';
        }
    };
</script>
