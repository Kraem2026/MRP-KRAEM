<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Conteos Cíclicos Pro - KRAEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --text-secondary: #64748b;
            --border: #e2e8f0; --primary: #2563eb; --success: #22c55e; --danger: #ef4444;
            --dark-header: #1e293b;
        }
        [data-theme="dark"] {
            --bg: #020617; --card: #1e293b; --text: #f1f5f9; --text-secondary: #94a3b8;
            --border: #334155; --dark-header: #0f172a;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; max-width: 1400px; margin-inline: auto; }
        .btn-ui { padding: 10px 18px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        
        .filter-panel { 
            background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;
            margin-bottom: 25px; max-width: 1400px; margin-inline: auto;
        }
        .filter-group { display: flex; flex-direction: column; gap: 6px; }
        .filter-group label { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; }
        
        input, select { padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 13px; outline: none; }
        
        .table-container { background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; max-width: 1400px; margin: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--dark-header); color: white; padding: 15px; font-size: 11px; text-transform: uppercase; text-align: left; }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 13px; }
        
        .abc-badge { background: var(--primary); color: white; padding: 4px 8px; border-radius: 6px; font-weight: 800; font-size: 10px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); width: 95%; max-width: 900px; border-radius: 20px; padding: 30px; max-height: 85vh; overflow-y: auto; }
        .conteo-header { display: grid; grid-template-columns: 1.5fr 1.5fr 1fr 1fr 1fr 40px; gap: 10px; padding: 10px; background: var(--bg); border-radius: 8px; font-weight: bold; font-size: 11px; margin-bottom: 10px; }
        .conteo-row { display: grid; grid-template-columns: 1.5fr 1.5fr 1fr 1fr 1fr 40px; gap: 10px; align-items: center; padding: 12px 10px; border-bottom: 1px solid var(--border); }
        .save-btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .diff-result { font-weight: 800; text-align: center; }
        .neg { color: var(--danger); }
        .pos { color: var(--success); }
    </style>
</head>
<body data-theme="light">

<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <button class="btn-ui" onclick="location.href='dashboard.html'"><i class="fas fa-arrow-left"></i> <span id="btn-back">Menú</span></button>
        <h2 id="txt-title">🔍 Auditoría de Conteos Cíclicos</h2>
    </div>
    <div style="display:flex; gap:12px;">
        <button class="btn-ui" onclick="exportToExcel()" style="background:#107c41; color:white; border:none;"><i class="fas fa-file-excel"></i> Excel</button>
        <button class="btn-ui" onclick="exportToPDF()" style="background:#ef4444; color:white; border:none;"><i class="fas fa-file-pdf"></i> Auditoría</button>
        <button class="btn-ui" onclick="setLang('es')">🇲🇽</button>
        <button class="btn-ui" onclick="setLang('ko')">🇰🇷</button>
        <button class="btn-ui" onclick="toggleTheme()"><i id="themeIcon" class="fas fa-moon"></i></button>
    </div>
</header>

<div class="filter-panel">
    <div class="filter-group"><label id="lbl-search">Búsqueda (N/P o Desc.)</label><input type="text" id="fGeneral" oninput="filterData()" placeholder="Buscar..."></div>
    <div class="filter-group"><label id="lbl-project">Proyecto</label><input type="text" id="fProy" oninput="filterData()" placeholder="Filtrar..."></div>
    <div class="filter-group"><label id="lbl-date">Rango Último Conteo</label><div style="display:flex; gap:5px;"><input type="date" id="fFechaInicio" onchange="filterData()"><input type="date" id="fFechaFin" onchange="filterData()"></div></div>
    <div class="filter-group"><label>ABC</label><select id="fABC" onchange="filterData()"><option value="">TODOS</option><option value="A">Clase A</option><option value="B">Clase B</option><option value="C">Clase C</option></select></div>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th style="width: 40px;"><input type="checkbox" id="selectAll" onclick="toggleSelectAll()"></th>
                <th id="th-part">N° Parte</th>
                <th id="th-desc">Descripción</th>
                <th id="th-proj">Proyecto</th>
                <th id="th-stock" style="text-align:right;">Stock</th>
                <th id="th-last">Último</th>
                <th id="th-next">Próximo</th>
                <th>ABC</th>
                <th id="th-action">Acción</th>
            </tr>
        </thead>
        <tbody id="mainBody"></tbody>
    </table>
</div>

<div id="modalConteo" class="modal">
    <div class="modal-content">
        <h3 id="mParte" style="color:var(--primary); margin:0;"></h3>
        <p id="mDesc" style="color:var(--text-secondary); margin:5px 0; font-size: 13px;"></p>
        <div class="conteo-header"><div id="mdl-area">ÁREA</div><div id="mdl-loc">UBICACIÓN</div><div id="mdl-sis">SISTEMA</div><div id="mdl-fis">FÍSICO</div><div>DIF.</div><div></div></div>
        <div id="conteoLines"></div>
        <div class="add-line-btn" onclick="addNewLine()" style="cursor:pointer; color:var(--primary); margin: 15px 0;"><i class="fas fa-plus-circle"></i> <span id="mdl-add">Ubicación extra</span></div>
        <button class="save-btn" onclick="saveMultiAdjust()" id="btn-save">GUARDAR AJUSTES</button>
        <button onclick="cerrarModal()" id="btn-close-mdl" style="width:100%; background:none; border:none; color:var(--text-secondary); margin-top:10px; cursor:pointer;">Cerrar</button>
    </div>
</div>

<script>
const _client = supabase.createClient('https://telntsrrschcdxczlape.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlbG50c3Jyc2NoY2R4Y3psYXBlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ4NjI4MTcsImV4cCI6MjA4MDQzODgxN30.DC2teZ_4gk3wA7UmZJHyeZHjw5aOOEmmKvd3a8jRUyw');

let fullInventory = []; 
let currentMasterPart = null;
let allAreas = [];
let allLocations = [];

const i18n = {
    es: { title: "🔍 Auditoría de Conteos Cíclicos", back: "Menú", search: "Búsqueda (N/P o Desc.)", project: "Proyecto", date: "Último Conteo", thPart: "N° Parte", thDesc: "Descripción", thProj: "Proyecto", thStock: "Stock", thLast: "Último", thNext: "Próximo", thAction: "Acción", mdlArea: "ÁREA", mdlLoc: "UBICACIÓN", mdlSis: "SISTEMA", mdlFis: "FÍSICO", mdlAdd: "Ubicación extra", btnSave: "GUARDAR AJUSTES", btnClose: "Cerrar" },
    ko: { title: "🔍 순환 재고 실사", back: "메뉴", search: "검색", project: "프로젝트", date: "마지막 실사", thPart: "부품 번호", thDesc: "설명", thProj: "프로젝트", thStock: "재고", thLast: "마지막", thNext: "다음", thAction: "작업", mdlArea: "구역", mdlLoc: "위치", mdlSis: "시스템", mdlFis: "실사", mdlAdd: "위치 추가", btnSave: "조정 저장", btnClose: "닫기" }
};

async function init() {
    const [resInv, resAreas, resLocs] = await Promise.all([
        _client.from('v_inventory_general').select('*'),
        _client.from('areas').select('*').eq('active', true).order('area_name'),
        _client.from('locations').select('*').eq('active', true).order('location_code')
    ]);
    allAreas = resAreas.data || [];
    allLocations = resLocs.data || [];
    fullInventory = (resInv.data || []).map(item => ({ ...item, display_last: item.last_count ? item.last_count.split('T')[0] : '---', display_next: item.next_count ? item.next_count.split('T')[0] : '---' }));
    filterData();
}

function renderTable(data) {
    document.getElementById('mainBody').innerHTML = data.map(r => `
        <tr>
            <td><input type="checkbox" class="row-checkbox" data-id="${r.part_id || r.id}"></td>
            <td><b>${r.part_number}</b></td>
            <td style="font-size:11px;">${r.description || ''}</td>
            <td>${r.project || '-'}</td>
            <td style="text-align:right;"><b>${(r.total_quantity || 0).toLocaleString()}</b></td>
            <td>${r.display_last}</td>
            <td style="color:${new Date(r.next_count) < new Date() ? 'red' : 'inherit'}">${r.display_next}</td>
            <td><span class="abc-badge">${r.abc || 'C'}</span></td>
            <td><button class="btn-ui" style="background:var(--primary); color:white; border:none; padding:5px 10px;" onclick='abrirAuditoria(${JSON.stringify(r)})'>Audit</button></td>
        </tr>
    `).join('');
}

function toggleSelectAll() {
    const master = document.getElementById('selectAll').checked;
    document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = master);
}

function filterData() {
    const q = document.getElementById('fGeneral').value.toLowerCase();
    const p = document.getElementById('fProy').value.toLowerCase();
    const a = document.getElementById('fABC').value;
    const fI = document.getElementById('fFechaInicio').value;
    const fF = document.getElementById('fFechaFin').value;
    const filtered = fullInventory.filter(r => {
        const tM = r.part_number.toLowerCase().includes(q) || (r.description && r.description.toLowerCase().includes(q));
        const pM = r.project ? r.project.toLowerCase().includes(p) : true;
        const aM = a === "" || r.abc === a;
        let dM = true;
        if (fI && r.last_count) { const dU = r.last_count.split('T')[0]; dM = dU >= fI && (!fF || dU <= fF); }
        return tM && pM && aM && dM;
    });
    renderTable(filtered);
}

async function exportToExcel() {
    const selectedIds = Array.from(document.querySelectorAll('.row-checkbox:checked')).map(cb => cb.dataset.id);
    if (selectedIds.length === 0) return alert("Selecciona al menos una fila.");
    const dataToExport = fullInventory.filter(r => selectedIds.includes(String(r.part_id || r.id)));
    const ws = XLSX.utils.json_to_sheet(dataToExport.map(r => ({ "N° Parte": r.part_number, "Descripción": r.description, "Proyecto": r.project, "Stock": r.total_quantity, "Último Conteo": r.display_last, "ABC": r.abc })));
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Inventario");
    XLSX.writeFile(wb, "Inventario_Kraem.xlsx");
}

async function exportToPDF() {
    const selectedIds = Array.from(document.querySelectorAll('.row-checkbox:checked')).map(cb => cb.dataset.id);
    if (selectedIds.length === 0) return alert("Selecciona al menos una fila.");

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p', 'pt', 'a4');
    
    const { data: locData, error } = await _client.from('v_inventory_by_location').select('*').in('part_id', selectedIds);
    if(error) return alert("Error al obtener ubicaciones: " + error.message);

    doc.setFontSize(16); doc.text("HOJA DE AUDITORÍA DE INVENTARIO - KRAEM", 40, 50);
    doc.setFontSize(9); doc.text(`Fecha: ${new Date().toLocaleString()}   |   Planta: Kraem de Inyección de Plástico`, 40, 65);

    const tableBody = [];
    selectedIds.forEach(id => {
        const master = fullInventory.find(f => String(f.part_id || f.id) === id);
        const locations = locData.filter(l => String(l.part_id) === id);
        if (locations.length > 0) {
            locations.forEach((l, idx) => {
                tableBody.push([
                    idx === 0 ? master.part_number : '', 
                    idx === 0 ? (master.description || '').substring(0,30) : '', 
                    l.area_name || l.area || 'N/A', 
                    l.location_code || l.location || 'S/U', 
                    l.quantity, 
                    '', 
                    ''
                ]);
            });
        } else {
            tableBody.push([master.part_number, master.description, 'N/A', 'SIN UBICACIÓN', 0, '', '']);
        }
    });

    doc.autoTable({
        startY: 85,
        head: [['N° Parte', 'Descripción', 'Área', 'Ubicación', 'Sist.', 'Físico', 'Dif.']],
        body: tableBody,
        theme: 'grid',
        styles: { fontSize: 8 },
        headStyles: { fillColor: [30, 41, 59] }
    });

    let currentY = doc.lastAutoTable.finalY + 30;
    doc.setFontSize(10); doc.setFont(undefined, 'bold');
    doc.text("HALLAZGOS / MATERIAL EN UBICACIONES NO LISTADAS", 40, currentY);
    
    doc.autoTable({
        startY: currentY + 10,
        head: [['N° Parte', 'Área / Ubicación encontrada', 'Cantidad', 'Notas']],
        body: [['', '', '', ''], ['', '', '', '']],
        theme: 'grid',
        styles: { fontSize: 8, minCellHeight: 25 },
        headStyles: { fillColor: [100, 116, 139] }
    });

    const finalY = doc.lastAutoTable.finalY + 70;
    doc.line(40, finalY, 200, finalY); doc.text("Firma de Contador (Realizó)", 65, finalY + 15);
    doc.line(350, finalY, 510, finalY); doc.text("Firma de Auditor (Validó)", 385, finalY + 15);

    doc.save("Hoja_Auditoria_Kraem.pdf");
}

async function saveMultiAdjust() {
    const { data: { session } } = await _client.auth.getSession();
    if (!session) return alert("Error: Debes iniciar sesión para realizar ajustes.");

    const rows = document.querySelectorAll('.conteo-row');
    const btn = document.getElementById('btn-save');
    btn.disabled = true; btn.innerText = "GUARDANDO...";

    const pID = currentMasterPart.part_id || currentMasterPart.id;
    let movesCount = 0;

    for (const row of rows) {
        const fisVal = row.querySelector('.val-fis').value;
        const locId = row.querySelector('.loc-id').value;
        if (fisVal === "" || !locId) continue;
        
        const sis = parseInt(row.querySelector('.val-sis').value) || 0;
        const fis = parseInt(fisVal);
        const diff = fis - sis;
        
        // Obtenemos el nombre del área (ya sea del select o del texto fijo)
        const areaElem = row.querySelector('.area-name');
        const areaValue = areaElem.tagName === 'SELECT' 
            ? areaElem.options[areaElem.selectedIndex].text 
            : areaElem.value;

        if (diff !== 0) {
            const { error } = await _client.from('inventory_movements').insert([{
                part_id: pID, 
                quantity: diff, 
                movement_type: 'AJUSTE', 
                comment: `Auditoría: Sis ${sis} / Fis ${fis}`, 
                user_id: session.user.id,
                from_location_id: diff < 0 ? parseInt(locId) : null,
                to_location_id: diff > 0 ? parseInt(locId) : null,
                area: areaValue // <-- CAMBIO CLAVE: Aquí enviamos el área detectada
            }]);
            if (!error) movesCount++;
        }
    }
    
    if (movesCount > 0) {
        const h = new Date(); 
        const d = { 'A': 30, 'B': 90, 'C': 180 }[currentMasterPart.abc] || 180;
        const p = new Date(); p.setDate(h.getDate() + d);
        await _client.from('parts').update({ last_count: h.toISOString(), next_count: p.toISOString() }).eq('id', pID);
        alert(`Éxito: ${movesCount} ajuste(s) realizados.`);
    } else {
        alert("No se detectaron cambios para ajustar.");
    }
    
    btn.disabled = false; btn.innerText = "GUARDAR AJUSTES";
    cerrarModal(); init();
}

async function abrirAuditoria(masterItem) {
    currentMasterPart = masterItem;
    document.getElementById('mParte').innerText = masterItem.part_number;
    document.getElementById('mDesc').innerText = masterItem.description;
    const { data: details } = await _client.from('v_inventory_by_location').select('*').eq('part_id', masterItem.part_id || masterItem.id);
    const c = document.getElementById('conteoLines'); c.innerHTML = '';
    if (details?.length) {
        details.forEach(d => createRowHtml(d.area_name || d.area, d.location_code || d.location, d.quantity, d.location_id, false));
    } else {
        addNewLine();
    }
    document.getElementById('modalConteo').style.display = 'flex';
}

function createRowHtml(aN, lN, qS, lI, isN) {
    const d = document.createElement('div'); d.className = 'conteo-row';
    
    let aS, lH;
    
    if(isN) {
        // SELECT DE ÁREA (Clase area-name para que saveMultiAdjust la encuentre)
        aS = `<select class="area-name" onchange="filterLocationsByArea(this)">
                <option value="">-- ÁREA --</option>
                ${allAreas.map(a => `<option value="${a.id}">${a.area_name}</option>`).join('')}
              </select>`;
        
        // SELECT DE UBICACIÓN
        lH = `<select class="loc-id loc-selector">
                <option value="">-- UBICACIÓN --</option>
              </select>`;
    } else {
        // En líneas existentes mantenemos la clase area-name
        aS = `<div>${aN}</div><input type="hidden" class="area-name" value="${aN}">`;
        lH = `<div><b>${lN}</b></div><input type="hidden" class="loc-id" value="${lI}">`;
    }

    d.innerHTML = `${aS}${lH}
        <input type="number" class="val-sis" value="${qS}" readonly style="width:50px; border:none; background:transparent;">
        <input type="number" class="val-fis" oninput="calcDiff(this)" style="width:70px; border:1px solid var(--primary); border-radius:5px;">
        <div class="diff-result">0</div>
        <div onclick="this.parentElement.remove()" style="color:var(--danger); cursor:pointer;"><i class="fas fa-times"></i></div>`;
    
    document.getElementById('conteoLines').appendChild(d);
}

function filterLocationsByArea(areaSelect) {
    const row = areaSelect.closest('.conteo-row');
    const locSelect = row.querySelector('.loc-selector');
    const areaId = areaSelect.value;
    locSelect.innerHTML = '<option value="">-- UBICACIÓN --</option>';
    if(areaId) {
        const filtered = allLocations.filter(l => l.area_id == areaId);
        filtered.forEach(l => {
            const opt = document.createElement('option');
            opt.value = l.id;
            opt.textContent = l.location_code;
            locSelect.appendChild(opt);
        });
    }
}

function addNewLine() { createRowHtml('', '', 0, '', true); }

function calcDiff(i) {
    const r = i.closest('.conteo-row'); const s = parseInt(r.querySelector('.val-sis').value) || 0;
    const f = parseInt(i.value); const res = r.querySelector('.diff-result');
    if (isNaN(f)) { res.innerText = "0"; return; }
    const d = f - s; res.innerText = (d > 0 ? '+' : '') + d;
    res.className = 'diff-result ' + (d < 0 ? 'neg' : (d > 0 ? 'pos' : ''));
}
function cerrarModal() { document.getElementById('modalConteo').style.display = 'none'; }
function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
function setLang(l) {
    const t = i18n[l]; document.getElementById('txt-title').innerText = t.title;
    ['btn-back', 'lbl-search', 'lbl-project', 'lbl-date', 'th-part', 'th-desc', 'th-proj', 'th-stock', 'th-last', 'th-next', 'th-action', 'mdl-area', 'mdl-loc', 'mdl-sis', 'mdl-fis', 'mdl-add', 'btn-save', 'btn-close-mdl'].forEach(id => { if(document.getElementById(id)) document.getElementById(id).innerText = t[id.replace(/-./g, x => x[1].toUpperCase())] || t[id.split('-')[1]]; });
}

init();
</script>
</body>
</html>
