<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Conteos Cíclicos - SISTEMA MRP KRAEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --text-secondary: #64748b;
            --border: #e2e8f0; --primary: #2563eb; --success: #22c55e;
            --dark: #1e293b; --label: #64748b; --danger: #ef4444;
        }
        [data-theme="dark"] {
            --bg: #020617; --card: #1e293b; --text: #f1f5f9; --text-secondary: #94a3b8;
            --border: #334155; --dark: #0f172a; --label: #94a3b8;
        }

        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; }
        header { max-width: 1400px; margin: 0 auto 20px; display: flex; justify-content: space-between; align-items: center; }
        .brand-section { display: flex; align-items: center; gap: 15px; }
        .back-btn { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 10px 18px; border-radius: 10px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .controls { display: flex; gap: 10px; align-items: center; }
        .btn-ui { padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-weight: 600; }
        .btn-excel { background: #10b981; color: white; border: none; padding: 10px 18px; border-radius: 10px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .btn-pdf { background: #e74c3c; color: white; border: none; padding: 10px 18px; border-radius: 10px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; }

        .filter-panel { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); max-width: 1400px; margin: 0 auto 20px; }
        .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .filter-group { display: flex; flex-direction: column; gap: 6px; }
        .filter-group label { font-size: 11px; font-weight: 700; color: var(--label); text-transform: uppercase; }
        input, select { padding: 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; background: var(--bg); color: var(--text); }

        .table-container { background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); max-width: 1400px; margin: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { background: var(--bg); color: var(--text-secondary); padding: 15px; text-align: left; font-size: 12px; font-weight: 700; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        .btn-count { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .abc-badge { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 700; background: rgba(30, 41, 59, 0.1); color: var(--dark); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: var(--card); width: 95%; max-width: 900px; border-radius: 20px; padding: 30px; border: 1px solid var(--border); max-height: 90vh; display: flex; flex-direction: column; }
        #conteoLines { overflow-y: auto; flex-grow: 1; margin-bottom: 15px; }
        .conteo-row { display: grid; grid-template-columns: 1fr 1fr 0.6fr 0.8fr 0.5fr; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .btn-add-loc { background: var(--bg); color: var(--primary); border: 1px dashed var(--primary); padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600; margin-bottom: 15px; }
    </style>
</head>
<body data-theme="light">

<header>
    <div class="brand-section">
        <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> <span id="txt-menu">Menú</span></a>
        <h2 id="txt-title" style="margin:0;">🔍 Conteos Cíclicos</h2>
    </div>
    <div class="controls">
        <button class="btn-excel" onclick="exportCSV()"><i class="fas fa-file-csv"></i> <span id="btn-csv">Excel</span></button>
        <button class="btn-pdf" onclick="exportPDF()"><i class="fas fa-file-pdf"></i> <span id="btn-pdf-txt">PDF</span></button>
        <button class="btn-ui" onclick="toggleLanguage()" id="langBtn">🇰🇷 KO</button>
        <button class="btn-ui" onclick="toggleTheme()"><i id="themeIcon" class="fas fa-moon"></i></button>
    </div>
</header>

<div class="filter-panel">
    <div class="filter-grid">
        <div class="filter-group"><label id="l-parte">Parte</label><input type="text" id="fParte" oninput="filterData()"></div>
        <div class="filter-group"><label id="l-proy">Proyecto</label><input type="text" id="fProy" oninput="filterData()"></div>
        <div class="filter-group"><label id="l-abc">ABC</label>
            <select id="fABC" onchange="filterData()"><option value="">TODOS</option><option value="A">A</option><option value="B">B</option><option value="C">C</option></select>
        </div>
        <div class="filter-group"><label id="l-desde">Desde (Último)</label><input type="date" id="fDesde" onchange="filterData()"></div>
        <div class="filter-group"><label id="l-hasta">Hasta (Próximo)</label><input type="date" id="fHasta" onchange="filterData()"></div>
    </div>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th style="width: 40px;"><input type="checkbox" id="chkAll" onclick="toggleSelectAll(this)"></th>
                <th id="th-np">N° Parte</th>
                <th id="th-desc">Descripción</th>
                <th id="th-proy">Proyecto</th>
                <th id="th-stk" style="text-align:right">Stock</th>
                <th id="th-ult">Último</th>
                <th id="th-prox">Próximo</th>
                <th id="th-abc">ABC</th>
                <th id="th-acc">Acción</th>
            </tr>
        </thead>
        <tbody id="mainBody"></tbody>
    </table>
</div>

<div id="modalConteo" class="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h3 id="mParte" style="margin:0; color:var(--primary)"></h3>
            <button onclick="cerrarModal()" style="background:none; border:none; font-size:24px; cursor:pointer;">&times;</button>
        </div>
        <p id="mDesc" style="font-size:14px; margin-bottom:15px; font-weight:500;"></p>
        <div id="conteoLines"></div>
        <button class="btn-add-loc" onclick="addNewLine()" id="btn-add-line">+ AGREGAR ÁREA / UBICACIÓN EXTRA</button>
        <button class="btn-count" style="width:100%; padding:18px;" onclick="saveMultiAdjust()" id="btn-save">GUARDAR RESULTADOS</button>
    </div>
</div>

<script>
const _client = supabase.createClient('https://telntsrrschcdxczlape.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlbG50c3Jyc2NoY2R4Y3psYXBlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ4NjI4MTcsImV4cCI6MjA4MDQzODgxN30.DC2teZ_4gk3wA7UmZJHyeZHjw5aOOEmmKvd3a8jRUyw');

let fullInventory = []; 
let locationsList = [];
let areasList = [];
let currentPartDetails = null;
let currentLang = 'es';

async function init() {
    try {
        const [invRes, locRes, partRes] = await Promise.all([
            _client.from('v_inventory_by_location').select('*'),
            _client.from('locations').select('id, name, area').order('area'),
            _client.from('parts').select('part_number, project, abc')
        ]);

        locationsList = locRes.data || [];
        areasList = [...new Set(locationsList.map(l => l.area))].sort();
        const partMap = {};
        if(partRes.data) partRes.data.forEach(p => partMap[p.part_number] = p);

        const grouped = {};
        if(invRes.data) {
            invRes.data.forEach(item => {
                if (!grouped[item.part_number]) {
                    const pInfo = partMap[item.part_number] || {};
                    grouped[item.part_number] = { 
                        ...item, 
                        project: pInfo.project || item.project || '-', 
                        abc: pInfo.abc || item.abc || 'C',
                        stock_total: 0, 
                        details: [] 
                    };
                }
                grouped[item.part_number].stock_total += (item.quantity || 0);
                grouped[item.part_number].details.push(item);
            });
        }

        fullInventory = Object.values(grouped);
        filterData();
    } catch (e) { console.error("Error inicializando:", e); }
}

function filterData() {
    const p = fParte.value.toLowerCase(), pr = fProy.value.toLowerCase(), abc = fABC.value;
    const desde = fDesde.value, hasta = fHasta.value;

    const filtered = fullInventory.filter(r => {
        const matchText = r.part_number.toLowerCase().includes(p) && (String(r.project)).toLowerCase().includes(pr);
        const matchABC = !abc || r.abc === abc;
        const matchUlt = !desde || (r.last_counted && r.last_counted >= desde);
        const matchProx = !hasta || (r.next_count && r.next_count <= hasta);
        return matchText && matchABC && matchUlt && matchProx;
    });
    renderTable(filtered);
}

function renderTable(data) {
    const body = document.getElementById('mainBody');
    body.innerHTML = data.map(r => `
        <tr>
            <td><input type="checkbox" class="row-sel" data-id="${r.part_number}"></td>
            <td><b>${r.part_number}</b></td>
            <td style="color:var(--text-secondary); font-size:13px;">${r.part_name || r.description || '-'}</td>
            <td><span style="font-weight:700; color:var(--success)">${r.project}</span></td>
            <td style="text-align:right; font-weight:700; color:var(--primary)">${(r.stock_total || 0).toLocaleString()}</td>
            <td>${r.last_counted || '-'}</td>
            <td>${r.next_count || '-'}</td>
            <td><span class="abc-badge">${r.abc}</span></td>
            <td><button class="btn-count" onclick='abrirAuditoria(${JSON.stringify(r)})'>CONTAR</button></td>
        </tr>
    `).join('');
}

function abrirAuditoria(master) {
    currentPartDetails = master;
    document.getElementById('mParte').innerText = master.part_number;
    document.getElementById('mDesc').innerText = (master.part_name || master.description || '') + " | Proyecto: " + master.project;
    const container = document.getElementById('conteoLines');
    
    container.innerHTML = master.details.map(det => `
        <div class="conteo-row">
            <div style="font-weight:700; color:var(--primary); font-size:12px;">${det.area}</div>
            <div style="font-size:12px; font-weight:600;">${det.location}</div>
            <div style="color:var(--text-secondary); font-size:11px;">Sis: <b>${det.quantity}</b></div>
            <input type="number" class="val-fis" placeholder="Físico" oninput="updateRowDiff(this)" style="width:100%; padding:8px; border:1px solid var(--border); border-radius:5px;">
            <div class="diff-result" style="font-weight:800; text-align:right; font-size:12px;">0</div>
            <input type="hidden" class="loc-id" value="${det.location_id}">
            <input type="hidden" class="part-id" value="${det.part_id}">
            <input type="hidden" class="val-sis" value="${det.quantity}">
            <input type="hidden" class="area-name" value="${det.area}">
        </div>
    `).join('');
    document.getElementById('modalConteo').style.display = 'flex';
}

function addNewLine() {
    const container = document.getElementById('conteoLines');
    const div = document.createElement('div');
    div.className = 'conteo-row';
    let areaOpts = areasList.map(a => `<option value="${a}">${a}</option>`).join('');
    div.innerHTML = `
        <select class="area-sel" onchange="filterLocsByArea(this)" style="font-size:11px; padding:5px; border-radius:5px;">
            <option value="">-- Área --</option>${areaOpts}
        </select>
        <select class="loc-id-new" style="font-size:11px; padding:5px; border-radius:5px;" disabled><option value="">-- Ubicación --</option></select>
        <div style="color:var(--text-secondary); font-size:11px;">Sis: <b>0</b></div>
        <input type="number" class="val-fis" placeholder="Hallazgo" oninput="updateRowDiff(this)" style="width:100%; padding:8px; border:1px solid var(--border); border-radius:5px;">
        <div class="diff-result" style="font-weight:800; text-align:right; font-size:12px;">0</div>
        <input type="hidden" class="part-id" value="${currentPartDetails.part_id}">
        <input type="hidden" class="val-sis" value="0">
    `;
    container.appendChild(div);
}

function filterLocsByArea(areaSel) {
    const row = areaSel.closest('.conteo-row');
    const locSel = row.querySelector('.loc-id-new');
    const filtered = locationsList.filter(l => l.area === areaSel.value);
    locSel.innerHTML = '<option value="">-- Ubicación --</option>' + filtered.map(l => `<option value="${l.id}">${l.name}</option>`).join('');
    locSel.disabled = false;
}

function updateRowDiff(input) {
    const row = input.closest('.conteo-row');
    const sis = parseInt(row.querySelector('.val-sis').value) || 0;
    const fis = parseInt(input.value) || 0;
    const res = row.querySelector('.diff-result');
    const diff = fis - sis;
    res.innerText = (diff > 0 ? '+' : '') + diff;
    res.style.color = diff < 0 ? 'var(--danger)' : (diff > 0 ? 'var(--success)' : 'var(--text)');
}

async function saveMultiAdjust() {
    const rows = document.querySelectorAll('.conteo-row');
    const { data: { session } } = await _client.auth.getSession();
    for (const row of rows) {
        const fisVal = row.querySelector('.val-fis').value;
        const locId = row.querySelector('.loc-id') ? row.querySelector('.loc-id').value : row.querySelector('.loc-id-new').value;
        if (fisVal === "" || !locId) continue;
        const sis = parseInt(row.querySelector('.val-sis').value) || 0;
        const fis = parseInt(fisVal) || 0;
        const diff = fis - sis;
        if (diff !== 0) {
            const movement = {
                part_id: row.querySelector('.part-id').value,
                quantity: Math.abs(diff),
                movement_type: 'AJUSTE',
                area: row.querySelector('.area-sel')?.value || row.querySelector('.area-name').value,
                comment: `Cíclico (Sis:${sis} Fis:${fis})`,
                user_id: session?.user?.id || null
            };
            if(diff < 0) movement.from_location_id = locId; else movement.to_location_id = locId;
            await _client.from('inventory_movements').insert([movement]);
        }
    }
    cerrarModal(); init();
}

function exportCSV() {
    const checked = Array.from(document.querySelectorAll('.row-sel:checked')).map(cb => cb.getAttribute('data-id'));
    if (checked.length === 0) return alert("Selecciona piezas con el checkbox.");
    let csv = "\uFEFFN° Parte,Descripción,Proyecto,Stock,Ultimo,ABC\n";
    fullInventory.filter(r => checked.includes(r.part_number)).forEach(r => {
        csv += `"${r.part_number}","${r.part_name || r.description || ''}","${r.project}",${r.stock_total},"${r.last_counted || ''}","${r.abc}"\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `Ciclicos_Seleccionados.csv`;
    link.click();
}

function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const selected = Array.from(document.querySelectorAll('.row-sel:checked')).map(cb => {
        const row = cb.closest('tr');
        return [row.cells[1].innerText, row.cells[2].innerText, row.cells[3].innerText, row.cells[4].innerText, "_______"];
    });
    if(selected.length === 0) return alert("Selecciona piezas para imprimir.");
    doc.text("KRAEM - HOJA DE AUDITORÍA", 14, 20);
    doc.autoTable({ startY: 30, head: [['Parte', 'Descripción', 'Proyecto', 'Stock', 'Físico']], body: selected });
    doc.save("Auditoria.pdf");
}

function toggleLanguage() {
    currentLang = currentLang === 'es' ? 'ko' : 'es';
    document.getElementById('langBtn').innerText = currentLang === 'es' ? '🇰🇷 KO' : '🇲🇽 ES';
    filterData();
}

function toggleSelectAll(src) { document.querySelectorAll('.row-sel').forEach(cb => cb.checked = src.checked); }
function cerrarModal() { document.getElementById('modalConteo').style.display = 'none'; }
function toggleTheme() {
    const isDark = document.body.getAttribute('data-theme') === 'dark';
    document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
}

init();
</script>
</body>
</html>
