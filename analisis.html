<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Análisis de Calidad - KRAEM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --accent: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        .filters { display: flex; flex-wrap: wrap; gap: 15px; background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); align-items: flex-end; }
        .filter-item { display: flex; flex-direction: column; gap: 5px; }
        .filter-item label { font-size: 12px; font-weight: bold; color: #64748b; }
        
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        .metric-title { font-size: 14px; color: #64748b; margin-bottom: 10px; }
        .metric-value { font-size: 2.2rem; font-weight: 800; color: var(--primary); }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; margin-top: 15px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        th { background: #f8fafc; font-weight: 700; color: #475569; }
        tr:hover { background: #f8fafc; }

        .btn-filter { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-filter:hover { filter: brightness(1.1); }
    </style>
</head>
<body>

<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h2 style="margin:0;"><i class="fas fa-chart-pie"></i> Análisis de Inspección Interna</h2>
    <button onclick="location.href='dashboard.html'" style="border:none; background:none; color:var(--primary); cursor:pointer;"><i class="fas fa-home"></i> Menú Principal</button>
</div>

<div class="filters">
    <div class="filter-item">
        <label>Desde</label>
        <input type="date" id="f_inicio">
    </div>
    <div class="filter-item">
        <label>Hasta</label>
        <input type="date" id="f_fin">
    </div>
    <div class="filter-item">
        <label>Área</label>
        <select id="f_area"><option value="">Todas</option></select>
    </div>
    <div class="filter-item">
        <label>Operador / N/P</label>
        <input type="text" id="f_buscar" placeholder="Nombre o Parte...">
    </div>
    <button class="btn-filter" onclick="cargarTodo()">Aplicar Filtros</button>
</div>

<div class="dashboard-grid">
    <div class="card">
        <div class="metric-title">Piezas OK (Yield)</div>
        <div class="metric-value" id="m_calidad">0%</div>
    </div>
    <div class="card">
        <div class="metric-title">Total Inspeccionado</div>
        <div class="metric-value" id="m_total">0</div>
    </div>
    <div class="card" style="border-left: 5px solid var(--accent);">
        <div class="metric-title">Piezas Defectuosas</div>
        <div class="metric-value" id="m_defectos" style="color:var(--accent)">0</div>
    </div>
</div>

<div class="dashboard-grid" style="grid-template-columns: 1.5fr 1fr;">
    <div class="card">
        <h3><i class="fas fa-sort-amount-down"></i> Pareto de Defectos (Top 10)</h3>
        <canvas id="chartPareto" height="150"></canvas>
    </div>
    <div class="card">
        <h3><i class="fas fa-history"></i> Historial Reciente</h3>
        <div style="max-height: 300px; overflow-y: auto;">
            <table id="tablaMini">
                <thead><tr><th>Fecha</th><th>N/P</th><th>Def</th><th>Tipo</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let chartP;

    async function init() {
        // Cargar áreas en el filtro
        const { data: areas } = await client.from('areas').select('area_name').eq('active', true);
        if(areas) {
            const fArea = document.getElementById('f_area');
            areas.forEach(a => {
                let opt = document.createElement('option');
                opt.value = a.area_name; opt.textContent = a.area_name;
                fArea.appendChild(opt);
            });
        }
        cargarTodo();
    }

    async function cargarTodo() {
        let query = client.from('inspeccion_produccion').select('*').order('fecha', {ascending: false});
        
        const ini = document.getElementById('f_inicio').value;
        const fin = document.getElementById('f_fin').value;
        const area = document.getElementById('f_area').value;
        const buscar = document.getElementById('f_buscar').value;

        if(ini) query = query.gte('fecha', ini);
        if(fin) query = query.lte('fecha', fin);
        if(area) query = query.eq('area', area);
        
        const { data, error } = await query;
        if(data) {
            // Filtrado manual por texto (Operador o Parte)
            const filtrados = data.filter(r => 
                r.operador?.toLowerCase().includes(buscar.toLowerCase()) || 
                r.num_parte?.toLowerCase().includes(buscar.toLowerCase())
            );
            procesarGraficas(filtrados);
        }
    }

    function procesarGraficas(data) {
        let totalInsp = 0, totalDef = 0;
        const defectosMap = {};
        const tbody = document.querySelector('#tablaMini tbody');
        tbody.innerHTML = '';

        data.forEach(r => {
            totalInsp += r.cant_inspeccionada;
            totalDef += r.cant_defectuosa;
            
            if(r.tipo_defecto && r.tipo_defecto !== 'NINGUNO') {
                defectosMap[r.tipo_defecto] = (defectosMap[r.tipo_defecto] || 0) + r.cant_defectuosa;
            }

            tbody.innerHTML += `<tr>
                <td>${r.fecha.split('-').slice(1).join('/')}</td>
                <td><b>${r.num_parte}</b></td>
                <td style="color:red">${r.cant_defectuosa}</td>
                <td style="font-size:11px">${r.tipo_defecto}</td>
            </tr>`;
        });

        // Métricas
        document.getElementById('m_total').innerText = totalInsp.toLocaleString();
        document.getElementById('m_defectos').innerText = totalDef.toLocaleString();
        const yield = totalInsp > 0 ? ((1 - (totalDef/totalInsp)) * 100).toFixed(1) : 100;
        document.getElementById('m_calidad').innerText = yield + '%';

        // Gráfica Pareto
        const sortedDef = Object.entries(defectosMap).sort((a,b) => b[1] - a[1]).slice(0, 10);
        
        if(chartP) chartP.destroy();
        chartP = new Chart(document.getElementById('chartPareto'), {
            type: 'bar',
            data: {
                labels: sortedDef.map(d => d[0]),
                datasets: [{
                    label: 'Cantidad de Defectos',
                    data: sortedDef.map(d => d[1]),
                    backgroundColor: '#2563eb',
                    borderRadius: 5
                }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });
    }

    window.onload = init;
</script>
</body>
</html>
