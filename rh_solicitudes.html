<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRAEM | Gestión Integral de Incidencias</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #0f172a; --accent: #2563eb; --bg: #f1f5f9; 
            --text: #1e293b; --border: #e2e8f0; --success: #16a34a; 
            --danger: #dc2626; --warning: #d97706; --info: #0ea5e9;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        /* Header */
        .header-pro { background: white; padding: 20px; border-radius: 16px; margin-bottom: 25px; border-bottom: 4px solid var(--accent); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        
        .grid-main { display: grid; grid-template-columns: 400px 1fr; gap: 25px; }

        .card { background: white; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid var(--border); padding: 25px; height: fit-content; }
        .section-title { font-size: 13px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        /* Formulario */
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 6px; }
        select, input, textarea { 
            width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 10px; 
            font-size: 14px; transition: 0.2s; box-sizing: border-box; background: #f8fafc; margin-bottom: 15px;
        }
        select:focus, input:focus { border-color: var(--accent); outline: none; background: white; }

        /* Panel Informativo */
        .info-panel { background: #eff6ff; padding: 15px; border-radius: 12px; border: 1px solid #dbeafe; display: none; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: center; }
        .stat-val { font-size: 16px; font-weight: 800; color: #1e40af; }
        .stat-lab { font-size: 9px; font-weight: bold; color: #60a5fa; text-transform: uppercase; }

        /* Filtros */
        .filter-container { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; }
        .filter-item { flex: 1; }
        .filter-item label { margin-bottom: 4px; }
        .filter-item input, .filter-item select { margin-bottom: 0; padding: 8px; }

        /* Tabla/Cards */
        .request-card { 
            background: white; border-radius: 12px; border: 1px solid var(--border); 
            padding: 15px; margin-bottom: 12px; border-left: 6px solid #cbd5e1;
            transition: 0.2s;
        }
        .status-PENDIENTE { border-left-color: var(--warning); }
        .status-APROBADO { border-left-color: var(--success); }
        .status-RECHAZADO { border-left-color: var(--danger); opacity: 0.7; }
        .status-ENCURSO { border-left-color: var(--info); background: #f0f9ff; }

        .btn-action { padding: 8px 12px; border-radius: 8px; font-weight: 700; cursor: pointer; border: none; font-size: 10px; }
        .btn-submit { background: var(--accent); color: white; width: 100%; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; border: none; font-size: 14px; }
        
        .badge { font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: bold; background: #e2e8f0; color: #475569; }
    </style>
</head>
<body>

<div class="header-pro">
    <div>
        <h1 style="margin:0; font-size: 24px;">KRAEM | <span style="font-weight:300;">Control de Incidencias</span></h1>
        <p style="margin:5px 0; color:#64748b; font-size:13px;"><i class="fas fa-database"></i> Sincronizado con Registro de Personal</p>
    </div>
    <div id="reloj" style="font-size:20px; font-weight:900; color: var(--primary);">00:00:00</div>
</div>

<div class="grid-main">
    <div class="card">
        <div class="section-title"><i class="fas fa-plus-circle"></i> Nueva Solicitud</div>
        
        <label>Personal que solicita</label>
        <select id="sel_empleado" onchange="cargarDatosEmpleado()"></select>

        <div id="info_panel" class="info-panel">
            <div class="stats-grid">
                <div><div class="stat-lab">Antigüedad Exacta</div><div id="txt_anti" class="stat-val">--</div></div>
                <div><div class="stat-lab">Vacaciones Disponibles</div><div id="txt_disp" class="stat-val">--</div></div>
            </div>
        </div>

        <label>Tipo de Incidencia</label>
        <select id="sel_tipo" onchange="toggleModo()">
            <optgroup label="Ausencias">
                <option value="VACACIONES">VACACIONES</option>
                <option value="FALTA">FALTA</option>
                <option value="PERMISO_SIN_GOCE">PERMISO SIN GOCE</option>
                <option value="SUSPENCION">SUSPENSIÓN</option>
            </optgroup>
            <optgroup label="Pases de Tiempo">
                <option value="IDA_VUELTA">IDA Y VUELTA</option>
                <option value="SALIDA_TEMPRANO">SALIDA TEMPRANO</option>
            </optgroup>
        </select>

        <div id="box_dias">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Fecha Inicio</label><input type="date" id="f_ini"></div>
                <div><label>Fecha Fin</label><input type="date" id="f_fin"></div>
            </div>
        </div>

        <div id="box_horas" style="display:none;">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Fecha Pase</label><input type="date" id="h_fecha"></div>
                <div><label>Hora Salida</label><input type="time" id="h_salida"></div>
            </div>
        </div>

        <label>Quién Autoriza (Personal Completo)</label>
        <select id="sel_autorizador"></select>

        <label>Motivo / Observaciones</label>
        <textarea id="txt_obs" rows="2" placeholder="Escriba el motivo..."></textarea>

        <button class="btn-submit" id="btn_guardar" onclick="registrar()">
            <i class="fas fa-save"></i> GUARDAR SOLICITUD
        </button>
    </div>

    <div>
        <div class="filter-container">
            <div class="filter-item">
                <label>Buscar por Nombre</label>
                <input type="text" id="f_nom" placeholder="Escriba..." oninput="filtrar()">
            </div>
            <div class="filter-item">
                <label>Tipo</label>
                <select id="f_tipo" onchange="filtrar()">
                    <option value="">Todos</option>
                    <option value="VACACIONES">VACACIONES</option>
                    <option value="FALTA">FALTA</option>
                    <option value="IDA_VUELTA">IDA Y VUELTA</option>
                </select>
            </div>
            <div class="filter-item">
                <label>Estatus</label>
                <select id="f_est" onchange="filtrar()">
                    <option value="">Todos</option>
                    <option value="PENDIENTE">PENDIENTE</option>
                    <option value="APROBADO">APROBADO</option>
                    <option value="ENCURSO">EN CURSO</option>
                </select>
            </div>
        </div>

        <div id="lista_solicitudes"></div>
    </div>
</div>

<script>
    let raw_empleados = [];
    let raw_solicitudes = [];

    // Inicialización
    async function init() {
        setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleTimeString(); }, 1000);

        // Cargar Personal Completo
        const { data: emps } = await client.from('rh_empleados').select('*').eq('estatus', 'ACTIVO').order('nombre_completo');
        raw_empleados = emps || [];

        const selE = document.getElementById('sel_empleado');
        const selA = document.getElementById('sel_autorizador');
        
        selE.innerHTML = '<option value="">-- Seleccionar --</option>';
        selA.innerHTML = '<option value="">-- Seleccionar --</option>';

        raw_empleados.forEach(e => {
            selE.innerHTML += `<option value="${e.id}">${e.nombre_completo}</option>`;
            selA.innerHTML += `<option value="${e.nombre_completo}">${e.nombre_completo}</option>`;
        });

        consultar();
    }

    // Carga datos informativos del empleado seleccionado
    async function cargarDatosEmpleado() {
        const id = document.getElementById('sel_empleado').value;
        if(!id) { document.getElementById('info_panel').style.display='none'; return; }

        const emp = raw_empleados.find(e => e.id == id);
        
        // Antigüedad Años y Meses
        const ini = new Date(emp.fecha_ingreso), hoy = new Date();
        let an = hoy.getFullYear() - ini.getFullYear();
        let ms = hoy.getMonth() - ini.getMonth();
        if (ms < 0) { an--; ms += 12; }
        document.getElementById('txt_anti').innerText = `${an} años, ${ms} meses`;

        // Vacaciones (Ley actual MX)
        const obtenerLey = (a) => a < 1 ? 0 : a==1 ? 12 : a==2 ? 14 : a==3 ? 16 : a==4 ? 18 : a==5 ? 20 : 22;
        const derecho = obtenerLey(an);
        
        const { data: tomadas } = await client.from('rh_solicitudes').select('dias_solicitados').eq('empleado_id', id).eq('tipo', 'VACACIONES').eq('estatus', 'APROBADO');
        const gastadas = tomadas?.reduce((a, b) => a + (b.dias_solicitados || 0), 0) || 0;
        
        document.getElementById('txt_disp').innerText = (derecho - gastadas) + " días";
        document.getElementById('info_panel').style.display = 'block';
    }

    function toggleModo() {
        const esPase = ["IDA_VUELTA", "SALIDA_TEMPRANO"].includes(document.getElementById('sel_tipo').value);
        document.getElementById('box_dias').style.display = esPase ? 'none' : 'block';
        document.getElementById('box_horas').style.display = esPase ? 'block' : 'none';
    }

    // REGISTRAR SOLICITUD (Corregido para evitar errores de columnas)
    async function registrar() {
        const btn = document.getElementById('btn_guardar');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> PROCESANDO...';

        const tipo = document.getElementById('sel_tipo').value;
        const esPase = ["IDA_VUELTA", "SALIDA_TEMPRANO"].includes(tipo);

        let payload = {
            empleado_id: document.getElementById('sel_empleado').value,
            tipo: tipo,
            autorizado_por: document.getElementById('sel_autorizador').value,
            observaciones: document.getElementById('txt_obs').value,
            estatus: 'PENDIENTE',
            fecha_inicio: esPase ? document.getElementById('h_fecha').value : document.getElementById('f_ini').value
        };

        if(esPase) {
            payload.hora_salida = document.getElementById('h_salida').value;
            payload.dias_solicitados = 0;
        } else {
            payload.fecha_fin = document.getElementById('f_fin').value;
            const d1 = new Date(payload.fecha_inicio), d2 = new Date(payload.fecha_fin);
            payload.dias_solicitados = Math.ceil((d2 - d1) / (1000*60*60*24)) + 1;
        }

        if(!payload.empleado_id || !payload.fecha_inicio || !payload.autorizado_por) {
            alert("⚠️ Por favor completa los campos de Empleado, Fecha y Autorizador.");
            resetBtn(btn); return;
        }

        const { error } = await client.from('rh_solicitudes').insert([payload]);
        
        if(error) {
            console.error(error);
            alert("❌ ERROR DE BASE DE DATOS:\n" + error.message + "\n\nRevisa si las columnas hora_salida y autorizado_por existen.");
        } else {
            alert("✅ Solicitud guardada correctamente.");
            location.reload();
        }
        resetBtn(btn);
    }

    function resetBtn(b) { b.disabled = false; b.innerHTML = '<i class="fas fa-save"></i> GUARDAR SOLICITUD'; }

    // CONSULTA Y FILTRADO
    async function consultar() {
        const { data } = await client.from('rh_solicitudes').select('*, rh_empleados(nombre_completo)').order('created_at', {ascending: false});
        raw_solicitudes = data || [];
        filtrar();
    }

    function filtrar() {
        const nom = document.getElementById('f_nom').value.toLowerCase();
        const tip = document.getElementById('f_tipo').value;
        const est = document.getElementById('f_est').value;

        const filtered = raw_solicitudes.filter(s => {
            return (s.rh_empleados?.nombre_completo.toLowerCase().includes(nom)) &&
                   (tip === "" || s.tipo === tip) &&
                   (est === "" || s.estatus === est);
        });

        renderTable(filtered);
    }

    function renderTable(data) {
        const container = document.getElementById('lista_solicitudes');
        container.innerHTML = "";

        data.forEach(s => {
            container.innerHTML += `
                <div class="request-card status-${s.estatus}">
                    <div style="display:flex; justify-content:space-between; align-items:start;">
                        <div>
                            <span class="badge">${s.tipo}</span>
                            <h3 style="margin:5px 0; font-size:15px;">${s.rh_empleados?.nombre_completo}</h3>
                            <p style="font-size:12px; color:#64748b; margin:0;">
                                <i class="fas fa-calendar"></i> ${s.fecha_inicio} ${s.fecha_fin ? ' al ' + s.fecha_fin : ''}
                                ${s.hora_salida ? ` | <i class="fas fa-clock"></i> ${s.hora_salida}` : ''}
                            </p>
                            <p style="font-size:11px; margin-top:5px;"><b>Autoriza:</b> ${s.autorizado_por}</p>
                        </div>
                        <div style="display:flex; gap:5px;">
                            ${s.estatus === 'PENDIENTE' ? `
                                <button class="btn-action" style="background:var(--success); color:white;" onclick="updateStatus('${s.id}', '${s.tipo === 'IDA_VUELTA' ? 'ENCURSO' : 'APROBADO'}')">APROBAR</button>
                                <button class="btn-action" style="background:var(--danger); color:white;" onclick="updateStatus('${s.id}', 'RECHAZADO')">RECHAZAR</button>
                            ` : ''}
                            ${s.estatus === 'ENCURSO' ? `
                                <button class="btn-action" style="background:var(--info); color:white;" onclick="marcarRegreso('${s.id}')">REGRESÓ</button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        });
    }

    async function updateStatus(id, st) {
        await client.from('rh_solicitudes').update({ estatus: st }).eq('id', id);
        consultar();
    }

    async function marcarRegreso(id) {
        const hora = new Date().toLocaleTimeString('es-MX', { hour12: false, hour: '2-digit', minute: '2-digit' });
        await client.from('rh_solicitudes').update({ estatus: 'APROBADO', hora_regreso: hora }).eq('id', id);
        consultar();
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
