<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRAEM | RH Management System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0f172a;
            --accent: #2563eb;
            --accent-soft: #dbeafe;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --sidebar: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 12px;
            --shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text-main); display: flex; min-height: 100vh; overflow-x: hidden; }

        /* Sidebar mejorada para pantallas pequeñas */
        .sidebar { 
            width: 340px; background: var(--sidebar); border-right: 1px solid var(--border); 
            padding: 24px; position: fixed; height: 100vh; overflow-y: auto; z-index: 100;
        }
        .main-content { margin-left: 340px; width: calc(100% - 340px); padding: 40px; }

        .logo-container { text-align: center; margin-bottom: 30px; }
        .logo-img { max-width: 180px; height: auto; }

        .user-pill {
            background: var(--primary); color: white; padding: 10px; border-radius: var(--radius);
            margin-bottom: 25px; display: flex; align-items: center; gap: 10px; font-size: 12px;
        }

        /* Formulario Ajustado */
        h3 { font-size: 12px; text-transform: uppercase; color: var(--accent); margin-bottom: 15px; letter-spacing: 1px; }
        .group { margin-bottom: 15px; }
        .grid-dates { display: flex; gap: 10px; flex-wrap: wrap; }
        .grid-dates .group { flex: 1; min-width: 140px; }
        
        label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 5px; color: var(--text-muted); }
        select, input, textarea { 
            width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; 
            font-size: 13px; background: #fff; color: var(--text-main);
        }

        /* Tablas y Cards */
        .table-container { 
            background: #fff; border-radius: var(--radius); border: 1px solid var(--border); 
            box-shadow: var(--shadow); overflow-x: auto; 
        }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: #f8fafc; padding: 16px; text-align: left; font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
        td { padding: 16px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }

        .badge { padding: 5px 10px; border-radius: 6px; font-size: 10px; font-weight: 800; }
        .status-PENDIENTE { background: #fef3c7; color: #92400e; }
        .status-APROBADO { background: #dcfce7; color: #166534; }
        
        .btn-action { 
            width: 32px; height: 32px; border-radius: 6px; border: none; cursor: pointer; 
            transition: 0.2s; display: inline-flex; align-items: center; justify-content: center;
        }
        .btn-approve { background: var(--success); color: white; }
        .btn-reject { background: var(--danger); color: white; margin-left: 5px; }
        .btn-primary { 
            background: var(--accent); color: white; border: none; padding: 14px; border-radius: 10px; 
            font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px;
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo-container">
        <img src="https://raw.githubusercontent.com/tu-usuario/tu-repo/main/logo-kraem.jpg" alt="KRAEM" class="logo-img" onerror="this.src='https://via.placeholder.com/180x60?text=KRAEM+LOGO'">
    </div>

    <div class="user-pill" id="user_session">
        <i class="fas fa-user-circle fa-2x"></i>
        <div>
            <div id="session_name" style="font-weight: 800;">Cargando...</div>
            <div id="session_role" style="opacity: 0.8; font-size: 10px;">Verificando permisos</div>
        </div>
    </div>
    
    <h3>Registro de Solicitud</h3>
    
    <div class="group">
        <label>Colaborador que solicita</label>
        <select id="sol_empleado" onchange="actualizarInfoVacaciones()"></select>
    </div>

    <div class="grid-dates">
        <div class="group"><label>Desde</label><input type="date" id="sol_desde"></div>
        <div class="group" id="container_hasta"><label>Hasta</label><input type="date" id="sol_hasta"></div>
    </div>

    <div id="div_hora" style="display:none;" class="group">
        <label>Hora Específica</label>
        <input type="time" id="sol_hora">
    </div>

    <div class="group">
        <label>Tipo de Movimiento</label>
        <select id="sol_tipo" onchange="toggleCampos()">
            <option value="VACACIONES">Vacaciones</option>
            <option value="PERMISO_SIN_GOCE">Permiso sin goce</option>
            <option value="SALIDA_TEMPRANO">Pase de Salida</option>
            <option value="LLEGADA_TARDE">Entrada Tarde</option>
        </select>
    </div>

    <div class="group">
        <label>¿Quién debe autorizar?</label>
        <select id="sol_autorizador_esperado"></select>
    </div>

    <div class="group">
        <label>Motivo o Causa</label>
        <textarea id="sol_motivo" rows="2"></textarea>
    </div>

    <button class="btn-primary" onclick="crearSolicitud()">
        <i class="fas fa-save"></i> GUARDAR REGISTRO
    </button>
</aside>

<main class="main-content">
    <header style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:30px;">
        <div>
            <h1 style="font-size: 28px; font-weight: 800; color: var(--primary);">Panel de Control RH</h1>
            <p style="color: var(--text-muted);">Gestión de asistencia y permisos de personal</p>
        </div>
        <div style="text-align: right;">
            <select id="filtro_view" onchange="listar()" style="width: 200px; font-weight: 700;">
                <option value="PENDIENTE">Pendientes de Firma</option>
                <option value="APROBADO">Historial Aprobado</option>
                <option value="TODOS">Todos los registros</option>
            </select>
        </div>
    </header>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Folio / Empleado</th>
                    <th>Movimiento</th>
                    <th>Periodo / Hora</th>
                    <th>Autorizador Asignado</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="lista_solicitudes"></tbody>
        </table>
    </div>
</main>

<script>
    // SIMULACIÓN DE SESIÓN (Esto lo vincularás a tu login)
    // En el futuro, esto vendrá de una tabla 'rh_usuarios' en Supabase
    const SESION = {
        usuario: "gegonza", 
        nombre: "Gerardo González Torres",
        puesto: "SUPERVISOR",
        rol: "ADMIN" // ADMIN, SUPERVISOR, o USER
    };

    let empleados = [];

    async function iniciar() {
        // Mostrar sesión actual
        document.getElementById('session_name').innerText = SESION.nombre;
        document.getElementById('session_role').innerText = SESION.puesto;

        // Cargar Datos
        const { data } = await client.from('rh_empleados').select('*, rh_puestos(nombre)').eq('estatus', 'ACTIVO').order('nombre_completo');
        empleados = data || [];

        // Llenar selects
        const opciones = empleados.map(e => `<option value="${e.id}">${e.nombre_completo}</option>`).join('');
        document.getElementById('sol_empleado').innerHTML = opciones;
        
        // Llenar autorizadores (Solo los que son supervisores o admin)
        // Aquí podrías filtrar por una columna 'es_autorizador' en tu DB
        document.getElementById('sol_autorizador_esperado').innerHTML = opciones;

        listar();
    }

    function toggleCampos() {
        const tipo = document.getElementById('sol_tipo').value;
        const esPorHora = tipo.includes('SALIDA') || tipo.includes('TARDE');
        document.getElementById('container_hasta').style.display = esPorHora ? 'none' : 'block';
        document.getElementById('div_hora').style.display = esPorHora ? 'block' : 'none';
    }

    async function crearSolicitud() {
        const colab = empleados.find(e => e.id == document.getElementById('sol_empleado').value);
        const autorizadorNombre = empleados.find(e => e.id == document.getElementById('sol_autorizador_esperado').value).nombre_completo;

        const { error } = await client.from('rh_solicitudes').insert([{
            empleado_id: colab.id,
            tipo: document.getElementById('sol_tipo').value,
            fecha_inicio: document.getElementById('sol_desde').value,
            fecha_fin: document.getElementById('sol_hasta').value || document.getElementById('sol_desde').value,
            hora_solicitud: document.getElementById('sol_hora').value,
            motivo: document.getElementById('sol_motivo').value,
            puesto_solicitante: colab.rh_puestos?.nombre,
            creado_por: SESION.nombre, // Usuario que registra
            autorizador_asignado: autorizadorNombre, // Quién debe firmar
            estatus: 'PENDIENTE'
        }]);

        if(error) alert(error.message);
        else location.reload();
    }

    async function listar() {
        const filtro = document.getElementById('filtro_view').value;
        let r = client.from('rh_solicitudes').select('*, rh_empleados(nombre_completo)').order('created_at', {ascending: false});
        
        if(filtro !== 'TODOS') r = r.eq('estatus', filtro);
        
        const { data } = await r;
        
        document.getElementById('lista_solicitudes').innerHTML = (data || []).map(s => {
            // LÓGICA DE PERMISOS PARA BOTONES
            // Solo se muestra el botón de aprobar si:
            // 1. El usuario es ADMIN
            // 2. O el usuario es el autorizador asignado
            const puedeGestionar = SESION.rol === 'ADMIN' || SESION.nombre === s.autorizador_asignado;

            return `
            <tr>
                <td><b>${s.rh_empleados?.nombre_completo}</b><br><small>${s.id_personalizado || 'S/F'}</small></td>
                <td><span class="badge" style="background:#eee">${s.tipo}</span></td>
                <td>${s.fecha_inicio}<br><small>${s.hora_solicitud || ''}</small></td>
                <td><i class="fas fa-user-shield"></i> ${s.autorizador_asignado}</td>
                <td><span class="badge status-${s.estatus}">${s.estatus}</span></td>
                <td>
                    ${s.estatus === 'PENDIENTE' && puedeGestionar ? `
                        <button class="btn-action btn-approve" onclick="procesar('${s.id}', 'APROBADO')"><i class="fas fa-check"></i></button>
                        <button class="btn-action btn-reject" onclick="procesar('${s.id}', 'RECHAZADO')"><i class="fas fa-times"></i></button>
                    ` : ''}
                    ${s.estatus === 'APROBADO' ? `<button class="btn-action" style="background:#dbeafe; color:#2563eb" onclick="imprimir('${s.id}')"><i class="fas fa-print"></i></button>` : ''}
                </td>
            </tr>`;
        }).join('');
    }

    async function procesar(id, nuevoEstado) {
        const { error } = await client.from('rh_solicitudes').update({ 
            estatus: nuevoEstado,
            aprobado_por: SESION.nombre,
            fecha_aprobacion: new Date().toISOString()
        }).eq('id', id);
        
        if(!error) listar();
    }

    document.addEventListener('DOMContentLoaded', iniciar);
</script>
</body>
</html>
