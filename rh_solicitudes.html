<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRAEM | Control de Incidencias & Salidas Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f8fafc; --success: #16a34a; --danger: #dc2626; --warning: #f59e0b; --info: #0ea5e9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1e293b; margin: 0; padding: 20px; }
        
        .header-pro { background: white; padding: 20px; border-radius: 16px; margin-bottom: 25px; border-bottom: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .grid-main { display: grid; grid-template-columns: 450px 1fr; gap: 25px; }

        .card { background: white; border-radius: 16px; border: 1px solid #e2e8f0; padding: 25px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .section-title { font-size: 13px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; }

        .group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 6px; }
        select, input, textarea { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 10px; font-size: 14px; box-sizing: border-box; background: #f8fafc; transition: 0.2s; }
        select:focus, input:focus { border-color: var(--accent); background: white; outline: none; }

        .time-box { background: #fff7ed; padding: 15px; border-radius: 12px; border: 1px solid #ffedd5; display: none; margin-bottom: 15px; }
        
        .request-card { background: white; border-radius: 12px; border-left: 6px solid #cbd5e1; padding: 20px; margin-bottom: 15px; border: 1px solid #e2e8f0; border-left-width: 6px; transition: 0.3s; }
        .status-PENDIENTE { border-left-color: var(--warning); }
        .status-APROBADO { border-left-color: var(--success); }
        .status-ENCURSO { border-left-color: var(--info); background: #f0f9ff; }

        .btn-action { padding: 8px 15px; border-radius: 8px; font-weight: 700; cursor: pointer; border: none; font-size: 11px; }
        .btn-submit { background: var(--accent); color: white; width: 100%; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; border: none; margin-top: 10px; }
        
        .badge { font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header-pro">
    <div>
        <h1 style="margin:0; font-size: 24px;">KRAEM | <span style="font-weight:300;">Gestión de Tiempos</span></h1>
        <p style="margin:5px 0; color:#64748b; font-size:13px;">Sistema de Autorización Digital de Incidencias</p>
    </div>
    <div id="clock" style="font-size:20px; font-weight:800; color:var(--primary);">00:00:00</div>
</div>

<div class="grid-main">
    <div class="card">
        <div class="section-title"><i class="fas fa-file-contract"></i> Nueva Solicitud / Pase</div>
        
        <div class="group">
            <label>Colaborador</label>
            <select id="sel_empleado"></select>
        </div>

        <div class="group">
            <label>Concepto</label>
            <select id="sel_tipo" onchange="toggleInputs()">
                <optgroup label="Días Completos">
                    <option value="VACACIONES">VACACIONES</option>
                    <option value="FALTA">FALTA</option>
                    <option value="SUSPENCION">SUSPENSIÓN</option>
                    <option value="INCAPACIDAD">INCAPACIDAD</option>
                    <option value="PERMISO_SIN_GOCE">PERMISO SIN GOCE</option>
                </optgroup>
                <optgroup label="Pases de Tiempo (Horas)">
                    <option value="SALIDA_TEMPRANO">SALIDA TEMPRANO</option>
                    <option value="IDA_VUELTA">IDA Y VUELTA</option>
                    <option value="LLEGADA_TARDE">LLEGADA TARDE</option>
                </optgroup>
            </select>
        </div>

        <div id="box_dias">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div class="group"><label>Inicio</label><input type="date" id="f_ini"></div>
                <div class="group"><label>Fin</label><input type="date" id="f_fin"></div>
            </div>
        </div>

        <div id="box_horas" class="time-box">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div class="group"><label>Fecha</label><input type="date" id="h_fecha"></div>
                <div class="group"><label>Hora Salida/Inicio</label><input type="time" id="h_salida"></div>
            </div>
            <p id="msg_vuelta" style="font-size:11px; color:#c2410c; margin:0;"><i class="fas fa-info-circle"></i> La hora de regreso se registrará al volver.</p>
        </div>

        <div class="group">
            <label>Autoriza (Jefe Inmediato)</label>
            <select id="sel_autorizador">
                <option value="">-- Seleccione Jefe --</option>
                <option value="ING. RICARDO">ING. RICARDO</option>
                <option value="LIC. MARTHA">LIC. MARTHA</option>
                <option value="LIDER DE LINEA">LIDER DE LINEA</option>
                <option value="GERENCIA">GERENCIA GENERAL</option>
            </select>
        </div>

        <div class="group">
            <label>Observaciones</label>
            <textarea id="txt_obs" rows="2"></textarea>
        </div>

        <button class="btn-submit" onclick="enviarSolicitud()">GENERAR FOLIO DIGITAL</button>
    </div>

    <div class="card">
        <div class="section-title"><i class="fas fa-desktop"></i> Monitor de Autorizaciones en Tiempo Real</div>
        <div id="lista_solicitudes"></div>
    </div>
</div>

<script>
    async function init() {
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        const { data: emps } = await client.from('rh_empleados').select('*').eq('estatus','ACTIVO').order('nombre_completo');
        const sel = document.getElementById('sel_empleado');
        sel.innerHTML = '<option value="">-- Seleccionar --</option>';
        emps.forEach(e => sel.innerHTML += `<option value="${e.id}">${e.nombre_completo}</option>`);
        listar();
    }

    function toggleInputs() {
        const tipo = document.getElementById('sel_tipo').value;
        const pases = ['SALIDA_TEMPRANO', 'IDA_VUELTA', 'LLEGADA_TARDE'];
        if(pases.includes(tipo)) {
            document.getElementById('box_dias').style.display = 'none';
            document.getElementById('box_horas').style.display = 'block';
        } else {
            document.getElementById('box_dias').style.display = 'block';
            document.getElementById('box_horas').style.display = 'none';
        }
    }

    async function enviarSolicitud() {
        const tipo = document.getElementById('sel_tipo').value;
        const payload = {
            empleado_id: document.getElementById('sel_empleado').value,
            tipo: tipo,
            observaciones: document.getElementById('txt_obs').value,
            autorizado_por: document.getElementById('sel_autorizador').value,
            estatus: 'PENDIENTE',
            created_at: new Date()
        };

        if(tipo === 'IDA_VUELTA' || tipo === 'SALIDA_TEMPRANO' || tipo === 'LLEGADA_TARDE') {
            payload.fecha_inicio = document.getElementById('h_fecha').value;
            payload.hora_salida = document.getElementById('h_salida').value;
            // Si es Ida y Vuelta, entra como PENDIENTE pero se marcará EN CURSO al autorizar
        } else {
            payload.fecha_inicio = document.getElementById('f_ini').value;
            payload.fecha_fin = document.getElementById('f_fin').value;
        }

        const { error } = await client.from('rh_solicitudes').insert([payload]);
        if(!error) { alert("Folio Generado"); location.reload(); }
    }

    async function listar() {
        const { data } = await client.from('rh_solicitudes')
            .select('*, rh_empleados(nombre_completo)')
            .order('created_at', {ascending: false});

        const container = document.getElementById('lista_solicitudes');
        container.innerHTML = "";

        data.forEach(s => {
            const esPase = s.hora_salida ? true : false;
            container.innerHTML += `
                <div class="request-card status-${s.estatus}">
                    <div style="display:flex; justify-content:space-between; align-items:start;">
                        <div>
                            <span class="badge" style="background:#e2e8f0;">${s.tipo}</span>
                            <h3 style="margin:10px 0 5px 0;">${s.rh_empleados.nombre_completo}</h3>
                            <p style="font-size:12px; color:#64748b; margin:0;">
                                <i class="far fa-clock"></i> 
                                ${esPase ? `FECHA: ${s.fecha_inicio} | SALIDA: ${s.hora_salida}` : `PERIODO: ${s.fecha_inicio} al ${s.fecha_fin}`}
                                ${s.hora_regreso ? ` | <b>REGRESO: ${s.hora_regreso}</b>` : ''}
                            </p>
                            <p style="font-size:12px; margin-top:10px;"><b>AUTORIZA:</b> ${s.autorizado_por}</p>
                        </div>
                        <div style="display:flex; flex-direction:column; gap:8px;">
                            ${s.estatus === 'PENDIENTE' ? `
                                <button class="btn-action" style="background:var(--success); color:white;" onclick="cambiarEstado('${s.id}', '${s.tipo === 'IDA_VUELTA' ? 'ENCURSO' : 'APROBADO'}')">AUTORIZAR</button>
                                <button class="btn-action" style="background:var(--danger); color:white;" onclick="cambiarEstado('${s.id}', 'RECHAZADO')">RECHAZAR</button>
                            ` : ''}
                            
                            ${s.estatus === 'ENCURSO' ? `
                                <button class="btn-action" style="background:var(--info); color:white;" onclick="registrarRegreso('${s.id}')">REGISTRAR REGRESO</button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        });
    }

    async function cambiarEstado(id, nuevo) {
        await client.from('rh_solicitudes').update({ estatus: nuevo }).eq('id', id);
        listar();
    }

    async function registrarRegreso(id) {
        const hora = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });
        if(confirm("¿Confirmar regreso del colaborador a las " + hora + "?")) {
            await client.from('rh_solicitudes').update({ 
                hora_regreso: hora,
                estatus: 'APROBADO' 
            }).eq('id', id);
            listar();
        }
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
