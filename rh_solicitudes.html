<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRAEM | Centro de Control de Incidencias</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #0f172a; --accent: #2563eb; --bg: #f8fafc; 
            --text: #1e293b; --border: #e2e8f0; --success: #22c55e; 
            --danger: #ef4444; --warning: #f59e0b; --purple: #8b5cf6;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        /* Layout */
        .header-pro { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .grid-pro { display: grid; grid-template-columns: 350px 1fr; gap: 25px; }

        /* Cards */
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid var(--border); padding: 20px; }
        .section-title { font-size: 14px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        /* Formulario */
        .group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 6px; }
        select, input, textarea { 
            width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; 
            font-size: 14px; transition: all 0.2s; box-sizing: border-box;
        }
        select:focus, input:focus { border-color: var(--accent); outline: none; ring: 2px var(--accent); }

        /* Listas y Tablas */
        .solicitud-item { 
            padding: 15px; border-radius: 12px; border: 1px solid var(--border); 
            margin-bottom: 12px; transition: transform 0.2s; background: #fff;
        }
        .solicitud-item:hover { transform: translateY(-2px); border-color: var(--accent); }
        
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .type-vacaciones { background: #dcfce7; color: #15803d; }
        .type-suspension { background: #fee2e2; color: #b91c1c; }
        .type-permiso { background: #eff6ff; color: #1d4ed8; }
        .type-incapacidad { background: #f5f3ff; color: #6d28d9; }

        /* Botones */
        .btn { 
            padding: 12px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; 
            border: none; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .btn-save { background: var(--accent); color: white; width: 100%; justify-content: center; }
        .btn-approve { background: var(--success); color: white; padding: 6px 12px; font-size: 12px; }
        .btn-reject { background: #fff; color: var(--danger); border: 1px solid var(--danger); padding: 6px 12px; font-size: 12px; }

        /* Info Panel */
        .info-mini { background: #f1f5f9; padding: 12px; border-radius: 10px; margin-top: 10px; display: none; }
        .info-mini p { margin: 5px 0; font-size: 12px; }
    </style>
</head>
<body>

<div class="header-pro">
    <div>
        <h1 style="margin:0; font-size: 24px; color: var(--primary);">Gestión de Incidencias Kraem</h1>
        <p style="color: #64748b; margin: 5px 0;">Administración centralizada de ausencias y permisos</p>
    </div>
    <div style="display: flex; gap: 10px;">
        <button class="btn" style="background: white; border: 1px solid var(--border);"><i class="fas fa-file-export"></i> Reporte Global</button>
        <button class="btn" style="background: var(--primary); color: white;"><i class="fas fa-shield-alt"></i> Panel RH</button>
    </div>
</div>

<div class="grid-pro">
    <div class="card">
        <div class="section-title"><i class="fas fa-plus-circle"></i> Nueva Solicitud</div>
        
        <div class="group">
            <label>Colaborador</label>
            <select id="sel_empleado" onchange="checkEmpleado()"></select>
        </div>

        <div id="info_empleado" class="info-mini">
            <p><strong>Antigüedad:</strong> <span id="txt_anti">--</span></p>
            <p><strong>Vacaciones Disp:</strong> <span id="txt_vacas" style="color:var(--accent); font-weight:bold;">0 días</span></p>
        </div>

        <div class="group">
            <label>Tipo de Incidencia / Permiso</label>
            <select id="sel_tipo">
                <optgroup label="Asistencia & Ausencias">
                    <option value="VACACIONES">VACACIONES</option>
                    <option value="SUSPENCION">SUSPENSIÓN</option>
                    <option value="FALTA">FALTA</option>
                </optgroup>
                <optgroup label="Permisos Especiales">
                    <option value="PERMISO_SIN_GOCE">PERMISO SIN GOCE</option>
                    <option value="INCAPACIDAD">INCAPACIDAD</option>
                    <option value="MATERNIDAD">PERMISO POR MATERNIDAD</option>
                    <option value="CIVIL">PERMISO POR CIVIL</option>
                    <option value="DEFUNSION">PERMISO POR DEFUNCIÓN</option>
                </optgroup>
                <optgroup label="Permisos de Tiempo">
                    <option value="SALIDA_TEMPRANO">SALIDA TEMPRANO</option>
                    <option value="IDA_VUELTA">IDA Y VUELTA</option>
                    <option value="LLEGADA_TARDE">LLEGADA TARDE</option>
                </optgroup>
            </select>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="group"><label>Desde</label><input type="date" id="fecha_inicio"></div>
            <div class="group"><label>Hasta</label><input type="date" id="fecha_fin"></div>
        </div>

        <div class="group">
            <label>Días Totales / Horas</label>
            <input type="number" id="cantidad" placeholder="Ej: 1" step="0.5">
        </div>

        <div class="group">
            <label>Observaciones / Causa</label>
            <textarea id="obs" rows="3" placeholder="Detalles de la solicitud..."></textarea>
        </div>

        <button class="btn btn-save" onclick="enviarSolicitud()"><i class="fas fa-paper-plane"></i> REGISTRAR E IR A FIRMA</button>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <div class="section-title" style="margin:0;"><i class="fas fa-tasks"></i> Solicitudes Pendientes</div>
            <select id="filtro_estado" style="width:auto; padding: 5px 10px; font-size: 12px;" onchange="listarPendientes()">
                <option value="PENDIENTE">MOSTRAR PENDIENTES</option>
                <option value="APROBADO">HISTORIAL APROBADOS</option>
            </select>
        </div>

        <div id="lista_pendientes">
            </div>
    </div>
</div>

<script>
    let empleados = [];

    async function init() {
        // 1. Cargar empleados activos
        const { data } = await client.from('rh_empleados').select('*').eq('estatus', 'ACTIVO').order('nombre_completo');
        empleados = data || [];
        const sel = document.getElementById('sel_empleado');
        sel.innerHTML = '<option value="">Selecciona al personal...</option>';
        empleados.forEach(e => sel.innerHTML += `<option value="${e.id}">${e.nombre_completo}</option>`);

        listarPendientes();
    }

    function checkEmpleado() {
        const id = document.getElementById('sel_empleado').value;
        const info = document.getElementById('info_empleado');
        if(!id) { info.style.display = 'none'; return; }
        
        const emp = empleados.find(e => e.id == id);
        document.getElementById('txt_anti').innerText = emp.fecha_ingreso || 'No registrada';
        info.style.display = 'block';
        // Aquí podrías disparar la lógica de cálculo de vacaciones automáticamente
    }

    async function enviarSolicitud() {
        const idEmp = document.getElementById('sel_empleado').value;
        const tipo = document.getElementById('sel_tipo').value;
        const f1 = document.getElementById('fecha_inicio').value;
        const f2 = document.getElementById('fecha_fin').value;
        const cant = document.getElementById('cantidad').value;

        if(!idEmp || !f1 || !cant) return alert("Por favor llena los campos críticos (Empleado, Fecha e Impacto)");

        const { error } = await client.from('rh_solicitudes').insert([{
            empleado_id: idEmp,
            tipo: tipo,
            fecha_inicio: f1,
            fecha_fin: f2 || f1,
            dias_solicitados: parseFloat(cant),
            observaciones: document.getElementById('obs').value,
            estatus: 'PENDIENTE'
        }]);

        if(!error) {
            alert("Solicitud registrada correctamente.");
            limpiarForm();
            listarPendientes();
        }
    }

    async function listarPendientes() {
        const estado = document.getElementById('filtro_estado').value;
        const { data, error } = await client.from('rh_solicitudes')
            .select('*, rh_empleados(nombre_completo, area_id)')
            .eq('estatus', estado)
            .order('created_at', {ascending: false});

        const container = document.getElementById('lista_pendientes');
        container.innerHTML = data.length === 0 ? '<p style="text-align:center; color:#64748b;">No hay solicitudes en este estado.</p>' : '';

        data.forEach(s => {
            const tipoClass = s.tipo.includes('PERMISO') ? 'type-permiso' : (s.tipo === 'VACACIONES' ? 'type-vacaciones' : 'type-suspension');
            
            container.innerHTML += `
                <div class="solicitud-item">
                    <div style="display:flex; justify-content:space-between; align-items:start;">
                        <div>
                            <span class="badge ${tipoClass}">${s.tipo.replace('_', ' ')}</span>
                            <h3 style="margin:10px 0 5px 0; font-size:16px;">${s.rh_empleados.nombre_completo}</h3>
                            <p style="margin:0; font-size:12px; color:#64748b;">
                                <i class="far fa-calendar"></i> ${s.fecha_inicio} ${s.fecha_fin ? ' al ' + s.fecha_fin : ''} 
                                | <strong>${s.dias_solicitados} días/horas</strong>
                            </p>
                            <p style="margin-top:8px; font-style:italic; font-size:13px; color:#475569;">"${s.observaciones || 'Sin observaciones'}"</p>
                        </div>
                        <div style="display:flex; flex-direction:column; gap:8px;">
                            ${estado === 'PENDIENTE' ? `
                                <button class="btn btn-approve" onclick="actualizarEstatus('${s.id}', 'APROBADO')"><i class="fas fa-check"></i> AUTORIZAR</button>
                                <button class="btn btn-reject" onclick="actualizarEstatus('${s.id}', 'RECHAZADO')"><i class="fas fa-times"></i> RECHAZAR</button>
                            ` : `<span class="badge" style="background:#f1f5f9; color:#64748b;">${s.estatus}</span>`}
                        </div>
                    </div>
                </div>
            `;
        });
    }

    async function actualizarEstatus(id, nuevoEstado) {
        const { error } = await client.from('rh_solicitudes').update({ estatus: nuevoEstado }).eq('id', id);
        if(!error) listarPendientes();
    }

    function limpiarForm() {
        document.getElementById('sel_empleado').value = "";
        document.getElementById('cantidad').value = "";
        document.getElementById('obs').value = "";
    }

    document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
