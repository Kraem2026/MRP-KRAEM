<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRAEM | RH Management System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0f172a; --accent: #2563eb; --accent-soft: #dbeafe;
            --success: #10b981; --danger: #ef4444; --bg: #f8fafc;
            --sidebar: #ffffff; --text-main: #1e293b; --text-muted: #64748b;
            --border: #e2e8f0; --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); display: flex; min-height: 100vh; }

        /* Sidebar con scroll independiente */
        .sidebar { width: 350px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 24px; position: fixed; height: 100vh; overflow-y: auto; }
        .main-content { margin-left: 350px; width: calc(100% - 350px); padding: 40px; }

        .logo-img { max-width: 160px; margin-bottom: 20px; display: block; margin-left: auto; margin-right: auto; }

        /* Tarjeta de Información de Empleado (Restaurada) */
        .info-empleado {
            background: var(--primary); color: white; padding: 18px; border-radius: var(--radius); margin-bottom: 20px;
            display: none; border-left: 5px solid var(--accent);
        }
        .info-empleado h4 { font-size: 11px; text-transform: uppercase; opacity: 0.7; margin-bottom: 4px; }
        .info-empleado .dato { font-size: 18px; font-weight: 800; margin-bottom: 10px; }
        .info-empleado .subdato { font-size: 12px; opacity: 0.9; display: flex; align-items: center; gap: 5px; }

        /* Formulario */
        .group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 5px; color: var(--text-muted); }
        select, input, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; }
        
        .flex-row { display: flex; gap: 10px; }
        .flex-row > div { flex: 1; }

        /* Tabla */
        .table-container { background: #fff; border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 12px 16px; text-align: left; font-size: 11px; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        td { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }

        .btn-primary { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 700; width: 100%; cursor: pointer; margin-top: 10px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }
    </style>
</head>
<body>

<aside class="sidebar">
    <img src="https://raw.githubusercontent.com/tu-usuario/tu-repo/main/logo-kraem.jpg" alt="KRAEM" class="logo-img" onerror="this.src='https://via.placeholder.com/160x50?text=KRAEM+RH'">
    
    <div id="panel_empleado" class="info-empleado">
        <h4>Colaborador Seleccionado</h4>
        <div id="view_puesto" style="font-size: 12px; font-weight: 600; color: var(--accent-soft);">PUESTO</div>
        <div id="view_nombre" class="dato">Nombre del Empleado</div>
        <div class="subdato"><i class="fas fa-calendar-check"></i> Antigüedad: <span id="view_antiguedad">0 años</span></div>
        <div class="subdato"><i class="fas fa-umbrella-beach"></i> Vacaciones Disp: <span id="view_vacaciones">0 días</span></div>
    </div>

    <div class="group">
        <label>Empleado</label>
        <select id="sol_empleado" onchange="cargarDetallesEmpleado()"></select>
    </div>

    <div class="flex-row">
        <div class="group">
            <label>Desde</label>
            <input type="date" id="sol_desde">
        </div>
        <div class="group" id="box_hasta">
            <label>Hasta</label>
            <input type="date" id="sol_hasta">
        </div>
    </div>

    <div id="box_hora" style="display:none;" class="group">
        <label>Hora</label>
        <input type="time" id="sol_hora">
    </div>

    <div class="group">
        <label>Tipo de Movimiento</label>
        <select id="sol_tipo" onchange="gestionarCampos()">
            <option value="VACACIONES">Vacaciones</option>
            <option value="PERMISO_SIN_GOCE">Permiso sin goce</option>
            <option value="SALIDA_TEMPRANO">Pase de Salida</option>
            <option value="LLEGADA_TARDE">Entrada Tarde</option>
        </select>
    </div>

    <div class="group">
        <label>Autorizador Asignado (Quién firmará)</label>
        <select id="sol_autorizador"></select>
    </div>

    <div class="group">
        <label>Motivo</label>
        <textarea id="sol_motivo" rows="2"></textarea>
    </div>

    <button class="btn-primary" onclick="guardar()">
        <i class="fas fa-save"></i> REGISTRAR MOVIMIENTO
    </button>
</aside>

<main class="main-content">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h2>Gestión de Solicitudes</h2>
        <select id="f_estatus" onchange="listar()" style="width:200px; padding:8px; border-radius:8px;">
            <option value="PENDIENTE">Pendientes</option>
            <option value="APROBADO">Aprobados</option>
            <option value="TODOS">Ver Todo</option>
        </select>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Empleado / Puesto</th>
                    <th>Tipo</th>
                    <th>Vigencia</th>
                    <th>Autorizador</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla_solicitudes"></tbody>
        </table>
    </div>
</main>

<script>
    // Configuración de usuario actual (Simulado)
    const SESION = { usuario: "gegonza", nombre: "GERARDO GONZALEZ", rol: "ADMIN" };

    let db_empleados = [];

    async function init() {
        const { data } = await client.from('rh_empleados').select('*, rh_puestos(nombre)').eq('estatus', 'ACTIVO').order('nombre_completo');
        db_empleados = data || [];
        
        const html = '<option value="">-- Seleccionar --</option>' + db_empleados.map(e => `<option value="${e.id}">${e.nombre_completo}</option>`).join('');
        document.getElementById('sol_empleado').innerHTML = html;
        document.getElementById('sol_autorizador').innerHTML = html;
        
        listar();
    }

    function calcularAntiguedad(fechaIngreso) {
        const inicio = new Date(fechaIngreso);
        const hoy = new Date();
        let anios = hoy.getFullYear() - inicio.getFullYear();
        let meses = hoy.getMonth() - inicio.getMonth();
        if (meses < 0 || (meses === 0 && hoy.getDate() < inicio.getDate())) {
            anios--;
            meses += 12;
        }
        return { anios, meses };
    }

    function diasPorLey(anios) {
        if (anios < 1) return 0;
        if (anios == 1) return 12;
        if (anios == 2) return 14;
        if (anios == 3) return 16;
        if (anios == 4) return 18;
        if (anios == 5) return 20;
        if (anios <= 10) return 22;
        return 24;
    }

    async function cargarDetallesEmpleado() {
        const id = document.getElementById('sol_empleado').value;
        const p = db_empleados.find(e => e.id == id);
        if(!p) { document.getElementById('panel_empleado').style.display='none'; return; }

        const anti = calcularAntiguedad(p.fecha_ingreso);
        
        // Consultar vacaciones ya usadas
        const { data: usados } = await client.from('rh_solicitudes').select('dias_solicitados').eq('empleado_id', id).eq('estatus', 'APROBADO').eq('tipo', 'VACACIONES');
        const diasUsados = usados?.reduce((a, b) => a + (b.dias_solicitados || 0), 0) || 0;

        document.getElementById('view_nombre').innerText = p.nombre_completo;
        document.getElementById('view_puesto').innerText = p.rh_puestos?.nombre || 'OPERADOR';
        document.getElementById('view_antiguedad').innerText = `${anti.anios} años, ${anti.meses} meses`;
        document.getElementById('view_vacaciones').innerText = (diasPorLey(anti.anios) - diasUsados) + " días";
        document.getElementById('panel_empleado').style.display = 'block';
    }

    function gestionarCampos() {
        const t = document.getElementById('sol_tipo').value;
        const esHora = t.includes('SALIDA') || t.includes('TARDE');
        document.getElementById('box_hasta').style.display = esHora ? 'none' : 'block';
        document.getElementById('box_hora').style.display = esHora ? 'block' : 'none';
    }

    async function guardar() {
        const colab = db_empleados.find(e => e.id == document.getElementById('sol_empleado').value);
        const aut = db_empleados.find(e => e.id == document.getElementById('sol_autorizador').value);
        
        if(!colab || !aut) return alert("Seleccione empleado y autorizador");

        await client.from('rh_solicitudes').insert([{
            empleado_id: colab.id,
            tipo: document.getElementById('sol_tipo').value,
            fecha_inicio: document.getElementById('sol_desde').value,
            fecha_fin: document.getElementById('sol_hasta').value || document.getElementById('sol_desde').value,
            hora_solicitud: document.getElementById('sol_hora').value,
            motivo: document.getElementById('sol_motivo').value,
            puesto_solicitante: colab.rh_puestos?.nombre,
            autorizador_asignado: aut.nombre_completo,
            creado_por: SESION.nombre,
            estatus: 'PENDIENTE'
        }]);

        location.reload();
    }

    async function listar() {
        const f = document.getElementById('f_estatus').value;
        let q = client.from('rh_solicitudes').select('*, rh_empleados(nombre_completo)').order('created_at', {ascending: false});
        if(f !== 'TODOS') q = q.eq('estatus', f);

        const { data } = await q;
        document.getElementById('tabla_solicitudes').innerHTML = (data || []).map(s => `
            <tr>
                <td><b>${s.rh_empleados?.nombre_completo}</b><br><small>${s.puesto_solicitante}</small></td>
                <td><span class="badge" style="background:#eee">${s.tipo}</span></td>
                <td>${s.fecha_inicio} ${s.hora_solicitud || ''}</td>
                <td><i class="fas fa-signature"></i> ${s.autorizador_asignado}</td>
                <td><span class="badge" style="background:${s.estatus=='APROBADO'?'#dcfce7':'#fef3c7'}">${s.estatus}</span></td>
                <td>
                    ${s.estatus === 'PENDIENTE' && (SESION.rol === 'ADMIN' || SESION.nombre === s.autorizador_asignado) ? 
                    `<button onclick="aprobar('${s.id}')" style="background:#10b981; color:white; border:none; padding:5px; border-radius:4px; cursor:pointer;"><i class="fas fa-check"></i></button>` : ''}
                </td>
            </tr>
        `).join('');
    }

    async function aprobar(id) {
        await client.from('rh_solicitudes').update({ estatus: 'APROBADO', aprobado_por: SESION.nombre, fecha_aprobacion: new Date().toISOString() }).eq('id', id);
        listar();
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
