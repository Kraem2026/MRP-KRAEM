<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRAEM | Control de Solicitudes</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f8fafc; --text: #1e293b; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .container { max-width: 1400px; margin: auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .btn-nav { padding: 10px 15px; border-radius: 8px; border: 1px solid var(--border); background: white; cursor: pointer; text-decoration: none; color: var(--text); font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
        
        .grid-layout { display: grid; grid-template-columns: 380px 1fr; gap: 20px; }
        @media (max-width: 1000px) { .grid-layout { grid-template-columns: 1fr; } }

        .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        label { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; box-sizing: border-box; }

        .badge { padding: 5px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; }
        .badge-pendiente { background: #fef3c7; color: #92400e; }
        .badge-aprobado { background: #dcfce7; color: #166534; }
        .badge-rechazado { background: #fee2e2; color: #991b1b; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; font-size: 11px; color: #64748b; border-bottom: 2px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        
        .btn-action { width: 30px; height: 30px; border-radius: 6px; border: none; cursor: pointer; margin-left: 4px; }
        .btn-approve { background: #dcfce7; color: #166534; }
        .btn-reject { background: #fee2e2; color: #991b1b; }
        .info-saldo { background: #eff6ff; padding: 10px; border-radius: 8px; font-size: 12px; margin-bottom: 15px; display: none; border-left: 4px solid var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="display:flex; gap:15px; align-items:center;">
            <a href="dashboard.html" class="btn-nav"><i class="fas fa-arrow-left"></i> Panel Principal</a>
            <h2 style="margin:0;">Control de Solicitudes</h2>
        </div>
    </div>

    <div class="grid-layout">
        <div class="card">
            <h3 style="margin-top:0;"><i class="fas fa-paper-plane"></i> Nueva Solicitud</h3>
            
            <div class="form-group">
                <label>Empleado</label>
                <select id="sol_empleado" onchange="mostrarSaldo()"></select>
            </div>

            <div id="box_saldo" class="info-saldo">
                Saldo disponible: <b id="val_saldo">0</b> días.
            </div>
            
            <div class="form-group">
                <label>Tipo</label>
                <select id="sol_tipo">
                    <option value="VACACIONES">Vacaciones</option>
                    <option value="PERMISO">Permiso</option>
                    <option value="INCAPACIDAD">Incapacidad</option>
                </select>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div class="form-group">
                    <label>Desde</label>
                    <input type="date" id="sol_desde" onchange="calcularDias()">
                </div>
                <div class="form-group">
                    <label>Hasta</label>
                    <input type="date" id="sol_hasta" onchange="calcularDias()">
                </div>
            </div>

            <div class="form-group">
                <label>Días Totales</label>
                <input type="number" id="sol_dias" readonly style="background:#f1f5f9;">
            </div>

            <div class="form-group">
                <label>Motivo</label>
                <textarea id="sol_motivo" rows="2"></textarea>
            </div>

            <button onclick="enviarSolicitud()" class="btn-nav" style="width:100%; justify-content:center; background:var(--accent); color:white; border:none; padding:15px;">
                REGISTRAR
            </button>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <h3 style="margin:0;">Historial</h3>
                <button onclick="listarSolicitudes('TODO')" class="btn-nav" style="font-size:11px;">VER TODO</button>
            </div>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Colaborador</th>
                            <th>Tipo</th>
                            <th>Periodo</th>
                            <th>Días</th>
                            <th>Estatus</th>
                            <th style="text-align:right;">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tabla_solicitudes"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let db_empleados = [];

    async function init() {
        // 1. Cargar Empleados
        const { data, error } = await client.from('rh_empleados').select('*').eq('estatus', 'ACTIVO').order('nombre_completo');
        
        if (error) {
            console.error("Error:", error);
            return;
        }

        db_empleados = data;
        const sel = document.getElementById('sol_empleado');
        sel.innerHTML = '<option value="">-- Seleccionar --</option>';
        data.forEach(e => {
            sel.innerHTML += `<option value="${e.id}">${e.nombre_completo}</option>`;
        });

        listarSolicitudes('PENDIENTE');
    }

    function mostrarSaldo() {
        const id = document.getElementById('sol_empleado').value;
        const box = document.getElementById('box_saldo');
        if(!id) { box.style.display = 'none'; return; }
        const emp = db_empleados.find(e => e.id == id);
        document.getElementById('val_saldo').innerText = emp.vacaciones_disponibles || 0;
        box.style.display = 'block';
    }

    function calcularDias() {
        const d = document.getElementById('sol_desde').value;
        const h = document.getElementById('sol_hasta').value;
        if(d && h) {
            let inicio = new Date(d + 'T00:00:00');
            let fin = new Date(h + 'T00:00:00');
            let diff = (fin - inicio) / (1000 * 60 * 60 * 24) + 1;
            document.getElementById('sol_dias').value = diff > 0 ? diff : 0;
        }
    }

    async function enviarSolicitud() {
        const id = document.getElementById('sol_empleado').value;
        if(!id) return alert("Selecciona un empleado");

        const payload = {
            empleado_id: id,
            tipo: document.getElementById('sol_tipo').value,
            fecha_inicio: document.getElementById('sol_desde').value,
            fecha_fin: document.getElementById('sol_hasta').value,
            dias_solicitados: parseInt(document.getElementById('sol_dias').value),
            motivo: document.getElementById('sol_motivo').value,
            estatus: 'PENDIENTE'
        };

        const { error } = await client.from('rh_solicitudes').insert([payload]);
        if(!error) { alert("¡Enviado!"); location.reload(); }
        else { alert("Error al guardar: " + error.message); }
    }

    async function listarSolicitudes(f) {
        let q = client.from('rh_solicitudes').select('*, rh_empleados(nombre_completo)').order('created_at', {ascending: false});
        if(f !== 'TODO') q = q.eq('estatus', f);
        
        const { data } = await q;
        const tbody = document.getElementById('tabla_solicitudes');
        tbody.innerHTML = (data || []).map(s => `
            <tr>
                <td><b>${s.rh_empleados?.nombre_completo || 'N/A'}</b></td>
                <td>${s.tipo}</td>
                <td>${s.fecha_inicio} / ${s.fecha_fin}</td>
                <td>${s.dias_solicitados}</td>
                <td><span class="badge badge-${s.estatus.toLowerCase()}">${s.estatus}</span></td>
                <td style="text-align:right;">
                    ${s.estatus === 'PENDIENTE' ? `
                        <button class="btn-action btn-approve" onclick="procesar('${s.id}', 'APROBADO', '${s.empleado_id}', ${s.dias_solicitados}, '${s.tipo}')"><i class="fas fa-check"></i></button>
                        <button class="btn-action btn-reject" onclick="procesar('${s.id}', 'RECHAZADO')"><i class="fas fa-times"></i></button>
                    ` : '-'}
                </td>
            </tr>
        `).join('');
    }

    async function procesar(id, decision, empId, dias, tipo) {
        if(!confirm("¿Confirmar acción?")) return;

        const { error } = await client.from('rh_solicitudes').update({ estatus: decision }).eq('id', id);

        if(!error && decision === 'APROBADO' && tipo === 'VACACIONES') {
            const emp = db_empleados.find(e => e.id == empId);
            const nuevoSaldo = (emp.vacaciones_disponibles || 0) - dias;
            await client.from('rh_empleados').update({ vacaciones_disponibles: nuevoSaldo }).eq('id', empId);
        }
        listarSolicitudes('PENDIENTE');
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
