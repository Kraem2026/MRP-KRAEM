<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KRAEM | Control Total de Incidencias</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f1f5f9; --text: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Navbar */
        .nav { background: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-dash { background: #334155; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; }

        .main-container { display: grid; grid-template-columns: 450px 1fr; gap: 20px; padding: 20px; flex: 1; overflow: hidden; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); overflow-y: auto; }

        /* Formulario Estilizado */
        .section-title { font-size: 14px; font-weight: bold; color: var(--accent); text-transform: uppercase; margin-bottom: 15px; border-bottom: 2px solid var(--bg); padding-bottom: 5px; }
        label { display: block; font-size: 11px; font-weight: 700; color: #64748b; margin-bottom: 4px; }
        select, input, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; font-size: 13px; box-sizing: border-box; }
        
        .info-badge { background: #f0f9ff; border: 1px solid #bae6fd; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 12px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* Tabla */
        .table-container { background: white; border-radius: 12px; padding: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #f8fafc; text-align: left; padding: 12px; color: #64748b; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }
        
        .status { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 10px; }
        .status-PENDIENTE { background: #fef3c7; color: #92400e; }
        .status-APROBADO { background: #dcfce7; color: #166534; }
        
        .btn-reg { background: var(--accent); color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="nav">
    <button class="btn-dash" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-left"></i> Dashboard</button>
    <div id="reloj" style="font-weight: bold;">00:00:00 - --/--/----</div>
</div>

<div class="main-container">
    <div class="card">
        <div class="section-title">Datos del Solicitante</div>
        <div class="grid-2">
            <div>
                <label>Área</label>
                <select id="f_area" onchange="filtrarPersonal()"><option value="">Todas</option><option value="PRODUCCION">PRODUCCIÓN</option><option value="CALIDAD">CALIDAD</option><option value="MANTENIMIENTO">MANTENIMIENTO</option></select>
            </div>
            <div>
                <label>Turno</label>
                <select id="f_turno" onchange="filtrarPersonal()"><option value="">Todos</option><option value="1">1ero</option><option value="2">2do</option><option value="3">3ero</option></select>
            </div>
        </div>
        
        <label>Seleccionar Personal</label>
        <select id="sel_empleado" onchange="verInfoEmpleado()"></select>

        <div id="info_empleado" class="info-badge" style="display:none;">
            <b>Puesto:</b> <span id="info_puesto"></span><br>
            <b>Antigüedad:</b> <span id="info_anti"></span><br>
            <b>Vacaciones Disponibles:</b> <span id="info_vacs"></span>
        </div>

        <div class="section-title">Tipo de Solicitud</div>
        <select id="sel_tipo" onchange="ajustarCampos()">
            <option value="VACACIONES">VACACIONES</option>
            <option value="PERMISO_SIN_GOCE">PERMISO SIN GOCE</option>
            <option value="MATERNIDAD">INCAPACIDAD MATERNIDAD (84 DÍAS)</option>
            <option value="PATERNIDAD">INCAPACIDAD PATERNIDAD</option>
            <option value="ENFERMEDAD">INCAPACIDAD ENFERMEDAD</option>
            <option value="DEFUNCION">PERMISO DEFUNCIÓN</option>
            <option value="MATRIMONIO">PERMISO MATRIMONIO</option>
            <option value="SUSPENCION">SUSPENSIÓN</option>
            <option value="SALIDA_TEMPRANO">SALIDA TEMPRANO</option>
            <option value="IDA_VUELTA">IDA Y VUELTA</option>
            <option value="LLEGADA_TARDE">LLEGADA TARDE</option>
        </select>

        <div id="campos_dinamicos">
            <div id="box_fechas" class="grid-2">
                <div><label>Fecha Inicio</label><input type="date" id="f_ini" onchange="calcularMaternidad()"></div>
                <div id="box_f_fin"><label>Fecha Fin</label><input type="date" id="f_fin"></div>
            </div>
            <div id="box_reloj" style="display:none;" class="grid-2">
                <div><label>Hora Acción</label><input type="time" id="h_accion"></div>
            </div>
        </div>

        <label>Autoriza (Turno/Área)</label>
        <select id="sel_autoriza"></select>

        <label>Observaciones</label>
        <textarea id="txt_obs" rows="2"></textarea>

        <button class="btn-reg" onclick="registrarSolicitud()">REGISTRAR Y FIRMAR</button>
    </div>

    <div class="card">
        <div class="section-title">Historial y Aprobaciones</div>
        <div class="filter-container" style="display:flex; gap:10px; margin-bottom:15px;">
            <select id="filter_status" onchange="consultar()" style="width:200px;"><option value="">Todos los registros</option><option value="PENDIENTE">PENDIENTES</option><option value="APROBADO">APROBADOS</option></select>
            <button onclick="exportarExcel()" class="btn-dash"><i class="fas fa-file-excel"></i> Excel</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Empleado</th>
                    <th>Tipo</th>
                    <th>Periodo / Hora</th>
                    <th>Estatus</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla_solicitudes"></tbody>
        </table>
    </div>
</div>

<script>
let todos_empleados = [];

async function init() {
    setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleString(); }, 1000);
    const { data } = await client.from('rh_empleados').select('*').eq('estatus', 'ACTIVO');
    todos_empleados = data || [];
    filtrarPersonal();
    consultar();
}

function filtrarPersonal() {
    const area = document.getElementById('f_area').value;
    const turno = document.getElementById('f_turno').value;
    const filtrados = todos_empleados.filter(e => (!area || e.area === area) && (!turno || e.turno == turno));
    
    let html = '<option value="">-- Seleccionar --</option>';
    filtrados.forEach(e => html += `<option value="${e.id}">${e.nombre_completo}</option>`);
    document.getElementById('sel_empleado').innerHTML = html;
    document.getElementById('sel_autoriza').innerHTML = html;
}

function verInfoEmpleado() {
    const id = document.getElementById('sel_empleado').value;
    const emp = todos_empleados.find(e => e.id == id);
    if(!emp) return;
    
    document.getElementById('info_puesto').innerText = emp.puesto || 'N/A';
    document.getElementById('info_anti').innerText = emp.fecha_ingreso || 'N/A';
    document.getElementById('info_empleado').style.display = 'block';
}

function ajustarCampos() {
    const tipo = document.getElementById('sel_tipo').value;
    const esReloj = ["SALIDA_TEMPRANO", "IDA_VUELTA", "LLEGADA_TARDE"].includes(tipo);
    const esMaternidad = tipo === "MATERNIDAD";

    document.getElementById('box_reloj').style.display = esReloj ? 'grid' : 'none';
    document.getElementById('box_f_fin').style.display = (esReloj || esMaternidad) ? 'none' : 'block';
}

function calcularMaternidad() {
    if(document.getElementById('sel_tipo').value === "MATERNIDAD") {
        const fecha = new Date(document.getElementById('f_ini').value);
        fecha.setDate(fecha.getDate() + 84);
        document.getElementById('f_fin').value = fecha.toISOString().split('T')[0];
    }
}

async function registrarSolicitud() {
    const tipo = document.getElementById('sel_tipo').value;
    const payload = {
        empleado_id: document.getElementById('sel_empleado').value,
        tipo: tipo,
        fecha_inicio: document.getElementById('f_ini').value,
        fecha_fin: document.getElementById('f_fin').value,
        hora_salida: document.getElementById('h_accion').value,
        autorizado_por: document.getElementById('sel_autoriza').value,
        observaciones: document.getElementById('txt_obs').value,
        estatus: 'PENDIENTE',
        firma_digital: 'FIRMADO_SISTEMA'
    };

    const { error } = await client.from('rh_solicitudes').insert([payload]);
    if(error) alert("Error: " + error.message);
    else { alert("Registrado"); location.reload(); }
}

async function consultar() {
    const { data } = await client.from('rh_solicitudes').select('*, rh_empleados(nombre_completo)');
    const body = document.getElementById('tabla_solicitudes');
    body.innerHTML = "";
    data.forEach(s => {
        body.innerHTML += `<tr>
            <td>${s.rh_empleados?.nombre_completo}</td>
            <td>${s.tipo}</td>
            <td>${s.fecha_inicio} ${s.hora_salida || ''}</td>
            <td><span class="status status-${s.estatus}">${s.estatus}</span></td>
            <td>
                <button onclick="aprobar('${s.id}')">✔️</button>
                <button onclick="rechazar('${s.id}')">❌</button>
            </td>
        </tr>`;
    });
}

async function aprobar(id) { await client.from('rh_solicitudes').update({estatus: 'APROBADO'}).eq('id', id); consultar(); }

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
