<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Inventarios - KRAEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="config.js"></script>

    <style>
        :root { 
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --text-secondary: #64748b;
            --border: #e2e8f0; --primary: #2563eb; --success: #22c55e; --danger: #ef4444; --warning: #f59e0b;
        }
        [data-theme="dark"] {
            --bg: #020617; --card: #1e293b; --text: #f1f5f9; --text-secondary: #94a3b8; --border: #334155;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; }
        
        header { display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto 20px auto; gap: 10px;}
        
        .btn { padding: 10px 18px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.2s; text-decoration: none; font-size: 14px; }
        .btn-primary { background: var(--primary); color: white; border: none; }

        .search-container { background: var(--card); padding: 15px; border-radius: 16px; border: 1px solid var(--border); max-width: 1400px; margin: 0 auto 20px auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        input, select { padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); outline: none; box-sizing: border-box;}

        .table-container { background: var(--card); border-radius: 16px; border: 1px solid var(--border); max-width: 1400px; margin: auto; overflow-x: auto; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 1000px; }
        th { background: #1e293b; color: white; padding: 12px 15px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 13px; }
        tr:hover td { background: rgba(37, 99, 235, 0.05); cursor: pointer; }
        
        .badge { padding: 4px 8px; border-radius: 8px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .bg-success { background: rgba(34, 197, 94, 0.1); color: #166534; }
        .bg-warning { background: rgba(245, 158, 11, 0.1); color: #854d0e; }
        .bg-danger { background: rgba(239, 68, 68, 0.1); color: #991b1b; }

        .kpi-text { font-weight: 700; font-size: 14px; }
        .sub-text { font-size: 11px; color: var(--text-secondary); display: block; }

        .controls { display: flex; gap: 10px; align-items: center; }
        .lang-btn { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 1px solid var(--border); overflow: hidden; padding: 0; background: var(--card); }
        .lang-btn img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <a href="dashboard.html" class="btn"><i class="fas fa-home"></i></a>
        <h2 style="margin:0;" id="txt_title">Administración de Números de Parte</h2>
    </div>
    <div class="controls">
        <a href="ingenieria_nuevo_np.html" class="btn btn-primary" id="btn_new">
            <i class="fas fa-plus"></i> <span id="txt_new">Nuevo NP</span>
        </a>
        <button class="lang-btn" onclick="setLang('es')"><img src="https://flagcdn.com/w80/mx.png"></button>
        <button class="lang-btn" onclick="setLang('ko')"><img src="https://flagcdn.com/w80/kr.png"></button>
        <button class="btn" onclick="toggleTheme()"><i id="themeIcon" class="fas fa-moon"></i></button>
    </div>
</header>

<div class="search-container">
    <input type="text" id="searchPart" placeholder="N° Parte o Nombre..." oninput="filterTable()">
    <input type="text" id="searchProject" placeholder="Proyecto..." oninput="filterTable()">
    <select id="filterStatus" onchange="filterTable()">
        <option value="">Estatus: Todos</option>
        <option value="active">Activos</option>
        <option value="obs">Obsoletos</option>
    </select>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>Identificación</th>
                <th>Proyecto / Tipo</th>
                <th>Inventario Actual</th>
                <th>Demanda Mensual</th>
                <th>Cobertura</th>
                <th>Rotación (30d)</th>
                <th>Estatus</th>
            </tr>
        </thead>
        <tbody id="partsBody">
            </tbody>
    </table>
</div>

<script>
    let allPartsData = [];
    let currentLang = localStorage.getItem('lang') || 'es';

    const translations = {
        es: { title: "Administración de Números de Parte", new: "Nuevo NP", act: "Activo", obs: "Obsoleto", days: "días", low: "CRÍTICO", mid: "OK", high: "EXCESO" },
        ko: { title: "부품 번호 관리 시스템", new: "새 부품 등록", act: "활성", obs: "단종", days: "일", low: "위험", mid: "정상", high: "과다" }
    };

    async function init() {
        applyTheme();
        setLang(currentLang);
        await loadFullData();
    }

    async function loadFullData() {
        // Traemos las partes y cruzamos con inventarios (asumiendo que tienes vistas o tablas de stock)
        // Nota: En un sistema real, podrías usar una View en Supabase para traer esto en una sola consulta
        const { data: parts, error } = await client.from('parts').select('*').order('part_number', { ascending: true });
        
        if (error) return console.error(error);

        // Aquí simulamos o calculamos los datos de demanda/stock si no están en la tabla 'parts'
        // Si ya tienes una tabla 'inventory_summary', deberías hacer un Join o segunda consulta
        allPartsData = parts.map(p => {
            const stock = p.current_stock || 0;
            const demanda = p.avg_monthly_demand || 0;
            const cobertura = demanda > 0 ? Math.round((stock / demanda) * 30) : 0;
            return { ...p, stock, demanda, cobertura };
        });

        renderTable(allPartsData);
    }

    function renderTable(list) {
        const body = document.getElementById('partsBody');
        const l = translations[currentLang];
        
        body.innerHTML = list.map(p => {
            // Lógica de color para cobertura
            let cobClass = 'bg-success';
            if (p.cobertura < 7) cobClass = 'bg-danger';
            else if (p.cobertura < 15) cobClass = 'bg-warning';

            return `
                <tr onclick="location.href='part_ficha_tecnica.html?id=${p.id}'">
                    <td>
                        <span class="kpi-text">${p.part_number}</span>
                        <span class="sub-text">${p.description || p.part_name || '---'}</span>
                    </td>
                    <td>
                        <span class="kpi-text">${p.project || 'N/A'}</span>
                        <span class="sub-text">${p.part_type || 'TIPO'}</span>
                    </td>
                    <td>
                        <span class="kpi-text">${p.stock.toLocaleString()}</span>
                        <span class="sub-text">${p.uom || 'PZA'}</span>
                    </td>
                    <td>
                        <span class="kpi-text">${p.demanda.toLocaleString()}</span>
                        <span class="sub-text">Promedio mensual</span>
                    </td>
                    <td>
                        <span class="badge ${cobClass}">${p.cobertura} ${l.days}</span>
                    </td>
                    <td>
                        <span class="kpi-text">${p.rotation_30 || 0}%</span>
                    </td>
                    <td>
                        <span class="badge ${p.obsolete ? 'bg-danger' : 'bg-success'}">
                            ${p.obsolete ? l.obs : l.act}
                        </span>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function filterTable() {
        const partQ = document.getElementById('searchPart').value.toLowerCase();
        const projQ = document.getElementById('searchProject').value.toLowerCase();
        const statusQ = document.getElementById('filterStatus').value;

        const filtered = allPartsData.filter(p => {
            const matchesPart = p.part_number.toLowerCase().includes(partQ) || (p.description && p.description.toLowerCase().includes(partQ));
            const matchesProj = (p.project || '').toLowerCase().includes(projQ);
            const matchesStatus = statusQ === "" || (statusQ === 'obs' ? p.obsolete : !p.obsolete);
            return matchesPart && matchesProj && matchesStatus;
        });
        renderTable(filtered);
    }

    function setLang(lang) {
        currentLang = lang;
        localStorage.setItem('lang', lang);
        const l = translations[lang];
        document.getElementById('txt_title').innerText = l.title;
        document.getElementById('txt_new').innerText = l.new;
        renderTable(allPartsData);
    }

    function toggleTheme() {
        const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        document.getElementById('themeIcon').className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
    }

    function applyTheme() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        if(document.getElementById('themeIcon')) {
            document.getElementById('themeIcon').className = savedTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        }
    }

    init();
</script>
</body>
</html>
