<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Ingeniería - KRAEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="config.js"></script>

    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --border: #e2e8f0; --primary: #2563eb; --success: #22c55e; --danger: #ef4444; }
        [data-theme="dark"] { --bg: #020617; --card: #1e293b; --text: #f1f5f9; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; }
        
        header { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto 20px auto; flex-wrap: wrap; gap: 10px; }
        
        .btn { padding: 10px 18px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; text-decoration: none; font-size: 14px; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; border: none; }
        
        .search-container { background: var(--card); padding: 15px; border-radius: 16px; border: 1px solid var(--border); max-width: 1200px; margin: 0 auto 20px auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        input, select { padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); outline: none; }

        .table-container { background: var(--card); border-radius: 16px; border: 1px solid var(--border); max-width: 1200px; margin: auto; overflow-x: auto; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 800px; }
        th { background: #1e293b; color: white; padding: 15px; font-size: 11px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 13px; }
        
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .dot-active { background: var(--success); }
        .dot-obs { background: var(--danger); }

        .controls { display: flex; gap: 10px; align-items: center; }
        .lang-btn { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 1px solid var(--border); overflow: hidden; padding: 0; background: var(--card); }
        .lang-btn img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <a href="dashboard.html" class="btn"><i class="fas fa-home"></i></a>
        <h2 style="margin:0;" id="txt_title">Catálogo Maestro</h2>
    </div>
    <div class="controls">
        <a href="ingenieria_nuevo_np.html" class="btn btn-primary" id="btn_new">
            <i class="fas fa-plus"></i> Nuevo
        </a>
        <button class="lang-btn" onclick="setLang('es')"><img src="https://flagcdn.com/w80/mx.png" alt="MX"></button>
        <button class="lang-btn" onclick="setLang('ko')"><img src="https://flagcdn.com/w80/kr.png" alt="KR"></button>
        <button class="btn" onclick="toggleTheme()"><i id="themeIcon" class="fas fa-moon"></i></button>
    </div>
</header>

<div class="search-container">
    <input type="text" id="searchPart" placeholder="N° Parte o Nombre..." onkeyup="searchOnSupabase()">
    <input type="text" id="searchProject" placeholder="Proyecto..." onkeyup="searchOnSupabase()">
    <select id="filterStatus" onchange="searchOnSupabase()">
        <option value="" id="opt_all">Todos los estatus</option>
        <option value="false" id="opt_active">Activos</option>
        <option value="true" id="opt_obs">Obsoletos</option>
    </select>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th id="th_part">N° Parte</th>
                <th id="th_desc">Descripción</th>
                <th id="th_proj">Proyecto</th>
                <th id="th_type">Tipo</th>
                <th id="th_status">Estatus</th>
                <th style="width:50px;"></th>
            </tr>
        </thead>
        <tbody id="partsBody"></tbody>
    </table>
</div>

<script>
    let currentLang = localStorage.getItem('lang') || 'es';
    let searchTimeout;

    const translations = {
        es: {
            title: "Catálogo Maestro de Ingeniería", new: "Nuevo N.P.",
            pPart: "N° Parte o Nombre...", pProj: "Filtrar Proyecto...",
            optAll: "Todos los estatus", optActive: "Activos", optObs: "Obsoletos",
            thPart: "N° Parte", thDesc: "Descripción", thProj: "Proyecto", thType: "Tipo", thStatus: "Estatus",
            act: "Activo", obs: "Obsoleto", noRes: "Sin resultados."
        },
        ko: {
            title: "마스터 엔지니어링 카탈로그", new: "새 부품 등록",
            pPart: "부품 번호 또는 이름...", pProj: "프로젝트 필터...",
            optAll: "모든 상태", optActive: "활성", optObs: "단종",
            thPart: "부품 번호", thDesc: "설명", thProj: "프로젝트", thType: "유형", thStatus: "상태",
            act: "활성", obs: "단종", noRes: "결과가 없습니다."
        }
    };

    async function init() {
        applyTheme();
        setLang(currentLang);
        // searchOnSupabase se llama dentro de setLang
    }

    async function searchOnSupabase() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(async () => {
            const partQ = document.getElementById('searchPart').value.trim();
            const projQ = document.getElementById('searchProject').value.trim();
            const statusQ = document.getElementById('filterStatus').value;

            let query = client.from('parts').select('*');

            if (partQ) {
                query = query.or(`part_number.ilike.%${partQ}%,part_name.ilike.%${partQ}%,description.ilike.%${partQ}%`);
            }
            if (projQ) {
                query = query.ilike('project', `%${projQ}%`);
            }
            if (statusQ !== "") {
                query = query.eq('obsolete', statusQ === "true");
            }

            const { data, error } = await query
                .order('id', { ascending: false })
                .limit(100);

            if (error) return console.error('Error:', error);
            renderTable(data);
        }, 300);
    }

    function renderTable(list) {
        const body = document.getElementById('partsBody');
        const l = translations[currentLang];
        
        if (!list || list.length === 0) {
            body.innerHTML = `<tr><td colspan="6" style="text-align:center;">${l.noRes}</td></tr>`;
            return;
        }

        body.innerHTML = list.map(p => `
            <tr>
                <td onclick="location.href='part_ficha_tecnica.html?id=${p.id}'"><strong>${p.part_number}</strong></td>
                <td>${p.part_name || p.description || '---'}</td>
                <td>${p.project || '---'}</td>
                <td>${p.product_type || '---'}</td>
                <td>
                    <span class="status-dot ${p.obsolete ? 'dot-obs' : 'dot-active'}"></span>
                    ${p.obsolete ? l.obs : l.act}
                </td>
                <td>
                    <a href="ingenieria_nuevo_np.html?id=${p.id}" style="color:var(--primary)"><i class="fas fa-edit"></i></a>
                </td>
            </tr>
        `).join('');
    }

    function setLang(lang) {
        currentLang = lang;
        localStorage.setItem('lang', lang);
        const l = translations[lang];
        
        document.getElementById('txt_title').innerText = l.title;
        document.getElementById('btn_new').innerHTML = `<i class="fas fa-plus"></i> ${l.new}`;
        document.getElementById('searchPart').placeholder = l.pPart;
        document.getElementById('searchProject').placeholder = l.pProj;
        document.getElementById('opt_all').innerText = l.optAll;
        document.getElementById('opt_active').innerText = l.optActive;
        document.getElementById('opt_obs').innerText = l.optObs;
        document.getElementById('th_part').innerText = l.thPart;
        document.getElementById('th_desc').innerText = l.thDesc;
        document.getElementById('th_proj').innerText = l.thProj;
        document.getElementById('th_type').innerText = l.thType;
        document.getElementById('th_status').innerText = l.thStatus;
        
        searchOnSupabase(); 
    }

    function toggleTheme() {
        const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        document.getElementById('themeIcon').className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
    }

    function applyTheme() {
        const theme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
        document.getElementById('themeIcon').className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
    }

    init();
</script>

</body>
</html>
