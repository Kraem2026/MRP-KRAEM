<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Ingeniería - KRAEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="config.js"></script>

    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --border: #e2e8f0; --primary: #2563eb; --success: #22c55e; --danger: #ef4444; }
        [data-theme="dark"] { --bg: #020617; --card: #1e293b; --text: #f1f5f9; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto 20px auto; }
        .btn { padding: 10px 18px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; text-decoration: none; font-size: 14px; }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .search-container { background: var(--card); padding: 15px; border-radius: 16px; border: 1px solid var(--border); max-width: 1200px; margin: 0 auto 20px auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        input, select { padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); outline: none; }
        .table-container { background: var(--card); border-radius: 16px; border: 1px solid var(--border); max-width: 1200px; margin: auto; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 800px; }
        th { background: #1e293b; color: white; padding: 15px; font-size: 11px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 13px; }
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .dot-active { background: var(--success); }
        .dot-obs { background: var(--danger); }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <a href="dashboard.html" class="btn"><i class="fas fa-home"></i></a>
        <h2 style="margin:0;" id="txt_title">Catálogo Maestro</h2>
    </div>
    <div class="controls" style="display:flex; gap:10px;">
        <a href="ingenieria_nuevo_np.html" class="btn btn-primary"><i class="fas fa-plus"></i> Nuevo</a>
        <button class="btn" onclick="toggleTheme()"><i id="themeIcon" class="fas fa-moon"></i></button>
    </div>
</header>

<div class="search-container">
    <input type="text" id="searchPart" placeholder="N° Parte o Nombre..." onkeyup="searchOnSupabase()">
    <input type="text" id="searchProject" placeholder="Proyecto..." onkeyup="searchOnSupabase()">
    <select id="filterStatus" onchange="searchOnSupabase()">
        <option value="">Todos los estatus</option>
        <option value="false">Activos</option>
        <option value="true">Obsoletos</option>
    </select>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>N° Parte</th>
                <th>Descripción</th>
                <th>Proyecto</th>
                <th>Tipo</th>
                <th>Estatus</th>
                <th style="width:50px;"></th>
            </tr>
        </thead>
        <tbody id="partsBody"></tbody>
    </table>
</div>

<script>
    let searchTimeout;

    async function init() {
        applyTheme();
        await searchOnSupabase(); // Carga inicial
    }

    // Esta es la función clave: busca directamente en la base de datos
    async function searchOnSupabase() {
        // Usamos un timeout para no saturar a Supabase mientras el usuario escribe
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(async () => {
            const partQ = document.getElementById('searchPart').value.trim();
            const projQ = document.getElementById('searchProject').value.trim();
            const statusQ = document.getElementById('filterStatus').value;

            let query = client.from('parts').select('*');

            // Filtros de Supabase (Server-side)
            if (partQ) {
                // Busca coincidencias en part_number O part_name
                query = query.or(`part_number.ilike.%${partQ}%,part_name.ilike.%${partQ}%,description.ilike.%${partQ}%`);
            }
            if (projQ) {
                query = query.ilike('project', `%${projQ}%`);
            }
            if (statusQ !== "") {
                query = query.eq('obsolete', statusQ === "true");
            }

            // Limitamos a 100 resultados por rapidez y ordenamos por ID
            const { data, error } = await query
                .order('id', { ascending: false })
                .limit(100);

            if (error) {
                console.error('Error:', error);
                return;
            }

            renderTable(data);
        }, 300); // Espera 300ms después de que el usuario deja de escribir
    }

    function renderTable(list) {
        const body = document.getElementById('partsBody');
        if (!list || list.length === 0) {
            body.innerHTML = `<tr><td colspan="6" style="text-align:center;">No se encontraron resultados en la base de datos.</td></tr>`;
            return;
        }

        body.innerHTML = list.map(p => `
            <tr>
                <td onclick="location.href='part_ficha_tecnica.html?id=${p.id}'"><strong>${p.part_number}</strong></td>
                <td>${p.part_name || p.description || '---'}</td>
                <td>${p.project || '---'}</td>
                <td>${p.product_type || '---'}</td>
                <td>
                    <span class="status-dot ${p.obsolete ? 'dot-obs' : 'dot-active'}"></span>
                    ${p.obsolete ? 'Obsoleto' : 'Activo'}
                </td>
                <td>
                    <a href="ingenieria_nuevo_np.html?id=${p.id}" style="color:var(--primary)"><i class="fas fa-edit"></i></a>
                </td>
            </tr>
        `).join('');
    }

    function toggleTheme() {
        const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
    }

    function applyTheme() {
        const theme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
    }

    init();
</script>
</body>
</html>
