<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Ingeniería - KRAEM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --text-secondary: #64748b;
            --border: #e2e8f0; --primary: #2563eb; --success: #22c55e; --danger: #ef4444;
        }
        [data-theme="dark"] {
            --bg: #020617; --card: #1e293b; --text: #f1f5f9; --text-secondary: #94a3b8; --border: #334155;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; }
        
        header { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto 20px auto; }
        
        .btn { padding: 10px 18px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.2s; text-decoration: none; font-size: 14px; }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-primary:hover { background: #1d4ed8; }

        .search-container { background: var(--card); padding: 15px; border-radius: 16px; border: 1px solid var(--border); max-width: 1200px; margin: 0 auto 20px auto; display: grid; grid-template-columns: 1fr 1fr 200px; gap: 15px; }
        input, select { padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); outline: none; }

        .table-container { background: var(--card); border-radius: 16px; border: 1px solid var(--border); max-width: 1200px; margin: auto; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #1e293b; color: white; padding: 15px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; cursor: pointer; }
        tr:hover td { background: #f1f5f9; }
        
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .badge-pt { background: #dcfce7; color: #166534; }
        .badge-mp { background: #fef9c3; color: #854d0e; }
        
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .dot-active { background: var(--success); }
        .dot-obs { background: var(--danger); }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <a href="dashboard.html" class="btn"><i class="fas fa-home"></i></a>
        <h2 style="margin:0;">Catálogo Maestro de Ingeniería</h2>
    </div>
    <button class="btn btn-primary" onclick="alert('Abriendo formulario de nuevo N/P...')">
        <i class="fas fa-plus"></i> Nuevo Número de Parte
    </button>
</header>

<div class="search-container">
    <input type="text" id="searchPart" placeholder="Buscar por N° Parte o Nombre..." oninput="filterTable()">
    <input type="text" id="searchProject" placeholder="Filtrar por Proyecto..." oninput="filterTable()">
    <select id="filterStatus" onchange="filterTable()">
        <option value="">Todos los estatus</option>
        <option value="active">Activos</option>
        <option value="obs">Obsoletos</option>
    </select>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>N° Parte</th>
                <th>Nombre / Descripción</th>
                <th>Proyecto</th>
                <th>Tipo</th>
                <th>Resina</th>
                <th>Estatus</th>
            </tr>
        </thead>
        <tbody id="partsBody">
            </tbody>
    </table>
</div>

<script>
    const client = supabase.createClient('https://telntsrrschcdxczlape.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlbG50c3Jyc2NoY2R4Y3psYXBlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ4NjI4MTcsImV4cCI6MjA4MDQzODgxN30.DC2teZ_4gk3wA7UmZJHyeZHjw5aOOEmmKvd3a8jRUyw');

    let allParts = [];

    async function loadParts() {
        const { data, error } = await client
            .from('parts')
            .select('*')
            .order('part_number', { ascending: true });

        if (error) {
            console.error('Error al cargar partes:', error);
            return;
        }

        allParts = data;
        renderTable(allParts);
    }

    function renderTable(list) {
        const body = document.getElementById('partsBody');
        body.innerHTML = list.map(p => `
            <tr onclick="goToFicha(${p.id})">
                <td><strong>${p.part_number}</strong></td>
                <td>${p.part_name || p.description || '---'}</td>
                <td>${p.project || '---'}</td>
                <td><span class="badge ${p.part_type === 'PT' ? 'badge-pt' : 'badge-mp'}">${p.part_type || 'N/A'}</span></td>
                <td>${p.resin_type || '---'}</td>
                <td>
                    <span class="status-dot ${p.obsolete ? 'dot-obs' : 'dot-active'}"></span>
                    ${p.obsolete ? 'Obsoleto' : 'Activo'}
                </td>
            </tr>
        `).join('');
    }

    function filterTable() {
        const partQ = document.getElementById('searchPart').value.toLowerCase();
        const projQ = document.getElementById('searchProject').value.toLowerCase();
        const statusQ = document.getElementById('filterStatus').value;

        const filtered = allParts.filter(p => {
            const matchesPart = p.part_number.toLowerCase().includes(partQ) || (p.part_name && p.part_name.toLowerCase().includes(partQ));
            const matchesProj = (p.project || '').toLowerCase().includes(projQ);
            const matchesStatus = statusQ === "" || (statusQ === 'obs' ? p.obsolete : !p.obsolete);
            
            return matchesPart && matchesProj && matchesStatus;
        });

        renderTable(filtered);
    }

    function goToFicha(id) {
        // Esta es la clave: manda el ID a la página de la ficha técnica
        window.location.href = `part_ficha_tecnica.html?id=${id}`;
    }

    // Cargar datos al iniciar
    loadParts();
</script>

</body>
</html>
