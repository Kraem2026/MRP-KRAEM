<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Administración de Ubicaciones</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#f4f6f8;padding:15px}
h2{margin-bottom:10px}
button{padding:8px 12px;margin-top:5px;cursor:pointer}
input,select{width:100%;padding:8px;margin:5px 0}
table{width:100%;border-collapse:collapse;background:#fff;margin-top:15px}
th,td{padding:10px;border-bottom:1px solid #ddd}
th{background:#343a40;color:#fff}
.active{color:green;font-weight:bold}
.inactive{color:red;font-weight:bold}
.back{background:#6c757d;color:#fff;border:none}
</style>
</head>

<body>

<button class="back" onclick="location.href='admin.html'">⬅ Volver</button>
<h2>📍 Ubicaciones</h2>

<label>Área</label>
<select id="area_id"></select>

<label>Código de Ubicación</label>
<input id="location_code" placeholder="Ej. A8">

<label>Nombre</label>
<input id="location_name" placeholder="Rack A8">

<button onclick="crearUbicacion()">➕ Crear Ubicación</button>

<table>
<thead>
<tr>
  <th>Área</th>
  <th>Código</th>
  <th>Nombre</th>
  <th>Estatus</th>
  <th>Acción</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

<script>
const client = supabase.createClient(
  'https://telntsrrschcdxczlape.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlbG50c3Jyc2NoY2R4Y3psYXBlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ4NjI4MTcsImV4cCI6MjA4MDQzODgxN30.DC2teZ_4gk3wA7UmZJHyeZHjw5aOOEmmKvd3a8jRUyw'
);

async function loadAreas(){
  const {data}=await client.from('areas').select('*').eq('active',true);
  area_id.innerHTML='';
  data.forEach(a=>{
    area_id.innerHTML+=`<option value="${a.id}">${a.area_name}</option>`;
  });
}

async function load(){
  const {data}=await client
    .from('locations')
    .select('*,areas(area_name)')
    .order('location_code');

  body.innerHTML='';
  data.forEach(l=>{
    body.innerHTML+=`
    <tr>
      <td>${l.areas.area_name}</td>
      <td>${l.location_code}</td>
      <td>${l.location_name}</td>
      <td class="${l.active?'active':'inactive'}">
        ${l.active?'Activa':'Inactiva'}
      </td>
      <td>
        <button onclick="toggle(${l.id},${l.active})">
          ${l.active?'Desactivar':'Activar'}
        </button>
      </td>
    </tr>`;
  });
}

async function crearUbicacion(){
  if(!location_code.value) return alert('Código requerido');

  const {error}=await client.from('locations').insert({
    area_id:area_id.value,
    location_code:location_code.value.toUpperCase(),
    location_name:location_name.value,
    active:true
  });

  if(error) return alert(error.message);
  location_code.value='';
  location_name.value='';
  load();
}

async function toggle(id,state){
  await client.from('locations')
    .update({active:!state})
    .eq('id',id);
  load();
}

loadAreas();
load();
</script>

</body>
</html>
