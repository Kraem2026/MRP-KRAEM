<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura de Inspección Interna - KRAEM</title>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #0f172a;
            --border: #e2e8f0; --success: #22c55e;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .btn-back { border: none; background: none; font-size: 1.2rem; cursor: pointer; color: var(--primary); }
        
        .form-container { max-width: 600px; margin: auto; background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; color: #64748b; }
        
        input, select, textarea {
            width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px;
            font-size: 1rem; box-sizing: border-box; outline: none; background: var(--card); color: var(--text);
        }
        input:focus, textarea:focus { border-color: var(--primary); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .btn-save {
            width: 100%; padding: 15px; background: var(--primary); color: white;
            border: none; border-radius: 8px; font-weight: bold; font-size: 1rem;
            cursor: pointer; margin-top: 10px; transition: 0.2s;
        }
        .btn-save:active { transform: scale(0.98); }
        .readonly-box { background: #f1f5f9; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="header">
    <button class="btn-back" onclick="location.href='dashboard.html'"><i class="fas fa-arrow-left"></i></button>
    <h2>Nueva Inspección</h2>
</div>

<div class="form-container">
    <div class="grid-2">
        <div class="form-group">
            <label>Turno</label>
            <select id="turno">
                <option value="1">Turno 1</option>
                <option value="2">Turno 2</option>
            </select>
        </div>
        <div class="form-group">
            <label>Área</label>
            <select id="area">
                <option value="NISSEI">NISSEI</option>
                <option value="LS">LS</option>
                <option value="HDL">HDL</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label>Máquina</label>
        <input type="text" id="maquina" placeholder="Ej. #13">
    </div>

    <div class="form-group">
        <label>Número de Parte</label>
        <input type="text" id="num_parte" placeholder="Ingrese N/P..." onchange="buscarParte(this.value)">
    </div>

    <div class="form-group">
        <label>Nombre de Pieza</label>
        <input type="text" id="nombre_pieza" class="readonly-box" readonly placeholder="Buscando en catálogo...">
    </div>

    <div class="grid-2">
        <div class="form-group">
            <label>Cant. Inspeccionada</label>
            <input type="number" id="cant_insp" oninput="calcularOk()">
        </div>
        <div class="form-group">
            <label>Cant. Defectuosa</label>
            <input type="number" id="cant_def" oninput="calcularOk()">
        </div>
    </div>

    <div class="grid-2">
        <div class="form-group">
            <label>Cantidad OK</label>
            <input type="number" id="cant_ok" class="readonly-box" readonly>
        </div>
        <div class="form-group">
            <label>% Defecto</label>
            <input type="text" id="porcentaje" class="readonly-box" readonly>
        </div>
    </div>

    <div class="form-group">
        <label>Tipo de Defecto</label>
        <select id="tipo_defecto">
            <option value="">Cargando lista de defectos...</option>
        </select>
    </div>

    <div class="form-group">
        <label>Comentarios / Observaciones</label>
        <textarea id="comentarios" rows="2" placeholder="Explique el hallazgo aquí..."></textarea>
    </div>

    <div class="form-group">
        <label>Destino</label>
        <select id="destino">
            <option value="LIBERADO">Liberado</option>
            <option value="RETRABAJO">Retrabajo</option>
            <option value="SCRAP">Scrap</option>
        </select>
    </div>

    <button class="btn-save" id="btn_guardar" onclick="guardarInspeccion()">
        <i class="fas fa-save"></i> GUARDAR LIBERACIÓN
    </button>
</div>

<script>
    // Inicialización usando las constantes de config.js
    const _client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Cargar defectos desde la tabla 'defects'
    async function cargarDefectos() {
        try {
            const { data, error } = await _client.from('defects').select('Defect_name').order('Defect_name');
            const select = document.getElementById('tipo_defecto');
            if (data) {
                select.innerHTML = '<option value="NINGUNO">Ninguno / OK</option>';
                data.forEach(d => {
                    select.innerHTML += `<option value="${d.Defect_name}">${d.Defect_name}</option>`;
                });
            }
        } catch (e) { console.error("Error cargando defectos"); }
    }

    // Buscar en la tabla 'parts'
    async function buscarParte(np) {
        if(!np) return;
        const { data, error } = await _client
            .from('parts')
            .select('part_name')
            .eq('part_number', np.trim())
            .single();

        document.getElementById('nombre_pieza').value = data ? data.part_name : "N/P No registrado";
    }

    function calcularOk() {
        const insp = parseInt(document.getElementById('cant_insp').value) || 0;
        const def = parseInt(document.getElementById('cant_def').value) || 0;
        document.getElementById('cant_ok').value = insp - def;
        document.getElementById('porcentaje').value = insp > 0 ? ((def / insp) * 100).toFixed(2) + "%" : "0%";
    }

    async function guardarInspeccion() {
        const btn = document.getElementById('btn_guardar');
        const datos = {
            turno: document.getElementById('turno').value,
            area: document.getElementById('area').value,
            maquina: document.getElementById('maquina').value,
            part_number: document.getElementById('num_parte').value,
            qty_inspected: parseInt(document.getElementById('cant_insp').value),
            qty_defective: parseInt(document.getElementById('cant_def').value),
            defect_type: document.getElementById('tipo_defecto').value,
            comments: document.getElementById('comentarios').value,
            disposition: document.getElementById('destino').value,
            created_at: new Date().toISOString()
        };

        if(!datos.part_number || isNaN(datos.qty_inspected)) return alert("Falta N/P o Cantidad");

        btn.disabled = true;
        btn.innerText = "Guardando...";

        const { error } = await _client.from('inspecciones_calidad').insert([datos]);

        if (error) {
            alert("Error: " + error.message);
            btn.disabled = false;
            btn.innerText = "GUARDAR LIBERACIÓN";
        } else {
            alert("✅ Registro guardado");
            location.reload();
        }
    }

    window.onload = cargarDefectos;
</script>
</body>
</html>
