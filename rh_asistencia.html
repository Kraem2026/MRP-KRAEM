<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRAEM | Control de Asistencia</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f8fafc; --text: #1e293b; --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 15px; }
        .container { max-width: 1000px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; margin-bottom: 15px; }
        
        .area-badge { background: var(--primary); color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; margin-bottom: 10px; display: inline-block; }
        
        /* Controles de Asistencia */
        .emp-row { display: grid; grid-template-columns: 1fr auto; align-items: center; padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .emp-info b { display: block; font-size: 14px; }
        .emp-info span { font-size: 11px; color: #64748b; }
        
        .btn-group { display: flex; gap: 8px; }
        .btn-check { width: 40px; height: 40px; border-radius: 8px; border: 1px solid #e2e8f0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: 0.2s; background: white; }
        
        .btn-asist.active { background: var(--success); color: white; border-color: var(--success); }
        .btn-falta.active { background: var(--danger); color: white; border-color: var(--danger); }
        .btn-vacas.active { background: var(--accent); color: white; border-color: var(--accent); }

        .vaca-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #dbeafe; color: #1e40af; font-weight: bold; margin-left: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="dashboard.html" style="text-decoration:none; color:var(--text)"><i class="fas fa-chevron-left"></i> Regresar</a>
        <h2 style="margin:0; font-size:18px;">Pase de Lista - <span id="fecha_hoy"></span></h2>
    </div>

    <div class="card">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <select id="f_area" onchange="cargarLista()">
                <option value="">Todas las Áreas</option>
            </select>
            <input type="date" id="f_fecha" onchange="cargarLista()">
        </div>
    </div>

    <div id="lista_contenedor">
        </div>
</div>

<script>
    let db_empleados = [];
    let asistencias_hoy = [];

    async function init() {
        document.getElementById('f_fecha').valueAsDate = new Date();
        document.getElementById('fecha_hoy').innerText = new Date().toLocaleDateString();

        // Cargar Áreas
        const { data: areas } = await client.from('rh_areas').select('*').order('nombre');
        const selArea = document.getElementById('f_area');
        areas.forEach(a => selArea.innerHTML += `<option value="${a.id}">${a.nombre}</option>`);

        cargarLista();
    }

    function calcularVacaciones(fechaIngreso) {
        if(!fechaIngreso) return { liberados: 0, acumulados: 0 };
        const inicio = new Date(fechaIngreso);
        const hoy = new Date();
        const antiguedad = Math.floor((hoy - inicio) / (1000 * 60 * 60 * 24 * 365.25));
        
        // Función rápida simulando la ley
        const obtenerDiasPorAño = (a) => {
            if(a < 1) return 0;
            if(a == 1) return 12;
            if(a == 2) return 14;
            if(a == 3) return 16;
            return 18 + (a-4)*2;
        };

        const liberados = obtenerDiasPorAño(antiguedad);
        // Proporcional del año actual
        const diasAñoActual = Math.floor((hoy - new Date(hoy.getFullYear(), inicio.getMonth(), inicio.getDate())) / (1000 * 60 * 60 * 24));
        const acumulados = antiguedad > 0 ? (obtenerDiasPorAño(antiguedad + 1) * (diasAñoActual / 365)).toFixed(1) : 0;

        return { liberados, acumulados: Math.max(0, acumulados) };
    }

    async function cargarLista() {
        const areaId = document.getElementById('f_area').value;
        const fecha = document.getElementById('f_fecha').value;

        // Traer empleados
        let query = client.from('rh_empleados').select('*, rh_areas(nombre)').eq('estatus', 'ACTIVO');
        if(areaId) query = query.eq('area_id', areaId);
        const { data: emps } = await query.order('nombre_completo');
        
        // Traer asistencias ya marcadas
        const { data: asist } = await client.from('rh_asistencias').eq('fecha', fecha);
        asistencias_hoy = asist || [];

        renderLista(emps);
    }

    function renderLista(emps) {
        const cont = document.getElementById('lista_contenedor');
        cont.innerHTML = '';

        // Agrupar por área
        const areas = [...new Set(emps.map(e => e.rh_areas.nombre))];

        areas.forEach(area => {
            let html = `<div class="area-badge">${area}</div><div class="card" style="padding:0; margin-bottom:20px;">`;
            
            emps.filter(e => e.rh_areas.nombre === area).forEach(e => {
                const vaca = calcularVacaciones(e.fecha_ingreso);
                const registro = asistencias_hoy.find(a => a.empleado_id === e.id);
                const estado = registro ? registro.estado : '';

                html += `
                <div class="emp-row">
                    <div class="emp-info">
                        <b>${e.nombre_completo}</b>
                        <span>Antigüedad: ${calcularAntiguedad(e.fecha_ingreso)} <span class="vaca-tag">Vac: ${vaca.liberados} (+${vaca.acumulados})</span></span>
                    </div>
                    <div class="btn-group">
                        <button class="btn-check btn-asist ${estado === 'ASISTENCIA' ? 'active' : ''}" onclick="marcar('${e.id}', 'ASISTENCIA')"><i class="fas fa-check"></i></button>
                        <button class="btn-check btn-falta ${estado === 'FALTA' ? 'active' : ''}" onclick="marcar('${e.id}', 'FALTA')"><i class="fas fa-times"></i></button>
                        <button class="btn-check btn-vacas ${estado === 'VACACIONES' ? 'active' : ''}" onclick="marcar('${e.id}', 'VACACIONES')"><i class="fas fa-umbrella-beach"></i></button>
                    </div>
                </div>`;
            });
            html += `</div>`;
            cont.innerHTML += html;
        });
    }

    async function marcar(empId, estado) {
        const fecha = document.getElementById('f_fecha').value;
        
        const { error } = await client.from('rh_asistencias').upsert({
            empleado_id: empId,
            fecha: fecha,
            estado: estado
        }, { onConflict: 'empleado_id, fecha' });

        if(!error) cargarLista();
    }

    function calcularAntiguedad(f) {
        if(!f) return '-';
        const años = Math.floor((new Date() - new Date(f)) / (1000*60*60*24*365.25));
        return años + (años === 1 ? ' año' : ' años');
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
