<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRAEM | Pase de Lista</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #0f172a; --accent: #2563eb; --bg: #f8fafc; 
            --text: #1e293b; --success: #22c55e; --warning: #f59e0b; 
            --danger: #ef4444; --border: #e2e8f0;
        }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; padding-bottom: 120px; }

        .header-asistencia { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 15px; background: white; padding: 15px; 
            border-radius: 12px; border: 1px solid var(--border); 
        }
        .btn-nav { 
            padding: 10px 15px; border-radius: 8px; border: 1px solid var(--border); 
            background: white; cursor: pointer; text-decoration: none; 
            color: var(--text); font-weight: 600; display: inline-flex; align-items: center; gap: 8px; 
        }

        .attendance-card { 
            background: white; border-radius: 12px; border: 1px solid var(--border); 
            padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            transition: 0.3s;
        }
        
        /* Estilo para tarjetas bloqueadas */
        .attendance-card.locked { background: #f1f5f9; opacity: 0.8; border-style: dashed; }
        .lock-badge { background: #e2e8f0; color: #475569; padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 5px; }

        .emp-row { display: flex; align-items: center; justify-content: space-between; }
        .emp-info { display: flex; align-items: center; gap: 12px; }
        .emp-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background: #f1f5f9; border: 1px solid var(--border); }
        .emp-details h4 { margin: 0; font-size: 14px; color: var(--primary); }
        .emp-details p { margin: 2px 0 0; font-size: 11px; color: #64748b; text-transform: uppercase; font-weight: 600; }

        .status-buttons { display: flex; gap: 8px; }
        .btn-status { 
            width: 42px; height: 42px; border-radius: 10px; 
            border: 1px solid #cbd5e1; background: white; 
            cursor: pointer; font-weight: 800; transition: 0.2s; color: #64748b; 
        }
        
        .btn-status.active-P { background: var(--success) !important; color: white !important; border-color: var(--success); }
        .btn-status.active-R { background: var(--warning) !important; color: white !important; border-color: var(--warning); }
        .btn-status.active-F { background: var(--danger) !important; color: white !important; border-color: var(--danger); }

        .reason-select { width: 100%; margin-top: 12px; padding: 10px; border-radius: 8px; border: 1px solid var(--danger); background: #fff5f5; font-size: 13px; display: none; outline: none; }
        .show-reason { display: block; }

        .footer-save { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 20px; border-top: 1px solid var(--border); text-align: center; }
        .btn-final { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; max-width: 500px; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-asistencia">
        <a href="dashboard.html" class="btn-nav"><i class="fas fa-arrow-left"></i> Panel</a>
        <div style="text-align: right;">
            <h3 style="margin:0; font-size: 18px; color: var(--primary);">Pase de Lista</h3>
            <span id="fecha-hoy" style="font-size: 12px; color: var(--accent); font-weight: bold; text-transform: capitalize;"></span>
        </div>
    </div>

    <div id="lista-asistencia">
        <div style="text-align:center; padding:40px; color:#94a3b8;">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
            <p>Verificando permisos y personal...</p>
        </div>
    </div>
</div>

<div class="footer-save">
    <button class="btn-final" onclick="enviarAsistencia()">
        <i class="fas fa-check-circle"></i> GUARDAR ASISTENCIA DEL DÍA
    </button>
</div>

<script>
    let db_empleados_activos = [];
    let db_solicitudes_hoy = [];
    let asistenciaData = {}; 

    async function init() {
        const hoy = new Date();
        const hoyISO = hoy.toISOString().split('T')[0];
        document.getElementById('fecha-hoy').innerText = hoy.toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'long' });

        try {
            // 1. Cargar Empleados Activos
            const { data: empleados } = await client.from('rh_empleados').select('id, nombre_completo, foto_url, rh_puestos(nombre)').eq('estatus', 'ACTIVO').order('nombre_completo');
            
            // 2. Cargar Solicitudes Aprobadas que crucen con hoy
            const { data: solicitudes } = await client.from('rh_solicitudes')
                .select('empleado_id, tipo, fecha_inicio, fecha_fin')
                .eq('estatus', 'APROBADO')
                .lte('fecha_inicio', hoyISO)
                .gte('fecha_fin', hoyISO);

            db_empleados_activos = empleados;
            db_solicitudes_hoy = solicitudes;

            renderizarLista();

        } catch (err) {
            console.error(err);
        }
    }

    function renderizarLista() {
        const lista = document.getElementById('lista-asistencia');
        lista.innerHTML = '';

        db_empleados_activos.forEach(emp => {
            // Verificar si el empleado tiene un permiso hoy
            const solicitud = db_solicitudes_hoy.find(s => s.empleado_id === emp.id);
            const isLocked = !!solicitud;

            // Inicializar data (si está bloqueado, ya tiene estado y motivo)
            if(isLocked) {
                asistenciaData[emp.id] = { estado: 'F', motivo: solicitud.tipo, bloqueado: true };
            }

            const card = document.createElement('div');
            card.className = `attendance-card ${isLocked ? 'locked' : ''}`;
            card.innerHTML = `
                <div class="emp-row">
                    <div class="emp-info">
                        <img src="${emp.foto_url || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="emp-img">
                        <div class="emp-details">
                            <h4>${emp.nombre_completo}</h4>
                            <p>${emp.rh_puestos?.nombre || 'General'}</p>
                        </div>
                    </div>
                    ${isLocked ? `
                        <div class="lock-badge">
                            <i class="fas fa-lock"></i> ${solicitud.tipo}
                        </div>
                    ` : `
                        <div class="status-buttons">
                            <button class="btn-status" id="btn-P-${emp.id}" onclick="updateStatus('${emp.id}', 'P')">P</button>
                            <button class="btn-status" id="btn-R-${emp.id}" onclick="updateStatus('${emp.id}', 'R')">R</button>
                            <button class="btn-status" id="btn-F-${emp.id}" onclick="updateStatus('${emp.id}', 'F')">F</button>
                        </div>
                    `}
                </div>
                <select class="reason-select" id="select-${emp.id}" onchange="updateMotivo('${emp.id}', this.value)">
                    <option value="Injustificada">⚠️ Falta Injustificada</option>
                    <option value="Justificante">📄 Justificante Médico</option>
                    <option value="Permiso Sin Goce">💸 Permiso Sin Goce</option>
                </select>
            `;
            lista.appendChild(card);
        });
    }

    function updateStatus(empId, status) {
        // Limpiar selección previa
        document.getElementById(`btn-P-${empId}`).className = 'btn-status';
        document.getElementById(`btn-R-${empId}`).className = 'btn-status';
        document.getElementById(`btn-F-${empId}`).className = 'btn-status';
        
        // Marcar activo
        document.getElementById(`btn-${status}-${empId}`).classList.add(`active-${status}`);

        asistenciaData[empId] = { estado: status, motivo: '', bloqueado: false };

        const select = document.getElementById(`select-${empId}`);
        if (status === 'F') {
            select.classList.add('show-reason');
            asistenciaData[empId].motivo = select.value;
        } else {
            select.classList.remove('show-reason');
        }
    }

    function updateMotivo(empId, motivo) {
        asistenciaData[empId].motivo = motivo;
    }

    async function enviarAsistencia() {
        const hoyStr = new Date().toISOString().split('T')[0];
        const marcados = Object.keys(asistenciaData);

        if (marcados.length === 0) return alert("No has marcado ninguna asistencia aún.");
        if (!confirm("¿Deseas guardar el pase de lista?")) return;

        const insertData = marcados.map(id => ({
            empleado_id: id,
            fecha: hoyStr,
            estado: asistenciaData[id].estado,
            motivo: asistenciaData[id].motivo
        }));

        const { error } = await client.from('rh_asistencia').insert(insertData);

        if (!error) {
            alert("✅ Asistencia guardada");
            location.href = 'dashboard.html';
        } else {
            alert("Error: " + error.message);
        }
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
