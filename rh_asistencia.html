<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRAEM | Control de Asistencia</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #0f172a; --accent: #2563eb; --bg: #f8fafc; 
            --text: #1e293b; --success: #22c55e; --warning: #f59e0b; 
            --danger: #ef4444; --border: #e2e8f0; --purple: #7c3aed;
        }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; padding-bottom: 140px; }

        /* Navegación Superior */
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-back { 
            text-decoration: none; color: #64748b; background: white; 
            padding: 10px 16px; border-radius: 10px; border: 1px solid var(--border);
            font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 8px;
            transition: 0.2s;
        }
        .btn-back:hover { background: #f1f5f9; color: var(--primary); }

        /* Tabs */
        .tabs-container { display: flex; background: white; border: 1px solid var(--border); border-bottom: 2px solid var(--border); margin-bottom: 15px; border-radius: 12px; overflow: hidden; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; font-size: 13px; color: #64748b; transition: 0.3s; }
        .tab.active { color: var(--accent); background: #eff6ff; border-bottom: 3px solid var(--accent); }

        /* Cards */
        .attendance-card { background: white; border-radius: 12px; border: 1px solid var(--border); padding: 15px; margin-bottom: 10px; transition: 0.2s; }
        .card-saved { border-left: 5px solid var(--success); background: #f0fdf4; }
        .card-extra { border-left: 5px solid var(--purple); background: #faf5ff; }

        .emp-row { display: flex; align-items: center; justify-content: space-between; }
        .emp-info { display: flex; align-items: center; gap: 12px; }
        .emp-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #e2e8f0; }
        .emp-details h4 { margin: 0; font-size: 14px; color: var(--primary); }
        .emp-details p { margin: 2px 0 0; font-size: 10px; color: #64748b; text-transform: uppercase; font-weight: 700; }
        
        /* Controles */
        .status-buttons { display: flex; gap: 5px; }
        .btn-status { width: 35px; height: 35px; border-radius: 8px; border: 1px solid #cbd5e1; background: white; cursor: pointer; font-weight: bold; }
        .active-P { background: var(--success) !important; color: white !important; border-color: var(--success); }
        .active-R { background: var(--warning) !important; color: white !important; border-color: var(--warning); }
        .active-F { background: var(--danger) !important; color: white !important; border-color: var(--danger); }

        .status-badge { padding: 5px 12px; border-radius: 6px; color: white; font-weight: bold; font-size: 11px; }
        .bg-P { background: var(--success); } .bg-R { background: var(--warning); } .bg-F { background: var(--danger); }

        .input-extra { width: 60px; padding: 8px; border-radius: 8px; border: 2px solid var(--purple); text-align: center; font-weight: bold; font-size: 16px; outline: none; }
        .btn-delete { color: var(--danger); background: white; border: 1px solid #fee2e2; padding: 8px; border-radius: 8px; cursor: pointer; }

        /* Footer */
        .footer-save { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 20px; border-top: 1px solid var(--border); text-align: center; z-index: 100; }
        .btn-final { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; max-width: 400px; font-size: 15px; transition: 0.3s; }
        .btn-final:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-nav">
        <a href="dashboard.html" class="btn-back">
            <i class="fas fa-th-large"></i> Dashboard
        </a>
        <div style="text-align: right;">
            <h2 style="margin:0; font-size:16px;">Pase de Lista</h2>
            <span id="fecha-hoy" style="font-size:12px; color:var(--accent); font-weight:600; text-transform:capitalize;"></span>
        </div>
    </div>

    <div class="tabs-container">
        <div class="tab active" id="tab-asis" onclick="cambiarTab('asistencia')"><i class="fas fa-user-check"></i> ASISTENCIA</div>
        <div class="tab" id="tab-ext" onclick="cambiarTab('extra')"><i class="fas fa-bolt"></i> TIEMPO EXTRA</div>
    </div>

    <div id="lista-empleados">
        <div style="text-align:center; padding:50px; color:#94a3b8;">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
        </div>
    </div>
</div>

<div class="footer-save">
    <button class="btn-final" id="btn-save" onclick="guardarCambios()">
        <i class="fas fa-save"></i> GUARDAR CAMBIOS DEL DÍA
    </button>
</div>

<script>
    let modo = 'asistencia';
    let empleados = [];
    let solicitudes = [];
    let asistenciaLocal = {}; 

    async function cargarDatos() {
        const hoy = new Date().toISOString().split('T')[0];
        document.getElementById('fecha-hoy').innerText = new Date().toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'short' });

        try {
            const [resEmp, resSol, resAsis] = await Promise.all([
                client.from('rh_empleados').select('id, nombre_completo, foto_url, rh_puestos(nombre)').eq('estatus', 'ACTIVO').order('nombre_completo'),
                client.from('rh_solicitudes').select('empleado_id, tipo').eq('estatus', 'APROBADO').lte('fecha_inicio', hoy).gte('fecha_fin', hoy),
                client.from('rh_asistencia_diaria').select('*').eq('fecha', hoy)
            ]);

            empleados = resEmp.data || [];
            solicitudes = resSol.data || [];

            // Resetear estado local y cargar desde DB
            asistenciaLocal = {};
            resAsis.data.forEach(a => {
                asistenciaLocal[a.empleado_id] = { 
                    estado: a.estado, 
                    motivo: a.motivo || '', 
                    horas_extra: a.horas_extra || 0,
                    en_db: true 
                };
            });

            render();
        } catch (err) {
            console.error("Error cargando datos:", err);
            alert("Error de conexión al cargar datos.");
        }
    }

    function cambiarTab(nuevoModo) {
        modo = nuevoModo;
        document.getElementById('tab-asis').classList.toggle('active', modo === 'asistencia');
        document.getElementById('tab-ext').classList.toggle('active', modo === 'extra');
        render();
    }

    function render() {
        const container = document.getElementById('lista-empleados');
        container.innerHTML = '';

        empleados.forEach(emp => {
            const sol = solicitudes.find(s => s.empleado_id === emp.id);
            const data = asistenciaLocal[emp.id] || { estado: '', motivo: '', horas_extra: 0, en_db: false };

            // Filtro para pestaña de tiempo extra
            if (modo === 'extra' && (data.estado === 'F' || !data.estado)) return;

            const card = document.createElement('div');
            // Lógica de colores de tarjeta
            let cardClass = 'attendance-card';
            if (data.en_db) cardClass += ' card-saved';
            if (modo === 'extra' && data.horas_extra > 0) cardClass += ' card-extra';
            card.className = cardClass;

            let controles = '';
            if (modo === 'asistencia') {
                if (sol) {
                    controles = `<span class="status-badge" style="background:#64748b;"><i class="fas fa-lock"></i> ${sol.tipo}</span>`;
                } else if (data.en_db) {
                    controles = `
                        <div style="display:flex; gap:10px; align-items:center;">
                            <span class="status-badge bg-${data.estado}">${data.estado === 'P' ? 'PRESENTE' : data.estado === 'R' ? 'RETARDO' : 'FALTA'}</span>
                            <button class="btn-delete" onclick="borrarRegistro('${emp.id}')" title="Resetear">
                                <i class="fas fa-undo"></i>
                            </button>
                        </div>`;
                } else {
                    controles = `
                        <div class="status-buttons">
                            <button class="btn-status ${data.estado === 'P' ? 'active-P' : ''}" onclick="updateLocal('${emp.id}', 'P')">P</button>
                            <button class="btn-status ${data.estado === 'R' ? 'active-R' : ''}" onclick="updateLocal('${emp.id}', 'R')">R</button>
                            <button class="btn-status ${data.estado === 'F' ? 'active-F' : ''}" onclick="updateLocal('${emp.id}', 'F')">F</button>
                        </div>`;
                }
            } else {
                controles = `
                    <div style="display:flex; align-items:center; gap:8px;">
                        <input type="number" class="input-extra" value="${data.horas_extra}" 
                               onchange="updateExtra('${emp.id}', this.value)" step="0.5" min="0">
                        <span style="font-size:11px; font-weight:bold; color:var(--purple);">HRS EXTRA</span>
                    </div>`;
            }

            card.innerHTML = `
                <div class="emp-row">
                    <div class="emp-info">
                        <img src="${emp.foto_url || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="emp-img">
                        <div class="emp-details">
                            <h4>${emp.nombre_completo}</h4>
                            <p>${emp.rh_puestos?.nombre || 'OPERATIVO'}</p>
                        </div>
                    </div>
                    ${controles}
                </div>`;
            container.appendChild(card);
        });

        if (container.innerHTML === '') {
            container.innerHTML = `<div style="text-align:center; padding:40px; color:#94a3b8;">No hay personal para mostrar en esta vista.</div>`;
        }
    }

    function updateLocal(id, est) {
        if(!asistenciaLocal[id]) asistenciaLocal[id] = { estado: '', motivo: '', horas_extra: 0, en_db: false };
        asistenciaLocal[id].estado = est;
        render();
    }

    function updateExtra(id, valor) {
        if(!asistenciaLocal[id]) return;
        asistenciaLocal[id].horas_extra = parseFloat(valor) || 0;
    }

    async function borrarRegistro(id) {
        if(!confirm("¿Deseas borrar este registro para capturarlo de nuevo?")) return;
        const hoy = new Date().toISOString().split('T')[0];
        const { error } = await client.from('rh_asistencia_diaria').delete().eq('empleado_id', id).eq('fecha', hoy);
        if(!error) {
            delete asistenciaLocal[id];
            render();
        }
    }

    async function guardarCambios() {
        const btn = document.getElementById('btn-save');
        const originalText = btn.innerHTML;
        const hoy = new Date().toISOString().split('T')[0];
        
        const batch = Object.keys(asistenciaLocal)
            .filter(id => asistenciaLocal[id].estado)
            .map(id => ({
                empleado_id: id,
                fecha: hoy,
                estado: asistenciaLocal[id].estado,
                motivo: asistenciaLocal[id].motivo || 'N/A',
                horas_extra: asistenciaLocal[id].horas_extra || 0
            }));

        if (batch.length === 0) return alert("Por favor, marca al menos una asistencia.");

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';

        const { error } = await client.from('rh_asistencia_diaria').upsert(batch, { onConflict: 'empleado_id, fecha' });

        if (!error) {
            alert("✅ Asistencia y Tiempo Extra actualizados.");
            await cargarDatos();
        } else {
            alert("Error al guardar: " + error.message);
        }
        
        btn.disabled = false;
        btn.innerHTML = originalText;
    }

    document.addEventListener('DOMContentLoaded', cargarDatos);
</script>
</body>
</html>
