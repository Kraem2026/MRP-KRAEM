<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRAEM | Auditoría 5'S Técnica</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f1f5f9; --card: #ffffff; --success: #22c55e; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--primary); }
        .wizard-container { max-width: 500px; margin: auto; background: var(--card); min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        .step-header { padding: 20px; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; background: white; z-index: 10; }
        .progress-bar { height: 8px; background: #e2e8f0; border-radius: 4px; margin-top: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .step-content { padding: 20px; flex-grow: 1; display: none; }
        .step-content.active { display: block; animation: slideIn 0.3s ease-out; }

        h2 { font-size: 1.3rem; margin: 0 0 5px 0; }
        .subtitle { color: #64748b; font-size: 0.85rem; margin-bottom: 20px; display: block; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 700; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        select, input, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 16px; font-family: inherit; }

        .question-card { background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .question-text { font-size: 14px; margin-bottom: 12px; font-weight: 500; }
        .options { display: flex; gap: 10px; }
        .btn-opt { flex: 1; padding: 12px; border: 2px solid #e2e8f0; background: white; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        
        .btn-opt.active-yes { background: var(--success); color: white; border-color: var(--success); box-shadow: 0 4px 0 #16a34a; transform: translateY(-2px); }
        .btn-opt.active-no { background: var(--danger); color: white; border-color: var(--danger); box-shadow: 0 4px 0 #dc2626; transform: translateY(-2px); }

        .obs-container { margin-top: 10px; border-top: 1px dashed #cbd5e1; padding-top: 15px; }
        .obs-container textarea { background: #fffbeb; font-size: 14px; height: 80px; border-color: #fde68a; }

        .nav-footer { padding: 20px; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; background: white; }
        .btn-nav { flex: 1; padding: 16px; border-radius: 12px; font-weight: bold; border: none; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .btn-prev { background: #f1f5f9; color: #475569; }
        .btn-next { background: var(--primary); color: white; }
        .btn-save { background: var(--success); color: white; width: 100%; display: none; }

        #score-result { text-align: center; padding: 40px 20px; }
        .big-score { font-size: 5rem; font-weight: 900; color: var(--accent); margin: 20px 0; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<div class="wizard-container">
    <div class="step-header">
        <div id="step-title" style="font-weight: 800; color: var(--accent); font-size: 0.8rem; text-transform: uppercase;">Configuración Inicial</div>
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    </div>

    <div class="step-content active" id="step0">
        <h2>Auditoría 5'S</h2>
        <span class="subtitle">Complete los datos de la estación de trabajo.</span>
        
        <div class="input-group">
            <label>Área de Producción</label>
            <select id="area">
                <option value="LS">LS (Inyección)</option>
                <option value="NISSEI">NISSEI (Inyección)</option>
                <option value="HDL">HDL (Inyección)</option>
                <option value="ALMACEN">Almacén General</option>
                <option value="ENSAMBLE">Ensamble / Acabados</option>
            </select>
        </div>
        <div class="input-group">
            <label>ID Máquina / Estación</label>
            <input type="text" id="maquina" placeholder="Ej: NISSEI-05">
        </div>
        <div class="input-group">
            <label>Operador Evaluado</label>
            <select id="operador"><option value="">Cargando personal...</option></select>
        </div>
    </div>

    <div id="container-s"></div>

    <div class="step-content" id="step6">
        <div id="score-result">
            <h2>Auditoría Finalizada</h2>
            <div class="big-score" id="val-score">0%</div>
            <p class="subtitle">Revise el puntaje obtenido antes de guardar en el sistema de RH.</p>
            <button class="btn-nav btn-save" id="btnFinalSave" onclick="enviarBaseDatos()" style="display:block;">GUARDAR EN HISTORIAL</button>
        </div>
    </div>

    <div class="nav-footer" id="footer-nav">
        <button class="btn-nav btn-prev" id="btnPrev" onclick="move(-1)" style="visibility: hidden;">Atrás</button>
        <button class="btn-nav btn-next" id="btnNext" onclick="move(1)">Siguiente</button>
    </div>
</div>

<script>
    let stepActual = 0;
    const totalSteps = 6;
    let datosAuditoria = { respuestas: {}, observaciones: {} };

    const secciones = [
        { t: "1. SEIRI (Selección)", c: "#2563eb", q: ["¿Área libre de objetos innecesarios?", "¿Sin acumulación de cartón/basura?"] },
        { t: "2. SEITON (Orden)", c: "#7c3aed", q: ["¿Herramientas en su sitio designado?", "¿Pasillos libres de obstáculos?", "¿Material identificado con etiquetas?"] },
        { t: "3. SEISO (Limpieza)", c: "#059669", q: ["¿Máquina y piso sin aceite/pellets?", "¿Botes de basura en nivel adecuado?"] },
        { t: "4. SEIKETSU (Estandarizar)", c: "#d97706", q: ["¿Ayudas visuales y parámetros a la vista?", "¿Operador usa EPP correctamente?"] },
        { t: "5. SHITSUKE (Disciplina)", c: "#db2777", q: ["¿Bitácora de limpieza al día?", "¿Cumple reglas de seguridad?"] }
    ];

    function init() {
        // Generar HTML de las S's
        const cont = document.getElementById('container-s');
        secciones.forEach((sec, i) => {
            let html = `<div class="step-content" id="step${i+1}">
                <h2 style="color:${sec.c}">${sec.t}</h2>
                <span class="subtitle">Marque los puntos observados en piso.</span>`;
            
            sec.q.forEach((pregunta, j) => {
                const id = `s${i+1}_p${j+1}`;
                html += `<div class="question-card">
                    <div class="question-text">${pregunta}</div>
                    <div class="options">
                        <button class="btn-opt" id="btn-${id}-si" onclick="marcar('${id}', 1)">SÍ</button>
                        <button class="btn-opt" id="btn-${id}-no" onclick="marcar('${id}', 0)">NO</button>
                    </div>
                </div>`;
            });

            html += `<div class="obs-container">
                <label>Hallazgos y Mejoras (${sec.t})</label>
                <textarea id="obs-s${i+1}" placeholder="Describa el problema o acción correctiva..."></textarea>
            </div></div>`;
            cont.innerHTML += html;
        });
        cargarEmpleados();
    }

    async function cargarEmpleados() {
        const { data } = await client.from('rh_empleados').select('id, nombre_completo').eq('estatus', 'ACTIVO').order('nombre_completo');
        const sel = document.getElementById('operador');
        sel.innerHTML = '<option value="">Seleccione Operador</option>';
        data.forEach(e => sel.innerHTML += `<option value="${e.id}">${e.nombre_completo}</option>`);
    }

    function marcar(id, val) {
        datosAuditoria.respuestas[id] = val;
        document.getElementById(`btn-${id}-si`).className = val === 1 ? 'btn-opt active-yes' : 'btn-opt';
        document.getElementById(`btn-${id}-no`).className = val === 0 ? 'btn-opt active-no' : 'btn-opt';
    }

    function move(dir) {
        // Guardar observaciones antes de mover
        if(stepActual >= 1 && stepActual <= 5) {
            datosAuditoria.observaciones[`s${stepActual}`] = document.getElementById(`obs-s${stepActual}`).value;
        }

        // Validar datos iniciales
        if(stepActual === 0 && dir === 1) {
            if(!document.getElementById('operador').value) { alert("Seleccione un operador"); return; }
        }

        document.getElementById(`step${stepActual}`).classList.remove('active');
        stepActual += dir;
        document.getElementById(`step${stepActual}`).classList.add('active');

        actualizarNavegacion();
    }

    function actualizarNavegacion() {
        // Botón Atrás
        document.getElementById('btnPrev').style.visibility = stepActual === 0 ? 'hidden' : 'visible';
        
        // Botón Siguiente / Finalizar
        const btnNext = document.getElementById('btnNext');
        if(stepActual === 5) {
            btnNext.innerText = "CALCULAR RESULTADO";
            btnNext.style.background = "var(--success)";
        } else if (stepActual === 6) {
            document.getElementById('footer-nav').style.display = 'none';
            calcularPuntaje();
        } else {
            btnNext.innerText = "Siguiente";
            btnNext.style.background = "var(--primary)";
        }

        // Título y Progreso
        const progress = (stepActual / totalSteps) * 100;
        document.getElementById('progress').style.width = `${progress}%`;
        
        if(stepActual > 0 && stepActual <= 5) {
            document.getElementById('step-title').innerText = secciones[stepActual-1].t;
        } else if(stepActual === 6) {
            document.getElementById('step-title').innerText = "RESUMEN DE AUDITORÍA";
        } else {
            document.getElementById('step-title').innerText = "CONFIGURACIÓN INICIAL";
        }
    }

    function calcularPuntaje() {
        const respuestas = Object.values(datosAuditoria.respuestas);
        const total = respuestas.length;
        const positivos = respuestas.filter(r => r === 1).length;
        const score = total > 0 ? Math.round((positivos / total) * 100) : 0;
        
        document.getElementById('val-score').innerText = score + "%";
        datosAuditoria.scoreFinal = score;
    }

    async function enviarBaseDatos() {
        const btn = document.getElementById('btnFinalSave');
        btn.disabled = true;
        btn.innerText = "GUARDANDO...";

        const payload = {
            empleado_id: document.getElementById('operador').value,
            area: document.getElementById('area').value,
            maquina_id: document.getElementById('maquina').value,
            puntuacion: datosAuditoria.scoreFinal,
            respuestas_json: datosAuditoria.respuestas,
            observaciones_json: datosAuditoria.observaciones,
            fecha: new Date().toISOString()
        };

        const { error } = await client.from('rh_evaluaciones_5s').insert([payload]);

        if(!error) {
            alert("✅ Auditoría guardada correctamente.");
            location.href = 'dashboard.html';
        } else {
            alert("❌ Error al guardar: " + error.message);
            btn.disabled = false;
            btn.innerText = "REINTENTAR GUARDAR";
        }
    }

    init();
</script>
</body>
</html>
